body:
  text: 端肅奏議卷三明馬文升撰思患豫防事近該巡按四川監察御史俞俊奏該四川行都指揮使司經歷司呈稱建昌越雋等衛地方梁山崩塌土阜擁起地動數里塵砂飛揚聲響如雷搖倒城垣房屋壓死軍民不知其數成都等府所屬州縣亦各地震不已人畜驚駭又該巡撫山西右僉都御史翟瑄奏據平陽府隰州永和縣申稱自西北火起紅光照地天鳴有聲響如雷炮驚動山林鳥獸皆鳴等因臣等切惟四川地方僻在西隅萬里之逺番漢雜處水陸二塗俱各險阻比之他省不同而建昌地方尤在四川西南西連諸種番夷南接雲南麗江軍民等府昔諸葛武侯五月渡瀘深入不毛即此之地且四川地方自漢唐以來往往姦雄竊據殘元之季為因荒旱明氏據有其地我朝賊首趙鐸等哨聚為患數年始克平定況人性猛悍易於倡亂今本處地方荒旱軍民缺食餓殍盈塗已為可慮而又有此非常災異建昌尤甚亦不可不為之深憂且上天變不虛示必由人事感召臣等訪得建昌原有銀場別無有司止是本處衛所軍餘煎辦嵗辦銀課數多十分困苦揭借月糧典賣男女不彀陪補因而逃亡數多嗟怨之積已非一年災變之示或由於此況本處不通舟楫尤艱於食又訪得四川缺食之人民流入陜西漢中者不下十數餘萬而湖廣飢民流來河南盧氏永寧者亦不止此其襄陽竹山等處潛住者亦衆前項地方往年無事之時尚有劉千斤李鬍子等之患況今飢饉之際難保無虞誠恐陜西河南官員止顧本處人民而外郡流來者既不給糧賑濟又不設法防間缺食待死之人因而聚衆劫掠其患非細萬一有此未免動調官軍糧餉從何仰給默思至此深可寒心其四川缺少人民目下雖是遣官賑濟頗可度日若種無秧苗秋成亦無所望將來所憂又不止此必須隨即量給種子方可濟其將來户部雖是差官二員賑濟一員又在湖廣督糧又恐不能周遍如蒙伏望皇上軫念地方乞降敕河南陜西湖廣巡撫鎮守等官督令布按二司巡守并撫民官員作急前去漢中盧氏永寧并竹山等處聚有流民處所將各處流民俱取見數一面多方設法量為賑濟一面嚴加曉諭防間務令流民得所不致貽患地方及請敕四川鎮守巡撫等官行令各該衛所府州將見在官軍壯手嚴加操習振揚威武用防不虞仍乞敕户部再差能幹郎中二員星馳前去四川一員専在建昌賑濟撫恤一員同先差郎中分投賑濟及行令差去湖廣督糧官員務要於湖廣地方糴買新鮮種子數十萬石運去四川或就令成都府所屬糴買若干量給災重地方無種人民督令趂時播種以繫人心不許權豪勢要一槩妄領仍將建昌等衛嵗辦銀課暫且停罷待後豐收之年所司另行奏請定奪庶幾地方可保無虞而災異得以少弭臣等職總風紀事關地方茍有所聞不敢緘默緣係思患預防事理未敢擅便謹題請旨陳言振肅風紀裨益治道事切惟贊襄治道固在於百司糾正百司莫先於風紀風紀振則百司自爾各盡其職百司盡職則庶績咸熙而治道隆矣自古君天下者未嘗不以此為先務焉洪惟我朝稽古定制在內設六科給事中十三道監察御史以司彈劾在外設提刑按察司以兼理都布二司軍民又設各道分巡以肅清一道巡按御史總監察焉良法美意至詳且密所以百餘年間相維相統內外肅然近年以來風紀不振是以姦宄得以逞其邪謀羣小得以恣其欺妄賄賂公行紀綱日紊帑藏錢糧浪費空虛貪官汚吏肆無忌憚仰惟皇上嗣登寶位崇重臺諫俾之盡言所以姦邪敗露羣小屏逐風紀頗振百司知警治道之隆端有望於今日矣臣猥以庸才荷蒙聖恩擢總風紀受命以來夙夜兢惕捫心揣已無由仰答知遇之隆進言納忠庶幾效涓埃之報謹以振揚風紀裨益治道一十五事條陳伏望皇上留心采納俯賜施行臣不勝幸甚天下幸甚今將所言事件開坐謹題請旨計開一選賢能以任風憲切惟御史為朝廷耳目之官任風紀之重必須得人方稱厥職我朝自洪武永樂宣德年間不分進士知縣教官皆得除授但選之甚精而授之不茍至正統年間朝廷頒降憲綱新進初仕不許除授御史至正統八年進士復得除之成化六年仍遵憲綱凡遇御史有闕止於進士出身知縣并行人內行取中間多有不分賢否但資格相應皆得授任者所以未盡得人如蒙乞敕吏部行移各處巡撫都御史巡按御史并布按二司官各於所屬進士舉人除授到任六年以上知縣內從公推訪亷慎公勤政績昭著民心愛戴實有聲譽者明白具奏遇有御史員闕吏部據此并於考滿行人博士內行取如果六年以上知縣員少於辦事二年以上進士中選取仍照例會同本院官考選具奏除授若所舉不實事發連坐以罪如此則御史皆得其人而風紀為之振肅矣一禁托拾以戒贓官自古重贓吏之法所以為安養斯民之計也蓋贓吏之害良民猶稂莠之害嘉穀稂莠不除則嘉穀無以遂其生贓吏不去則良民何以安其所故我朝於文職官吏受贓不分贓之多寡罪之輕重俱罷職役不敘枉法滿貫充軍其所以定贓吏之法可謂嚴且重矣比先年間巡按御史并按察司官拿問貪贓官吏事無所枉俱不敢托拾具奏其風憲官員得以展布四體而有司官員不敢恣其貪酷十數年來文武官員被人具告貪贓等項重情巡按御史按察司官行提到官對證明白律該為民充軍者往往讐怨原問官員托拾虛詞朦朧妄奏輒將原問御史等官奏準差官提解來京或就彼與先問囚犯一同對理縱辨無干受辱已甚稍有小疵多致降謫虧損國體沮壞風憲莫甚於斯所以風憲官員互相效尤各保職任坐視贓官不敢究問以致法度廢弛貪汚恣肆而小民不得蒙至治之澤如蒙乞敕法司今後凡貪贓等項官員被巡按御史按察司官提問明白追有贓私律該為民充軍不分已未發落妄揑虛詞托拾原問官員者或另行差官或備行巡撫等官先行提弔一干人卷勘問明白別無寃枉委係托拾該充軍者發極邊衛分充軍該為民者發口外為民若御史按察司官果有枉問及違法情罪明白參奏按察司官行巡按御史就彼提問御史罪重者行提來京情輕者候巡按滿日到京參送問罪不許輒便將御史等官一概奏提及就彼與原問囚犯一同取問仍行各處按察司出榜於所屬張挂曉諭如此則貪官知所警懼而風憲不致沮壞矣一擇人才以典刑獄切惟刑者國之重事死者不可復生斷者不可復續而司刑者不可不得其人也得其人則刑罰適中而下無寃民不得其人則刑罰濫及而上干和氣故雖臯陶掌刑而帝舜有明允之命吕侯司刑而穆王有敬明之戒是則司刑之官豈可不慎擇其人而任之哉我朝舊例凡各處按察司官有闕吏部於兩京法司御史即中員外即主事評事等官內除授都布二司理問所斷事司斷事理問及各府推官有闕俱於法司歷事舉人監生內除授尚不得人近年以來吏部將各處知府除授副使府同知知州除授僉事而推官斷事等官一概以年老監生除授且前項等官多有不識憲體不諳刑名問刑之際止慿姦吏任情出入傷天地之和召水旱之災未必不由於此及各處巡撫巡按并三司官多有將推官理問斷事往往差遣赴京或別項公幹經年半載不得回任以致問刑闕人尤為誤事如蒙乞敕吏部今後各處按察司不分問刑管屯整飭兵備等官有闕俱於兩京法司屬官內推選除授推官理問斷事有闕俱於法司辦事進士及歷事年力精強舉人監生內除授不宜似前一概濫除仍乞敕內外問刑衙門以欽恤為心以人命為重務求真情勿致虧枉仍行各處撫按等官不許將推官理問斷事違例擅便差遣有誤問刑如此則司刑者各得其人而刑不致於枉濫矣一責成效以革姦弊洪惟我朝設按察司以總理各道以肅清郡縣無非欲振揚風紀彰明憲度俾官吏守法而小民之獲安也其分巡官出巡往回月日亦有定制洪武永樂年間各處分巡分管官常川在外遍歷所屬接受詞訟禁革姦弊宣布教條訪察民隱所以貪汚知所警懼軍民不被殘虐近年以來多有顧戀妻子罔肯出巡所過州縣暮到朝行甚至偏僻去處經年不知地方事情全不留意官吏貪酷若罔聞知所以政令日隳而姦弊滋甚矣必須定與期限庶可責其盡職如蒙乞敕各處巡撫巡按等官今後布按二司分巡分管官員每年春二月中出巡七月中回司九月中出巡十二月中回司務要遍歷所屬每處所住不拘日期凡貪官汚吏蠧政害民及一切興利除害之事有益地方者務在舉行每季中分巡官將問過贓汚官吏名數追過贓罰等項數目及完過勘合詞訟分管官將催完過錢糧撫安過人民并一應合行事件各開報撫按處查考撫按回日仍具略節總類開奏乞敕該部候三年六年考滿之時據此黜陟若推姦避事曠職茍祿不依期限擅自回司者許巡按御史指實參奏究問若有地方緊急事情應回與撫按官計議者不拘此例如此則官無瘝曠而姦弊為少革矣一申命令以修庶務洪惟我朝洪武永樂以來於各邊添設將官假以節鉞之權以鎮守其地各處設都布按三司授以方面之寄以分理庶事無非欲振揚威武修飭邊備以防外侮之侵承流宣化激濁揚清以造生民之福彼時各官奉公守法仰副委託所以朝廷無外顧之憂生民免流離之苦近年以來各邊將官中間多有指以進貢為名肆意科斂軍士廣置第宅恣情燕樂軍馬凋弊而不整邊備廢弛而不修一遇有警動輒請兵其各處三司官亦皆因循茍且惟望升遷瘝曠逄迎罔思補報錢糧侵費詞訟不清小民控訴無門盜賊任其滋蔓此皆方今之弊而所當痛革者也伏望皇上降敕切責各邊鎮守總兵并各處都布按三司及巡撫官員務要下思安享祿位之榮上念朝廷付託之重洗心滌慮改過自新為鎮守總兵者用心操練軍馬修飭邊備務使軍士精鋭威武振揚以戰則勝以守則固為巡撫三司者務使朝廷恩澤之下布郡邑貪汚之斂迹倉廩充實軍民安妥凡百政令無不修舉如仍蹈前習許巡按御史從公糾舉國典具存決不輕貸如此則命令申嚴而庶務益修矣一逐術士以防扇惑切惟禁門不許擅入者所以防大姦也左道邪術之有禁者所以懼亂正也故我太祖高皇帝於大明律及皇明祖訓皆惓惓以致意焉其所以鑒前代之失而立萬世之規者其慮深且逺矣洪武永樂宣德正統年間邪異之人不敢輕至京師近年以來或扶鸞禱聖或書符呪水或燒煉丹藥或假稱耳報一切邪術人等往往來京潛住始則出入大臣之家終則進入皇城之內妄言禍福扇惑人心如往年李子龍近來李孜省鄧常恩之輩夤緣妄為人所共怒莫敢誰何幸而天厭其禍俱已敗露然雖敗於一時誠恐復於後日若不嚴立重禁何以警戒將來如蒙乞敕各該衙門行令巡城御史及五城兵馬司并錦衣衛巡捕官校嚴督地方人等各於所管地方逐一挨訪除軍匠旗校監生吏典承差知印天文隂陽生醫士上納糧草之人外若係邪術之人不分有無文引無故來潛住妄言禍福者俱要趕逐出京若一月不出仍前在京潛住者捉送法司問擬明白軍發極邊衛分充軍民發口外為民仍乞敕守皇城四門內外官員今後務要用心關防搜檢但有前項之徒及不係內府工作人役擅入皇城者就便拿獲具奏送問如有故違事發一體治罪如此則邪術有禁而人心不至於扇惑矣一擇守令以固邦本洪惟我朝設官分職各有體統上下相維以臻治理即古六卿分職各率其屬以倡九牧阜成兆民之意也今在外之官方面固重而守令為尤重蓋守令為親民之官得其人則民受其福不得其人則民受其殃自古願治之君未嘗不以守今為重往年知州知縣未盡得人該大學士李賢奏準凡遇朝覲之年吏部於聽選監生舉人內不分附選逺近考選銓除臣在陜西巡撫之時亦曽具奏於進士舉人內選擇除授以此大州巨邑民頗受惠近年以來各處知州知縣有一年不曽除授者甚至有二年除授不到者詢其所以蓋由吏部每選考試之時無堪任守令之人以此遲遲正官既闕佐二管事遲一日則民受一日之害且堂堂天朝豈無其人蓋因拘於附近年月所以不得越期除授誠恐豪傑之才坐淹嵗月多致衰老不得實用臣實惜之如蒙乞敕吏部查照大學士李賢奏準事例每年一次於聽選舉人監生內考選年力精強堪任知州知縣者若干人臨時於各衙門辦事進士內相兼選用不許將雜行之人除補仍預防州縣之煩簡斟酌人才之髙下除授其四川雲南廣西福建路途遙逺江水險惡所除官員一年之上方得到任若候闕到方才除去不無太遲亦須照闕預先一年除授前官縱有事故亦不至於一年之久至於布按二司官各府知府乃守令之綱也所係甚大尤宜慎選升用俾嚴考守令之賢否以報撫按撫按覆考是實轉逹吏部吏部再加訪察以慿黜陟如此則守令庶得其人而政事修矣一嚴考核以示懲勸洪惟我朝舊制凡在京各衙門屬官三年六年九年考滿之時本衙門考核後俱送都察院考核初任稱職者朝廷給與誥敕封贈其親不稱職者不得關給且有黜焉此乃勸善懲惡旌亷戒貪即古三載考績黜陟幽明之意也比先年間依此考核人無異言近年以來各衙門屬官因見本堂上官考稱本院詢訪行止平常考作不稱職者輒便揑詞具奏或造謗言原考御史多被連纍自此因循虛應故事以致賢否不分亷貪無辨祖宗勸懲之典廢弛殆盡若不從公考核無以警戒百司如蒙乞敕六部等衙門堂上官今後考核屬官務要察其平昔行止斟酌出與考語若本院考核不稱職官員敢有似前揑詞妄奏原考御史者許十三道御史將本官實迹明白劾奏有贓者問罪罷黜平常者降調外任其本官委係亷能而御史挾私考作不稱者一體治罪如此庶舊典不致廢墜而官僚知所警戒矣一禁公罰以勵士風切惟科罰科斂法律所當最禁者也邇來人心不古貪風愈盛天下府州縣官員不才犯此者固多中間有等曽經旌異或上司禮待稱為賢能者往往假公營私罰取百端一年之間所罰銀不下數百餘兩甚至千有餘兩者誠恐議論欲掩人之耳目或領支修理學校或給發蓋造衙門官用者百無一二入已者十常八九其三司官指以公用為由亦各濫罰財物憲宗皇帝明見此弊之甚曽降戒諭之敕比之穿窬之盜今弊尤存尚不知改且兩京為天下之本四方之極源清則流潔表正則影直兩京各衙門屬官中持正操節者固多而濫罰財物者亦有及供送柴薪皂𨽻到京正數已足縱容家人掯要銀兩致民嗟怨有玷士風如蒙乞敕各處巡撫巡按并布按二司各行分巡分守官員嚴加禁約所屬不許似前公罰財物虐害小民敢有不悛從公體訪得實不分有無原告就便拏問如律其三司官尤須律已正人毋蹈前轍如有故違巡按御史即便糾劾仍乞敕兩京堂上官各戒所屬以革前弊益敦亷恥之風共助維新之治如此則庶官各知所警而士風為不偷矣一廣儲積以足國用切惟自古君天下者莫不兢業自持省財節用恆以國用之不足為憂洪惟我朝列聖相承咸能愛惜民財不肯妄費雖賞四夷不過綵假所以內帑金銀常有數百萬之積近年以來羣小用事妄興造作欺罔多端以致府庫為之空虛天下為之困憊皇上嗣登寶位賞賚未周而內藏已蕭然矣況天下府州縣倉廩俱無數月之糧而各邊亦止有二年之用萬一邊方有事或水旱災傷將何以濟興言至此深可寒心如蒙乞敕户部通查在京及天下方面府州縣衛所大小文武官員及各王府宗支一應軍士若干共該支本色俸祿糧若干折色銀鈔若干通計天下嵗收稅糧金銀若干鈔貫若干有無彀用如果不足作何區處使不闕乏及內帑前項已空之數如何措置使之充盈或造鈔貫或鑄銅錢或清理鹽法或查勘屯田或閘辦天下之稅課或清查各處之船料凡理財之方足國之計無擾於民有益於國者宜從計處具奏定奪如此則儲積可廣而國用為之不乏矣一恤土人以防後患切惟思患豫防有國之大事防微杜漸保治之良圖臣切見順天府所屬固安永清武清漷縣及保定定州河間等處洪武永樂年間原安插土逹不下千户百十餘年生齒日繁雖同編氓終係異類即今精壯男子恐有萬餘為官者止慿俸祿而俸祿為有限在鄉者全藉田土而田土為不增況逹官折俸銀兩比先年間按季關支近來過二三季或一年不得關支者賴此養贍別無營生一有不足為盜行劫勢所不免萬一邊方有警不無乘機剽掠事之可憂莫大於此必須使之得所庶可保無後患如蒙乞敕户兵二部計議將在京各衛逹官折色俸糧務要按季關與及將在外各處土逹如果田土不足者或將空間地土或將入官莊田分撥各人耕種使足養其妻子不致失所以絶為盜之心以杜覬覦之念或選立屯長使有統屬或拘官操練得食口糧該管官員加意存恤果有違犯治之以法凡可以立久逺之規彌後日之患者宜從計處具奏定奪如此則撫恤有方而不貽患於後日矣一清僧道以杜遊食切惟天下之事有當緩而所係急者僧道是也蓋當緩者僧道也所係急者民食也若視僧道為緩而不嚴加清查則遊食者日衆而民食恆不足矣我朝定制每府僧道各不過四十名每州各不過三十名每縣各不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共額設僧三萬七千九十餘名成化十二年度僧一十萬成化二十二年度僧二十萬以前各年所度僧道不下二十餘萬共該五十餘萬以一僧一道一年食米六石論之共該米二百六十餘萬石可足京師一年嵗用之數況又不耕不蠶賦役不加則食之者衆而為之者少矣其軍民壯丁私自披剃而隱於寺觀者又不知其幾何創修寺觀遍於天下妄造經典多於儒書敗化滅倫蠧財惑衆自京師達之四方公私之財用於僧道者過半民食不足未必不由於此其勢又不能盡去若不通查嚴禁則將來遊食者何有紀極如蒙乞敕禮部通查天下并在京寺觀共若干處僧道共各若干名除額度之數外多若干名如果數多既已關有度牒難以追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有故違再言度僧者許科道官糾劾拿問仍通行各該撫按等官督責官司嚴加查勘但係新修私創寺觀即便拆毁併於古剎大寺觀其中但有原無度牒行道童即令還俗當差敢有私創庵觀及容隱未度行道童收為徒弟者各問發口外為民寺觀住持還俗為民僧道官罷黜不舉者罪同所司官員容隱者亦治以罪仍通行天下撫按出榜嚴加禁約仍令各寺觀按月開報不致故違重甘結狀付所在官司查考如此則僧道無濫度之弊而民食不致坐費矣一敦懷柔以安四夷切惟四夷來貢者慕化之誠朝廷優待者柔逺之道此前代之所行亦我朝之故事也洪惟我太祖高皇帝膺天明命汛掃前元太宗文皇帝神武雄略威震朔漠四夷八蠻罔不來貢賜以綵縀衣服待以下程筵晏十分豐厚使之厭飫所以畏威感恩蠻夷悅服自成化年間以來光祿寺官不行用心局長作弊尤甚凡遇四夷朝貢到京朝廷賜以筵宴與之酒食大宴品物頗可而朔望見辭酒飯甚為菲薄每樣肉不過數兩而骨居其半飯皆生冷而多不堪食酒多攙水而淡薄無味所以夷人到席無可食用全不舉筯且朵顔等三衛海西等處風氣朴略或不為意而安南朝鮮等國使臣豈不譏笑臣昔往遼東整飭邊備曽聞夷人怨言亦嘗具奏蒙憲宗皇帝敕令禮部光祿寺凡遇宴待夷人禮部該司官并光祿寺堂上官各一員巡看一時頗可今猶如舊臣若不再言年復一年益加茍且非惟結怨於外夷其實有玷於中國此事雖小關繫甚重如蒙乞敕禮部查照洪武永樂年間事例及欽奉纍朝奏蒙詔旨行令光祿寺今後凡遇外夷朝貢到京或該筵宴或朔望見辭酒飯務要照依先年定例差官看視下飯斤數不許短少飲食菜蔬俱堪食用酒亦不許攙水今後除筵宴外其午門外夷人酒飯仍令每日侍班御史巡看但似前尅減酒肉十分菲薄者許將光祿寺官并局長等參奏拿問如此庶使懷柔有道而得外夷之歡心矣一節財用以蘇民困切惟為國莫先於愛民愛民必先於節用茍不節用必至於傷財傷財必至於害民雖有愛民之心而民不被其澤矣仰惟皇上嗣登寶位之初重下寬恤之詔示以憫念小民凡事減省之言此即大禹克勤克儉文王視民如傷之盛心也天下蒼生無不欣戴且我朝洪武永藥洪熙宣德年間生養休息軍民富足故雖外征北敵內營宫殿樂於趨事未嘗告勞自正統十四年以後天下多事民始覺困自成化年間各處鎮守等官爭相進貢科取百端民愈凋憊加以山西河南陜西連年荒旱不收有司素無儲積民之死亡過半田土荒蕪而糧稅如故北直隸山東之民養馬供柴而征徭尤重江南各省人民輸納京儲及供兩京內府物料民困財竭未有甚於此時者也若非節財之用生養休息十數餘年豈能蘇其困憊然節用之道必自內府減省始如蒙乞敕户禮工三部各查內府衙門自洪武永樂洪熙宣德正統年間一應供用之物如油蠟豬羊雞鵝及擡柴夫工價銀兩等項某年用若干某年添若干通查明白逐一上陳御覽斷自宸𠂻量加減省若減省一分則民受一分之惠就為定例不許各衙門再行具奏增添尤望皇上自今凡百用度賞賜更加撙節罷不急之修造裁冗食之人員則帝王克儉之盛德復見於今日而民困為少蘇矣一足兵戎以禦外侮切惟為國之道足兵為先兵有不足外侮何禦書曰張皇六師兵法曰亡戰必危是知自古莫不以兵戎為重洪惟我太祖高皇帝創制之初設衛籍兵天下之軍共有數百餘萬即今百十餘年而逃亡死絶者過半蓋由里老埋歿而無册籍之可查衛所作弊而無文卷之可慿雖有清軍御史而清出者百無二三雖解到衛所而隨逃者十常八九若再加百年絶故愈多此軍士消耗之弊如此也其見存之軍江南者俱各守邊備倭儧運糧儲江北者俱赴京邊輪班操備而在衛守城不過老幼數百人都司操練止有餘丁一二千名居重馭輕京師軍士雖有二十餘萬南京官軍雖有五萬之上然多有名無實況騎射之未精什物之未備加以連年做工疲困已極輪班往返艱難尤甚此軍士見存之弊如此也消耗之軍既不能復見在之數又不堪用兵戎誠為不足遇警將何調用況今外夷猖獗於甘涼出沒於西北強賊又哨聚於江右此皆腹心之患而大有可憂者如蒙乞敕兵部通行天下都布二司各行所屬衛所府州縣有司將所管各里軍户充軍衛所官旗姓名逐一查理明白衛所各將所管軍人姓名籍貫充軍來歷年月審勘無差各備造文册江南者送南京兵部江北者送在京兵部各將洪武以來舊册查對如有差訛即便改正仍收備照務要磨勘明白除年逺盡絶外將宣德以後逃故之數每省各抄謄一本該部照例通行各清軍御史嚴督所屬用心清理不許視常虛應故事庶姦詐之徒不敢作弊埋沒其京營官軍候營造憲宗皇帝山陵畢日乞敕兵部徑自具奏請命本部堂上官一員會同各營總兵官將見操軍馬逐一查理先儘圑營務足原額之數其南京各營官軍乞敕南京內外守備官員會同南京兵部堂上官一體清查仍各禁約管軍官員不許私占役使及擅撥做工等項致纍逃亡候清查完日各另回奏仍造册送兵部查考其見在軍士務要著實操練精其騎射養其鋭氣一遇征調俾克成功如此則兵戎不致消耗而戰守為有備矣𢎞治元年月日題撫恤南都軍民事照得南京乃祖宗根本重地陵寢所在攸關非細防姦禦侮全藉官軍軍國所需尤賴民庶必須使之得所庶可保其無虞臣訪得南京官軍専靠俸糧養贍其武職本色俸米每年九月十月折支絹布有過一年不得關支者其折色鈔貫等項二年之上方得關支者詢其所以蓋由南京內府該庫收放絹布內官比上年間止是二三員近年增添七八員凡遇各處送納絹布大户到來每絹一匹要使用銀三四錢每布一匹要銀一二分包攬大户乘機作弊納户無銀使用只得棄絹逃回經年纍嵗不敢前來上納動輒拖欠上萬餘匹各衛委官通同買頭故意遷延以此不得關支只得減價賤賣於人而預先揭借俸糧者尤多其各衛所替役補役併新解逃故軍士户丁到來南京兵部查勘明白行仰該衛收役食糧本衛造於食糧項下該部查算明白行倉放支係是定例其南京户部務要逐名具狀赴通政司告送本部行衛查勘重復保結多則三四月少則一二月方得公文到部上下打點用銀一二兩俱係揭借月糧比及支糧月分又被債主關去因無食用隨即逃亡以致操練數少武備不足及洪武年間駕在南京其御馬監養有大馬餵飼苜蓿以此每衛撥空間地土著令軍士種藝苜蓿以供餵馬至永樂年間遷都北京而南京御馬監別無大馬原種苜蓿地土又被勢要占去本監仍要各衛出辦苜蓿因無所産只得出辦價銀每衛多者四五十兩少者二三十兩一年不下千百餘兩逼迫軍士揭借月糧稍有遲慢衛所官員受責多端況造送快船等項家無空丁差無虛日此南京官軍受害之大弊也及訪得南京工部遞年該辦打造快戰等船木料比先年間本部收有太平鎮江等八府人户承佃蘆洲賣蘆價銀不下數萬餘兩支給買辦價無所虧近年以來前項蘆洲為因本部具奏召人承佃多被無藉之徒占去無有銀兩送官凡遇買辦木料俱於應天府鋪户賖買年復一年即今欠少鋪户木料價銀三萬五千餘兩其欠少各項買辦顔料等物價銀尤多鋪行取於鋪户鋪户取於逐門户户受害怨言盈途其上元江寧二縣人户在廂者支應往來欽差內外官員下程及漢府織造假匹一應合用之物併內府花園夫修理進貢鰣魚厰外廓城等項在鄉者出辦答應過往併南京各衙門公差官員人夫皂隸俱要用銀雇覔每名月該銀七八錢前項坊廂在鄉人户一年共該出銀萬兩有餘年年如是無有空嵗此南京鋪户人民受害之大弊也恭惟皇上嗣登寶位屢下明詔革罷應天府織造縀匹南京軍民歡聲載道如獲更生傳聞猶欲織造愈加驚疑夫以南京之內所賴全在軍民平昔既不能使之得其所臨時何以責之效其力必須痛革前項之弊可保無意外之虞如蒙乞敕南京守備內臣將該庫收支絹布內官量為減去新添之數仍令遇有南京户部送到絹布到庫早為收受不許掯要使用錢物過多及查南京御馬監如無大馬將苜蓿價銀革去止令牧馬所軍人將草喂養見在馬匹其漢府織造縀匹機張等項照依欽奉詔書內事例革罷以蘇軍民困苦及鰣魚厰房屋如有損壞方令修理不許指以修理為由年年擅令應天府出辦銀兩花園人夫如果不係洪武年間額設之數不許久占辦納月錢仍乞敕內外守備官員行移户部將南京各衛但係替役新解併自首復役軍人該南京兵部查勘無礙行令本衛著役收支月糧者本部止照在京户部事例造册收糧不許刁蹬又赴通政司告狀重復保勘致纍逃亡及行南京工部將有蘆場地委官踏勘明白照舊追收蘆價銀兩給還欠少鋪户木料價值今後凡遇買辦務要先給價銀不許逼迫賖買負纍鋪户及乞敕巡撫南直隸都御史將應天府上元江寧二縣該出前項差役銀兩時常查考當減省者減省當撙節者撙節不許妄費有傷民財臣曽備員南京熟知此弊其來已久恭遇皇上圖治愛民逺追禹舜臣叨總風紀責在澄清若知南京軍民不得其所緘默不言不惟有負皇上任用之意抑且得罪祖宗在天之靈故敢昧死上陳伏乞聖明留意南畿軍民幸甚臣不勝幸甚緣係革弊撫安南都軍民事理未敢擅便謹題請旨𢎞治二年月日具題端肅奏議卷三
