body:
  text: 端肅奏議卷九明馬文升撰處置銀兩以濟邊餉事照得近年因北敵小王子人馬數萬往牧河套犯我邊陲朝廷軫念地方重恤生靈命將出師往彼征剿主客軍馬五萬之上日費糧料草束不止千金但以陜西人民自成化二十二年大遭飢荒死亡過半加以去歲延慶二府旱災無收各邊糧素無積蓄欽差總督邊儲大臣誠恐邊餉不敷設法分派腹裏人民轉運訪得每糧石除本色外用腳價銀二三兩每草一束除本色外用腳價銀一錢二三分方得轉運到邊里無空户户無間丁懼怕殺虜逃亡者衆此外無計可施纍次具奏有欲軍民上納銀兩授以武職者有欲生員納銀許其入監者有欲僧道納銀給以度牒者有欲吏典納銀免其京考者各衙門恐傷治體多不允從戶部或開中鹽引茶課或行取皂𨽻銀兩東那西輳方得六十萬兩之數又於河南預備秋夏稅糧本色一十七萬石以每石用銀二三兩計之須得銀五十萬兩每兩須賣榖麥二十石而民何以堪今陜西一方用兵未及半年之餘本色之外用銀已該前數况遼東女直合謀侵犯未見寧息而湖廣貴州見今相繼用兵近聞南北直𨽻河南山東有大水蟲蝗之災秋無所收春來小民缺食嗷嗷待哺必須賑濟有司倉廩空虛帑藏銀兩不多不知將何以處置耶仰惟我太祖髙皇帝平定天下之初經制國賦論田定稅驗畝徴糧天下相同今該各布政司并直𨽻府州縣折糧價銀多有不一有每石折銀二錢五分者有折銀一兩用價八九錢者少亦六七錢者草每束有折銀三分者有上納用銀六七分或四五分者除官錢并加倍糧數及廣西雲貴外不為常例權時之冝自𢎞治十四年為始每糧一石暫增銀二錢每草一束暫增銀二分則數十萬兩之銀可立而得况出自地畝分所當然比之每石折銀一兩者不及其半用價三兩者霄壤不侔既不係橫徴重斂亦不係額外濫收衆輕易舉民亦樂從候邊方寧靜照舊折納不猶愈於前項賣官鬻爵等項事例有虧治體而見輕外夷乎急濟邊餉計無出此伏望皇上念邊務之方殷思軍餉之不足斷自宸衷敕下户部早為查處毋惑羣議必於施行凡百官員不許阻撓臣叨任大臣職掌兵政恨河套敵寇未曾殄滅憫陜西人民供運疲困恐生意外之虞寢食不遑日夜思維不避怨謗而建此生財助邊之議更乞聖明留意邊方生靈不勝幸甚為此具本親齎謹題請旨地震非常事查得近該巡按陜西監察御史燕忠奏稱據西安并長安等縣申稱𢎞治十四年正月初一日申時分忽然地震有聲從東北起響向西南而去動搖軍民房屋本日酉時分復響有聲如前至次日寅時又響如前及據本府朝邑縣申本年正月初一日并初二日寅時地震聲響如雷自西南起將本縣城樓垜口并各衙門倉監等房及概縣軍民房屋震搖倒塌共五千四百八十五間壓死大小男女一百七十名口壓傷九十四名口壓死頭畜三百九十一頭隻及縣東北正東東南地方安昌八里一十九處遍地竅眼湧出水深淺不等泛流震開裂縫長約一二丈者四五丈者湧出溢流良久方止蔡家堡嚴伯村等四處湧出幾流成河不時動搖自本日起至十五日尚震未息人民驚惶四散逃避髙阜去處搭庵存住等因隨據延安慶陽二府及直𨽻潼關等衛各申稱所屬州縣與前長安等縣日時地震聲勢相同具奏該禮部抄出又訪河南河南府靈寶等縣亦各地震如前臣惟地乃靜物止而不動動則失其常也考之古典地震乃臣不承於君外敵不承於中國之兆歷代固有地震未有震於正月朔日者亦未有震開而裂水出將成河者此乃非常之異古今所未多見者也况朝邑縣南近華嶽東連黃河而潼關之山實與華嶽相連潼關朝邑地震如此之甚則華嶽黃河必為之震溢矣且兆不虛示必有其應况陜西乃關中重地四鄰番冦而延慶二府又與河套密邇正月朔日地震而敵人十五日擁衆入寇榆林外敵侵陵中國之兆亦已明矣臣聞此大異驚愕莫知所措除痛加修省外照得即今北敵小王子部落日衆精兵數萬其酋首火篩者梟雄桀黠往往以詐計敗我官軍近來入寇少散搶掠專一攻圍城堡燒毁草束而用兵且精亦有號令觀其所存其志非小若不使之大遭挫敗逺遁隂山或自相讐殺部落離散年復一年得我厚利獲我兵甲以彼之馬力藉我之技巧恐終為中國之大患也仰惟陛下宵旰憂勞勵精圗治雖古帝王亦不過是冝其兩儀奠位四夷賔服今陜西地震如此其異非常是皆天心仁愛陛下故示此以警告之欲其早為修省而保鴻圗於億萬斯年也今海內民困財竭兵衰將懦紀綱未大振法令未大行文恬武嬉奢靡成風敵寇猖獗人心渙散此正安內攘外之時修德弭災之日伏望陛下祗畏變異修省尅責行仁政以安養斯民重臺諫以廣言路府庫之金帛重為撙節以備緊急之用無益之齋醮暫免修設以省浪費之繁念錢糧之空虛止傳奉無例之官憫畿民之艱窘禁奏討有礙之地遵聖祖之訓每清晨視朝法列聖之規日奏事二次今敵住河套正在用兵之際乞將陜西織造絨毼內官早取回京以蘇一方軍民之困存其餘力以備三邊飛挽之急仍乞敕翰林院撰寫祭文禮部奏請差官齎捧香帛前去陜西致祭西嶽華山西鎮吳山之神更乞敕陜西巡撫都御史將被震倒塌房屋及壓死壓傷軍民之家每門量給銀若干兩以為賑恤埋葬之資及將所屬一應不急之務俱暫停止凡百安緝之方悉從舉行猶須操練軍馬修理城池務使地方寧靜軍民獲安內治既修則外患不足畏矣臣荷國厚恩五十餘年官居保傅職掌兵戎國家安危實同休戚覩兹變異無任憂惶伏望陛下察臣愚衷憫臣勞瘁前項所陳一一俯賜施行則臣安享厚祿不為􅌤顏而陛下言聽計從亦不虛負纍次勉留溫切之詔矣宗社幸甚生靈幸甚為此具本親齎謹題請旨𢎞治十四年二月十八日具題傳奉事切惟國家之患莫大於天災天災之重莫先於荒旱蓋荒旱則田無所收而民必至於缺其食食缺則命不可保而必至於為盜盜賊蜂起而禍患所由作矣自古君天下者莫不為憂而所以致此者豈無自而然哉仰惟皇上稟上聖之資居天位之尊大孝隆於兩宫仁恩溥於四海聲色之不邇貨利之不殖任賢去佞從正抑邪無一令之不臧雖古帝王亦不過是冝其海嶽效靈而雨暘時若三辰順序而百穀用成夫何去歲浙江溫台寧紹江南直𨽻太平寧國及應天府所屬江北直𨽻鳳廬淮揚滁和等府州夏秋不雨田禾無收百姓缺食逃移流亡餓殍盈途荷蒙皇上敕命憲臣及巡撫都御史巡按御史并南京守備等官大加賑濟但生齒至繁錢糧有限所活者固多而餓死者尤衆豈期今歲鳳廬淮揚滁和等府州并順天北直𨽻大名等府河南山東二布政司所屬州縣自春至夏仍復不雨麥多枯稿榖未播種人心徨徨亦無所望况漕運京儲尚未過淮此大有可憂之時也凡此皆臣等叨任大臣復竊厚祿不能燮理隂陽寅亮天地宣布德澤以惠養黎元減省徭役以滋培邦夲所致亦由在京內外衙門官員中間或有恣肆貪婪無所忌憚在外三司等官亦多縱惡容姦不行禁治所以軍民受害積怨於中上干和氣致有旱熯之災臣等又不倫預為建明至厪聖慮特降綸音不勝惶汗除內府各衙門弊政已蒙欽降聖旨榜文禁約外而在外衙門積弊亦不可不革革弊貴有其要得其要則弊不革而自無矣其要惟在於振紀綱嚴法度而已此時紀綱漸弛法度少寬內外衙門弊政之多實由於此誠如皇上斷自宸衷俯賜施行更乞推此心以施之庶政凡百司官員有犯者無分內外無間疏戚悉置於法無少假貸執此之政堅如金石行此之令信如四時如此則紀綱振法度行貪殘知懼而弊政自無宗社億萬無疆之休端在此矣臣干冒天威不勝戰栗懇悃之至緣係應詔革弊事理未敢擅便開坐謹題請旨計開一戒百官以修庶政洪維我朝稽古建官內設五府六部都察院等衙門各統屬官以分理庶務外設都布按三司各率其屬以安養軍民上下相維體統不紊雖唐虞三代亦不過是國初法令嚴明官知警畏敢有犯者重則置之典刑輕則流竄革職以故官無輕犯犯無輕貸所以庶績咸熙而萬姓樂業未聞有所謂弊政者矣自正統年間以後每遇災異朝廷必降敕切責修省咸知警畏近年以來在內官員守法奉公而盡心所職者固有聽囑納賄而任情行事者亦多或競華侈於輿馬衣服之間或誇美麗於居室妻妾之奉上下因循職業不修法日以弛而政日以弊在外大小官員或極力以奉承權要或恣意以剝削軍民科罰以遂其私淫刑以逞其暴巡按等官亦多姑息旌異亷能之奏月無虛日參奏貪酷之官歲或一見以致困窮無告寃抑莫伸政愈苛而民愈殘皆足以上干天和召災致變誠非細故庶官之賢否係生民之休戚若非官得其人弊政何由而革治道何由而隆災變何由而弭乎伏望皇上降敕兩京府部等衙門并巡撫巡按都布按三司官各要正已正物為國為民嚴戒所屬恪遵國憲各修其職務令謹其操持俾弊端悉革而物議少息上體朝廷圗治之心下解生民倒懸之苦庶幾官得其人政得其理和氣日臻而災沴自消矣一公勸懲以别淑慝臣聞唐虞之法三載考績三考黜陟幽明厯代遵行莫之或易我朝法古為治參酌時冝凡內外大小官員俱以三年為一考在內先從本衙門堂上官考核咨送本部定其稱否在外從本府并布按二司官考核各出考語三考各赴部給由定其黜陟在外方面府州縣官再遇朝覲之年本部憑巡撫巡按布按二司揭帖考語黜其不職官頗知懼其兩京堂上官例不考核凡遇災變科道官必指名劾奏請議凛然但五品以下官員名位未崇不在糾劾之列止是五年一次本部公同各衙門堂上官考察但年期尚逺各官雖有不職者亦或遷轉而去以此漏網者多及至給由各該堂上官考核詞語又多溢美中間清譽無聞物論不與者亦不開平常不稱職等項勸懲之典又或未公在外巡撫巡按按察方面等官責任非輕近年皆尚和同風紀欠振以致貪虐滋甚有壞事殃民迹狀敗露為言官所劾者往往付之查勘所以各官肆無忌憚患失之心一生固位之謀百出此弊政之大者也今後在內屬官果有貪淫不謹實迹昭然人所共知從本衙門堂上官指名舉奏以憑罷黜其在外大小官員有的為民害贓虐顯露者許巡撫巡按官拿問如律前項內外官員尚有知之未盡而漏舉者本部訪有的實事情奏請定奪庶幾勸懲以公淑慝以别政無不清而弊無不革矣一清傳奉以節冗費先準兵部咨為救荒弭盜以安地方事該本部會官計議題奉聖旨各處地方災傷重大民生困苦朕甚憫惻卿等所言深切時弊事當行的還查議明白開具來説欽此欽遵查議間今奉敕旨臣等切惟人君之大柄莫先於惜名器國家之首務莫急於節財用蓋名器不惜則官必至於冗濫支費無窮而財用有不足矣君天下者豈可輕之而不重者哉仰惟太祖髙皇帝奄有天下之初稽古建官各有定員非效勞任事者額外未嘗輕授一官彼時事無不立而政無不修所以府庫之財用有餘雖遇兵荒未嘗告乏列聖相承咸率是道未聞有傳奉之官至成化年間始開傳奉之門而冗官為之漸多十六年因遇星變廷臣論奏奉憲宗皇帝聖旨傳奉文職大小官員除勳戚功升蔭授祿用不動外其餘及儒士都寄名放回有闕取用內有為事妄冒并乞恩升授的查來定奪各衙門匠官精通藝業的存留著支半俸欽此欽遵綸音一下中外歡欣鼓舞咸以為雖漢武輪臺之詔亦不能過但當時傳升官員尚有退之未盡者恭遇皇上嗣登寶位之初俯從言官之請但係傳奉官員盡行裁退天下欣然稱頌仁明奈何近年以來大小官員傳奉者復多其他亦有白衣人送中書處食糧習字出身得授中書舍人者前項傳升等官一年該支俸糧動至數萬石皂𨽻銀不止萬餘兩况今親藩已至三十餘府而郡王將軍中尉郡主郡君縣君儀賔等項不下千數所用祿糧通該百萬石有餘而兩京軍職比之洪武永樂年間員增數倍加以軍國之費所以內外倉廩空虛帑藏匱竭一遇兵荒動至賣官鬻爵而措之無方矣且國家貢賦有限皆小民膏脂供彼無功之庸輩月計不足歲計有餘則天下生靈豈有不困而府庫之財豈有不竭者哉本部屢嘗上請乞退此等冗官人等以省財用俱未蒙俞允亦有留中未出者且古者官以待有功賞以酬有勞有功者斯授以官有勞者斯加其賞今各官不過由一藝小能無大功勞叨授官職妄費錢糧無益於事是亦弊政之一端也仰惟皇上敦行大孝善繼善述其於先帝良法美意獨不能遵而行之乎伏望皇上大奮乾綱俯從羣議將額外傳升及乞恩所升官員及中書處習字人數除勳戚并進藥有效書寫制敕及大臣并經筵講讀官子孫外其餘通行裁革間住或止許冠帶榮身隨藝供事仍乞今後凡有代替乞恩傳奉升官之人斷之以義不徇以請自以塞幸門而戒奔競庶名器不濫而國用少足矣𢎞治十四年五月初二日具題暫且停止奉送神像以蘇民困事查得近該御用監太監王瑞等奏稱欽蒙差往湖廣江西等處公幹合用黃快船六十隻帶去官舍勇士人匠八十六員名乞要應付等因奉聖旨是欽此欽遵抄出除照例應付外及詢討船之人俱言往武當山送玄帝神像近又該司禮監太監陳寬傳奉聖旨朕弟汝王之國凡一應合行的事該衙門便照例開具來説欽此除欽遵施行外近又該巡按直𨽻監察御史丘天佑奏稱直𨽻池州府貴池等縣地方五月十一日起十三日止驟雨連綿山水泛漲勢約三丈淹死男婦二百六十一名口漂流居民房屋一千九百餘間臣又聞河南山東南北直𨽻遼東山西自七月以來天降驟雨平地水深數尺漫倒城垣沒淹田禾自通州直抵湖廣江河兩岸無處不被水災而河南黃河之水為害尤甚各處秋田必無所收况今陜西外夷在套勢甚猖獗未見剿平勞及三省民不聊生而遼東敵人亦未寧靜湖貴苗夷倡亂方且用兵此正天下多事之秋也仰惟皇上奉送玄帝神像於武當山固是為國為民祈福之意而神亦以好生憫物為心臣昔巡按湖廣親詣本山看得宫殿雄麗神像尊嚴此皆我太宗文皇帝所造其制度規模無以復加矣皇上若欲奉送神像使時年豐稔邊方無事不甚勞傷且猶不可况今天下水旱蟲蝗邊方用兵親王之國民困財竭之際而乃有此舉甚非所冝恐神亦不安福亦不降矣欽命內臣并帶去官員匠役如此之多所過去處該用人夫動輒數千差去官員固為安靜終是勞傷况自京城至於通州道路泥濘人馬難行尤為不便臣纍荷列聖莫大之恩叨官五十餘年幸蒙皇上委任隆重職掌兵戎官居保傅責在輔弼使天下之人竊議當此多事之秋而為此可已之事誠恐後世史必書之臣若不懇切為皇上言之是孤眷遇之恩勉留之意則臣負國之罪將何所逭哉伏望皇上憫念生靈察臣愚忠將前神像暫且停送俟年時豐稔邊方寧靜民困少蘇之日差官送去亦不為晚倘納臣言宗社幸甚天下幸甚臣干冒神嚴不勝戰栗恐懼之至為此具本親齎謹題請旨𢎞治十四年閏七月十六日題豫防邊患以保重地事臣竊聞事貴早圗患當豫防易曰履霜堅氷至書曰制治於未亂此皆防患於未然圗事於未萌也凡事固然邉患尤甚故昔魯侯征徐戎之亂吉甫伐獫狁之侵莫不先事而慮內修而外攘也載諸書史昭然可徴切照甘涼地方乃古外夷左賢王之地漢武帝傾海內之財勞數十萬之衆方克取之設立酒泉張掖等郡以斷胸奴之右臂蓋北有徑敵為鄰南則番戎所處若不分而離之使彼此相合不下數十餘萬而中國何以當之則甘涼地方誠為西北之重地也漢唐之末終不能守而趙宋全未能得至我朝復入職方設立都司屯聚重兵故我太宗文皇帝深謀逺慮首命內臣總兵以鎮守其地邊境晏然無事干戈後至正統初年敵人多爾濟巴勒等為患數年靖逺伯王驥定西侯蔣貴始克平之逮至天順年間敵人博囉摩囉歡等侵犯此地朝廷命將出師未能剿平既而寧夏副總兵仇亷前去截殺兵過蘭州迤北輕率寡謀被冦所誘數萬人馬喪亡過半自後冦賊入於河套侵擾陜西而甘涼地方稍為寧靜近自成化二十年以來此冦知彼將不得人生畜蕃息復往彼處侵擾者又數年矣不入則已入則必得厚利而去所在生畜搶掠殆盡而人口虜出者不可勝計官軍失事被其降調者亦難悉數况先因進貢等項各該衛所罷困已極所以敵人知我虛弱益肆猖獗而侵擾之心未嘗少已且陜西路通甘涼止有蘭州浮橋一道若敵以數千人拒守河橋糧運不能通援兵不能進不數年而甘涼之地難保無虞萬一甘涼失守則關中亦難保其不危近日本院節準兵部咨文該甘涼等處鎮守總兵等官具奏敵人入境或五六十騎或一二百人其所在各城堡官軍所報不曰追至某處路逺天晚恐墮賊計掣兵回還必曰用箭射死敵人數多俱被鈎拖去訖未嘗見其奏有挫衄賊鋒斬獲賊級數多者止是陜西靖邉衛官軍斬獲敵人首級三十七顆而人民被其虜掠者亦不知其幾何况邇因甘涼等處闕糧陜西臨鞏二府人民已經儧運數次困苦不勝近該巡撫甘涼都御史羅明差來奏事舍人石玘臣等詢問説稱成化二十三年十二月二十三日敵人自涼州直抵陜西蘭州一帶入境搶掠四五日得去頭畜人口不知其數今甘涼總兵等官奏稱止被敵人搶去夜不收馬五匹且前項敵人連年搶掠每得厚利邊將畏懼罪責往往務惟隱蔽誠恐此敵窺知我邊糧闕兵寡即目天氣炎熱逺遁窮荒固覺無事但恐秋髙馬肥弓徑之日糾合别種部落擁衆入寇我邊無備不無又遭蹂躪年復一年彼敵益為得志而甘涼之地大有可憂思患預防不可不慮如蒙乞敕兵部計議甘涼各城見有馬步官軍若干若敵人擁衆犯邊有無足彀調用如或兵數不足預調何處客兵前去截殺雖曰延綏調兵三千往來不常久駐則虛費糧草頻回則徒勞士馬遇敵入冦緩不及事如何為冝及行彼處總兵等官計議敵若擁衆侵犯用何方略挫其初來之鋒設何奇謀遏其深入之勢敵若據守河橋援兵從何而進糧運從何而通方略早定人馬豫集務使此冦大遭挫衄不敢犯我邊方用紓朝廷西顧之憂永絶邊陲侵掠之患明白具奏期於必行仍乞敕户部查算甘涼各城見在糧草若干可彀彼處軍馬幾年支用如調客兵有無闕乏如或不足作何措置使糧草有數年之積不致臨時有闕乏之虞若再令腹裏人民儧運千里饋糧民有飢色樵蘇後㸑師無宿飽皆兵家所忌况陜西之民瘡痍未復尤非所冝前項二事先時計慮猶恐為遲若臨時方籌不無誤事事之大有可憂者無過於此故我皇明祖訓有曰夷戎與西北邊境互相密邇纍世戰征必選將練兵時謹備之者正慮此耳臣等叨任大臣濫總風紀茍有所聞事關地方不敢緘默緣係預防邉患以保重地事理未敢擅便謹題請旨𢎞治元年四月二十九日具題端肅奏議卷九
