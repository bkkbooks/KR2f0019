body:
  text: 端肅奏議詔令奏議類二奏議之屬提要臣等謹案端肅奏議十二卷明馬文升撰文升字負圖均州人景泰辛未進士官至兵部尚書諡端肅事迹具明史本傳文升砥礪廉隅練達政體朝端大議往往待之而決與王恕劉大夏俱負一時重望此集奏議五十五篇乃嘉靖丁未其孫天祐所編次凡史傳所載直言讜論全文皆具載集中其請正北嶽祀典於渾源州一疏則本傳不載而見於禮志其為左都御史時所言振肅風紀十五章史傳不詳其目今亦獨見此書大抵有關家國至計惟文升於成化中巡撫遼東總督漕運著有勞績當時必多所建白乃集中概不之及而自孝宗召用以後所陳奏者則甄録無遺蓋當憲宗之時文升雖揚厯中外而屢為汪直李孜省輩所搆不能盡行其志及其被遇孝宗明良相契得以展布其謨猷故所言盡為剴切其生平靖獻之志略具是編讀其文可以知其所遭際矣乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:756f4496e1bafe5683089c5e2ab2b790301b91000e127081cc18ed3ec9c6cb4c
