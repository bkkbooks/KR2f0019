body:
  text: 端肅奏議卷十明馬文升撰賑恤饑民以固邦本事仰惟我太祖髙皇帝所存者仁民之心所發者恤民之政凡遇水旱災傷百姓闕食必蠲免稅糧復加賑濟雖豐收之年猶度倉廩有餘去處量為減免是以民皆家給人足而無凍餒之憂列聖相承率循是道近年以來工役頻興科差繁重加以北敵犯邊逺供軍餉財匱力竭而民始有不得其所者矣今歲夏秋大雨驟降連綿旬餘順天并直𨽻保定河間真定順德永平等府直𨽻淮安等府徐邳宿等州山東兖州等州曹縣等縣河南開封等府所屬州縣田禾被水淹沒及有蟲蝗猛風之災秋無所收民多闕食臣每詢前項去處闕食人民流移滿道十室九空攜男帶女鬻賣易食啼號奔走絡繹不絶臣思當此隆冬之時衣食無依棲之無所死於道路填於溝壑有傷和氣深可憐憫見在者又被有司追徴錢糧愈加逼迫或以素乏倉糧不能賑濟况至明年夏收尚有半年之期將何度日又聞盜賊去冬殺死沛縣知縣今秋殺死邳州判官民窮盜起理勢自然而徐邳之間自古奸雄之徒多起於此恐釀成地方之患尤有大可憂者且小民豐收之年出賦稅以供朝廷今當闕食之際豈可不加賑恤以施恩惠乎况前此每遇水旱災傷去處必差官賑濟今歲大水蟲蝗之災尤甚於前時賑恤之典必須舉行臣叨任大臣銓衡固所職掌民瘼尤所當言伏望皇上以邦本為重以民饑為憂乞敕該部或奏差老成大臣或選差能幹屬官分往前項被災去處㑹同各該巡撫官員取勘闕食人户見數將所在豫備倉糧驗口賑濟如無倉糧或動支官錢或設法處置凡百從冝而行事重當奏者具奏定奪務使見在饑民不致凍餓而死逃移之數各要招撫復業仍通行各該巡撫官員各行所屬凡遇别處流移饑民一體存恤賑濟毋分彼此若有盜賊生發亦要督捕盡絶毋致滋蔓其有見今該追拖缺稅糧馬草買辦物料等項不急之徴明白具奏暫且停止以蘇困憊差去官員候明年夏田收成之後方許回京庶幾民䝉賑恤之恩而邦本固矣謹題請㫖𢎞治十四年十一月十六日題申明舊章以厚風化事洪惟我太祖髙皇帝膺天眷命奄有萬方君臨天下慨彼前元紀綱淪替彛遵傾頽斟酌損益聿新一代之制作大洗百年之陋習始著大明令以教之於先續定大明律以齊之於後製大誥三編以告諭臣民復編禮儀定式等書以頒示天下即孔子所謂道之以德齊之以禮道之以政齊之以刑之意也當時名分以正教化以明尊卑貴賤各有等差無敢僭越真可以逺追三代之盛而非漢唐宋之所能及矣逮我太宗文皇帝克平內難正位宸極及至列聖相承一遵成憲恪守舊章禮儀不紊法令嚴明人尚節儉不事奢靡至景泰年間祖宗成憲所司奉行未至風俗漸移近年以來羣小用事恣肆奸欺販賣寶石之徒竊盜府庫銀兩供帳服飾擬於王者飲食房屋勝於公侯以致京城之內遞相效尤習以成風雖嘗禁約玩法不遵軍民之家潛用渾金織成衣服寶石鑲成首飾僧道俱著紵絲綾羅指揮亦用麒麟繡補其官員相遇尊卑不分俱不回避娼優𨽻卒騎坐驢馬亦不讓道違禮僭分無所忌憚名分踰越風俗奢侈舊章廢墜禮制因循未有甚於此時者也仰惟皇上嗣登寶位任賢去邪納諫容言宵衣旰食親决萬機圗治之心可謂切矣然圗治莫先於法祖書曰監於先王成憲其永無愆詩曰不愆不忘率由舊章是也然法祖必先於遵舊章而守成憲舊章成憲莫重於大誥三編大明律令禮儀定式稽古定制教民榜諸書并節年禁約條例若不通行申明使人遵守而欲風俗之厚亦難矣如䝉乞敕禮部將前項書內所載摘其緊要者並節年禁約條例奏請出榜通行申明曉喻禁約上下各循禮制用度務存儉約但有前項奢僭之徒在京本院行令巡城御史督令五城兵馬及錦衣衛坐城官校在外行巡按御史按察司各緝拿問罪重加懲治違禁衣服首飾等物入官婦人有犯罪坐家長夫男及通行兩京各衙門大小官員知㑹凡在道往來相遇之間各要緊守禮制當回避者回避當讓道者讓道各守尊卑之分共敦禮義之風仍通行浙江等布政司及應天順天二府各將大明律大誥三編教民榜禮儀定式稽古定制諸書並節年禁約條例照依發去榜文事理各要遵守不許故違儒學生員並社學子弟亦須熟讀講解勿視虛文務使中外臣民皆知貴賤有章豐殺有度等級名分不許違越車服田宅莫敢僭踰庶禮讓興而奢靡息矣緣係申明舊章以厚風化事理未敢擅便謹題請㫖𢎞治元年月日具題陳情衰老乞恩休致事竊念臣一介寒微叨登甲第歷官中外五十二年恭事皇上一十五載荷䝉聖明委任隆重眷遇稠疊誠千百載之奇逢也恩實同於天地勞無補於涓涘仰沐保全幸無過舉雖隕首糜軀何足為報但臣氣體素弱宿有疝氣頭暈之疾兹者前後九上封章懇乞休致俱未䝉俞允臣感恩圗報死而後已但臣今年已七十有七耳目益加昏瞶精神愈覺衰弱牙齒漸落手足不仁動履艱辛出入朝參率由勉强勞心之久輒為暈眩委的不能任事有妨重任伏望皇上憫臣衰老曾效微勞放歸田里少延殘喘以終餘年臣不勝感戴天恩之至為此具本奏聞伏候敕㫖𢎞治十五年八月初三日奏因災變思患豫防以保固南都事查得該南京太常寺卿楊一清奏稱𢎞治十五年七月初三日猛風急雨震蕩掀播樹木拔仆屋瓦飄飛人心驚惶勢甚可畏天地山川社稷等壇并孝陵太廟共吹倒松柏等樹數千餘株及皇城各門內府監局京城內外城門關隘處所并文武大小衙門墻垣屋宇亦於是日被風雨滲零震撼損塌數多牌樓之傾倒旗竿之摧折不知幾處加以江潮洶湧江東諸門浩如陂湖水漫進城五尺有餘新江口等處江淮濟川等衛戰巡馬船商民船隻多有漂沒及溺死之人詢之父老皆以為耳目所聞見風雨之變未有甚於此者及該欽差守備鳳陽地方內官監太監倪文亦奏七月初三日午時被猛風刮倒皇陵皇城萬歲山圜丘方丘獨山龍興寺并南山一應壇壝大小樹木大約不下萬株軍民房屋一千五百餘間各具奏前來該禮部奏准合無行移兩京大小衙門各行所屬洗心滌慮痛加修省凡天下急務得以盡言無隱等因備咨到部除痛加修省外臣切惟南京鳳陽乃祖宗根本重地皇陵孝陵實仁祖淳皇帝太祖髙皇帝藏體之山太廟乃祖宗神主奉安之所與夫天地山川社稷等壇皆國家重事所係非輕今風雨猛驟將各處百十餘年樹株吹倒如此之多而江水洶湧損壞戰快船隻溺死軍民人口如此之衆皆並見於中都南京是蓋天怒之甚誠非常之災變也伏惟陛下覽此災變亦必有以悚惕於聖心矣然上天垂戒譴告之切夫豈有意者哉思患豫防誠今日之急務也禮部奏奉明詔羣工言之巳詳臣恐猶有所未及者焉竊以國家之事在外者言之所大可慮者一則邉敵之猖獗一則南都之無備且邉敵雖强四肢之疾密邇神京兵馬咸聚設有侵犯尚可支持况戰守之備素亦講圗但南京雖江山險固為帝王之州而論建都之地以此為次者以其居長江之下流也仰惟我太祖髙皇帝即位之初始欲建都於汴梁隨又建都於鳳陽終復遷都於金陵雖知居於下流乃於湖廣地方設立三十六衛所官軍二十餘萬并江西沿江又多設衛所控禦上游以為金陵之屏蔽及於江西九江府設立九江衛經屬南京前軍都督府以為蜀楚之喉襟建置立法至為詳密彼時京儲俱係各省民運赴京官軍專備戰守所以三十餘年安如磐石逮我太宗文皇帝遷都北平意固有在但南京各衛所官軍分帶一半隨駕前來江南糧米後令官軍漕運以備京儲該用官軍一十二萬而南京并湖廣江西沿江衛所官軍已掣其十之五六矣加以逃亡事故埋沒者不知幾何以致上游無備屏蔽不固而九江以下直抵南京城池缺人守把教場無軍操練倉廩空虛衛所狼狽既缺傳報烽火之墩臺又無飛哨巡邏之船隻江賊出沒劫殺官商鹽徒縱橫操持軍器南京相去京師二千餘里隔涉大江城池寬曠武備不足此腹心之患萬一不逞之徒哨聚之輩長艘巨艦順風而下倉卒之間何以禦防晉宋齊梁都於金陵者俱有故事言之至此實可寒心臣任兵部尚書之時每常慮此奏准於九江衛添設副使一員專一整飭自九江直抵南京沿江一帶衛所兵備以防不虞尋被言者革去誠非逺慮也且天下之兵備可有可無而九江之兵備决不可無緣今江西盜賊滋蔓擒捕不絶湖湘軍民困羸瘡痍未復風俗人心比之洪武永樂年間大有不同窺伺覬覦者安知無之况患生於忽禍起於微乎如䝉乞敕南京內外守偹大臣痛加修身之誠毋負留鑰之任各營軍馬時加操練京城門禁嚴為隄防坍塌城池作急修築損壞船隻早為措備凡防奸禦侮之事用心經畫從長議處重大者具奏定奪仍乞敕吏部推舉頗諳韜略素有風力官一員升任副使江西按察司帶俸請敕前去九江衛居住上自湖廣接界下至建陽衛一帶衛所俱聽提調專一整搠軍馬修理城池督造軍器整㸃民快擒捕盜賊禁革奸弊及查理沿江驛遞巡司紅馬站船巡邏官兵或軍伍之不足甲仗之缺少與凡有益地方防守之事冝從計處停當徑自具奏定奪其沿江有司官員事有當禀行者俱要禀行不許視非統屬輒為怠玩凡事仍與守備軍職協同計議而行不冝偏執誤事務使威武奮揚戰守有備潛消奸宄之邪謀用為南都之保障仍聽南京內外守備官并南京都察院巡江都御史節制及請敕湖廣江西鎮巡等官各將未獲盜賊督捕盡絶困苦軍民存恤得所一體整飭軍馬撫安人民以備不虞毋為因循致悮地方臣叨任大臣同國休戚聞兹變異若不披瀝為陛下言之他日倘悮大事則臣負國之罪將何以逭伏乞陛下留神省覽斷自宸衷俯賜施行宗社幸甚生靈幸甚臣干冒天威不勝戰栗恐懼之至緣係陳言災異事理未敢擅便謹題請㫖𢎞治十五年八月二十日題作養人材以備任使事切惟人君莫先於致理致理必本於人材人材尤貴乎作養亦必須作養於先方可任用於後得其材則政舉而天下治非其材則政墮而天下危此必然之理而治天下之急務也仰惟太祖髙皇帝奄有天下之初法古為治首先開科取士一以經術為本最重進士之科而於京官尤加意焉何則後日內而卿相正郎等官外而方面府正俱於此等官員內升用故于諸司職掌吏部各司所載內一欵凡在京官初入仕且令試職一年後考核堪用者與實授不堪者量材調用係祖宗舊制亦造就作養人材之一端所當遵守而不可易者也不知何年一向廢墜不曾舉行所以在京進士等項除授官員之後不肯用心習學政事考究古今涵養德性端正心術以致識見未充心胸未廣其於持巳或有未至一遇用人輒嘆乏材及至升擢外任多有不謹不稱任使三年之間罷黜者衆所以升愈驟而退愈速即今在京各部無五年以上郎中員外郎在外無三年以上布政按察使日望升遷怠忽政務治道未隆職此之由此當今之大弊也或者未試職之例久未舉行一旦行之人心嗟怨殊不知洪武年間法度嚴明人材老成猶除試職所以盡心職務庶績咸熙今經百三十餘年紀綱漸弛人心怠玩若不舉行前典重加作興誠恐年復一年人不知警政愈不舉所係非輕及查得南北二京各道監察御史初除者不分進士知縣推官已經任年深俱與試職一年使之習學刑名歷練事體滿日本院考核堪用者具奏實授不堪用者仍調除外任所以人皆敬慎克舉厥職頗為得人惟六部主事大理太常寺評事博士六科給事中行人中書舍人俱不曾試職就於實授甚失祖宗作養造就人材以備任用盛意合無自本年八月大選為始前項各衙門除曾經轉升及不該升除方靣知府官員并進士第一甲三名俱不試職外其餘主事給事中評事中書舍人博士行人初除之時俱照舊制及御史事例先令試職一年滿日聽本衙門堂上官六科聽都給事中中書舍人聽掌印官考核如果勤能不怠老成練逹堪用者明白具奏本部再行核實奏請與實授若輕浮淺露怠惰臣事不堪用者改除外任所除試職官俱懸帶本等牙牌實授三年後一體請給敕命封贈父母妻室庶人材俱䝉其造就任用不至於乏人祖宗舊制亦不至於墜廢而不舉矣臣等職掌選法貴在得人以備任使以隆治道伏乞聖明留意俯賜施行臣等不勝幸甚緣係申明舊制以造就人材事理未敢擅便謹題請㫖乞恩優容言官事照得近該南京守備郕國公等官朱輔等㑹同南京守備內臣奏據南京旗手衛指揮史顯章等呈稱南京工科給事中徐沂倚酒恃醉於長安右門要㸃官軍將軍人張保兒責打及盤出銅鈴等情備由參奏前來䝉將徐沂差官提解來京問理隨該給事中徐沂奏稱奉例㸃閘守禦官軍於西長安門㸃下不到數多該管官員誠恐照例參究揑呈守備官處以致參奏乞要辨明等因事下所司未經問理覆奏臣等看得南京守備郕國公等官朱輔等奏據指揮史顯章等所呈前項情由則給事中徐沂誠當有罪若據徐沂所奏則㸃閘守衛官軍亦係職分當為彼此各執一詞是非曲直未見明白其朱輔等任專守備以皇城門禁為重既據所呈法難中止但傳聞徐沂平昔鋭意言事勉於盡職頗有中傷之疑其事情虛實臣等未敢懸度切惟朝廷設置言官所寄最重必須保持愛護庶敢盡其言責若於言官一有小失不待勘明即加罪譴則各懷患失之心將必以言為諱凡有大奸大惡誰肯為陛下言之其於治體所損非細仰惟皇上即位以來未嘗輕易罪一言官所以各官感激而思欲盡職也伏望皇上軫念言官有益國家恢宏聖度少霽天威將徐沂曲賜寬宥以釋前疑則皇上優容言官之量實有同於天地矣臣等干冒天威不勝戰栗懇悃之至謹題請㫖𢎞治十六年正月初九日具題端肅奏議卷十
