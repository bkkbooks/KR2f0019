body:
  text: 端肅奏議卷一明馬文升撰正心謹始以隆繼述事切惟人君之要莫大乎謹始謹始之要莫先於正心而正心之要又在主乎敬焉爾蓋敬者一身之主宰萬事之本根聖學之所以成始而成終者也能敬則心存心存則德愈謹而後可以凝天命得人心保大業而治道無不隆矣若敬有不存則心放心放則德不謹而萬事俱不立矣尚何望其凝天命得人心保大業而隆治道也哉洪惟我太祖髙皇帝膺天眷命神聖知勇始以布衣龍飛淮甸東征西伐櫛風沐雨十八載而有天下在位三十二年之間宵衣旰食勞心焦思立綱陳紀貽謀作則此心此敬未嘗少忽蓋為聖子神孫立萬世不拔之基以垂之永久其創業亦可謂之艱難矣然創業固難而守成尤不易也逮我纍朝皆能以聖繼聖以心傳心克寬克仁憂勤惕勵所以世底隆平治臻熙皥而無忝於聖祖也恭惟皇上養德春宫蓋巳有年潛心聖學亦非一日是以即位之初勵精圖治任賢去邪敬天法祖不邇聲色不殖貨利勤政事崇儉素却貢獻黜異端隆大孝於兩宫布仁恩於四海躬耕籍田親幸太學凡古帝王盛德之事皆有以備之於躬而施之於事矣真大有為之君不世出之主也天下蒼生無不延頸以望至治使能存此心始終不渝則真可以四三王可以六五帝可以繼祖宗可以陋漢唐而皇明之大業可以保之於億萬斯年而不替矣然靡不有初鮮克有終人主之大戒也天命人心去留靡常人主之所當察也皇上纘紹洪基當民窮財盡之餘兵廢刑繁之際所以凝皇天之眷命者在是所以收天下之人心者在是兢業危懼此心豈可一時而不存乎此心一有不存不流於聲色則流於貨利不入於遊逸則入於奢侈一或有之皆能敗德敗度而於前所謂帝王之盛德或有少損而不能保其終矣且自古聖帝明王未有不接見臣下而能致治者近日百司言事之人往往欲皇上接見臣下是亦忠愛之至臣以為皇上未接見臣下非終於不接見蓋亦有所待焉爾若常如今日臣恐君臣之情上下不通亦未可以言治矣昔伊尹告太甲曰惟天無親克敬惟親民罔常懷懷於有仁鬼神無常享享于克誠天位艱哉蓋欲太甲敬天勤民而保天位也傅説告髙宗曰惟學遜志務時敏厥修乃來允懷于兹道積于厥躬監于先王成憲其永無愆蓋欲髙宗修德法祖而常無過舉也厥後太甲髙宗為商令主伊尹傅説為商名臣治道之隆蓋有以也况邇來各處水旱災傷天鳴地震是皆天變之大皆上天仁愛人君之意此正法古修德應天以實而不以文之際也伏望念祖宗創業之艱難而天命之靡常思今日守成之不易而人心之罔定退朝之後萬幾之暇節膳寡欲以頤養天和澄心靜慮以默思治道日御便殿召見儒臣或條説大學衍義或誦讀貞觀政要及通鑑綱目等書曲為辨析孰為道心孰為人心某帝存此心而治某帝不能存此心而不治用是以親決萬機蓋事事有不難矣仍望於太皇太后皇太后兩宫益隆其孝養於親王介弟益篤其友愛凡內外官員或有竒技淫巧之獻必禁之而責其人珍禽異獸之貢必却之而塞其釁大政事之疑必召內閣大臣面議而後行或文武大臣有闕必召該部正官詢訪而後用於緣邊將官不時降敕戒飭務在保境以安民於在京武備敕令總兵等官嚴加訓練足以防姦而禦侮科道為朝廷之耳目若有小過曲賜其寬貸大臣為人君之股肱務存大體特為之優隆左右譽一人之善必究其所自來毁一人之短必詢其所從始內臣之中察其醇謹老成者則親信而任用之浮躁回邪者則疏逺而防馭之大臣之中察其忠良者委任之不二便佞者罷逐之無疑於母后之家重加賞賚而不假之以權於外戚之屬厚加優待而不任之以事賞所當賞而不致太濫刑所當刑而不致太僭浪費錢糧宜皆減省無益祈禱不必修建於宗室則推恩而昭德於四夷則厚往而薄來廣開言路以防壅蔽時接臣僚以通下情畿內百姓差役浩繁所在地土暫免踏勘凡百用度悉從儉約一應邪術罔為眩惑堯舜之道亦不過此允迪兹則二帝三王不獨専美於前而我祖宗列聖真可繼述不忝而於天變亦可以少弭矣臣本以庸才叨總風紀日夜思維無由補報伏望少寬斧鉞之誅俯納芻蕘之語身體而力行之天下幸甚臣不勝戰栗恐懼之至為此具本親齎謹題請旨𢎞治元年月日題全聖德以隆治道事臣切惟自古帝王聖德雖由天縱亦由於進修也且聖莫聖於堯舜禹湯文武故書稱堯曰克明峻德稱舜曰舜好問而察邇言稱禹曰克勤克儉卑宫室惡衣服稱湯曰以禮制心以義制事稱文王曰緝熙敬止以此觀之則古二帝三王之聖德未嘗不由於進修而進修未嘗不先於節儉仰惟皇上聰明睿知本乎自然聖神文武出於天性曩在春宫天下臣民皆知其有堯舜之資矣繼登寶位四載于兹不邇聲色不殖貨利竒技淫巧之不好珍禽異獸之不蓄躬行節儉賞與不濫開言路容直言優禮大臣寬恤刑獄却獅子於西域退海青於女直天下幸甚近聞欲湖浙添差抽分內臣甘陜織造各樣絨毼有司罷於奔命臣惟地方未寧陜西連遭荒旱百姓死亡過半田多荒蕪瘡痍未復其湖廣浙江設立抽分蓋因漕運京儲該用糧船一萬餘隻天下有司買辦木植不前所司建議抽分實為補造運船而設即目運軍尚自陪補一半十分困苦若令甘陜織造雲毼雖支官錢未免拘令婦人在官撚線男子在官上工必生嗟怨其湖浙若添內臣抽分各處客商聞之決然不敢販賣木植價益騰貴必悮打造運船而運軍愈受其害逃亡必多所係非細皇上即位以來凡事悉法祖宗此二事皆祖宗朝所未行也况不係有益國家重大事務若遽行之誠恐軍民驚駭以為此數年未輕差遣內臣抽取木植及自來不曽著令陜西織造蟒龍雲毼况今天下民困財竭兵食不足差去官員帶令人衆雖不害人終要供給及回還之日裝載木植該用馬快船二三百隻人夫數千餘名沿途官司未免勞擾伏望皇上逺法二帝三王之儉德近遵祖宗列聖之良圖收回成命該用木植或令南京守備內臣將龍江瓦屑抽分竹木局及就差南京內官前去蕪湖揀選已抽分堪用者陸續運來應用或令工部分𣲖天下有司買辦送納其雲毼亦非供用之物織造實為靡費若備賞賜自有江南織造假匹何必用此毛毼方成錫賚且昔西旅貢獒武王受之召公奭拳拳告戒至勤一篇之訓夫以武王之聖受此一獒似未為害而召公告戒之切者蓋不矜細行終纍大德老臣輔君正當如是而武王終能聽之載在經書垂之萬世臣荷蒙皇上厚恩委以重任義同休戚遭逄皇上堯舜之君日夜思惟無由補報覩兹二者事雖若細關於聖德實大事雖若小繫於天下國家實重臣若隱忍不言萬一為皇上聖德之纍臣負國之罪將何所逃豈不有孤皇上之付託哉伏願皇上將臣所言留神采納天下幸甚宗社幸甚臣不勝拳拳忠愛之至謹題請旨法乾健以勤聖政事照得近來各處具奏地震而雲南尤甚邇者玄象示警彗星偶見此皆上天仁愛皇上之意也皇上憂勤惕勵減膳撤樂凡有遊燕悉為停止此又應天以實而不以虛文也將見彗星漸消與宋景公一言而熒惑退三舍者無異信乎天人相與之際甚不偶矣臣惟帝王之德莫先於勤勤則裁決萬幾而無少壅滯上天之道惟在於健健則發生萬物而無或差忒是則天道聖德實相吻合故易曰天行健君子以自強不息大禹之告舜亦曰兢兢業業一日二日萬幾天位艱哉史書美大禹曰克勤克儉是皆以勤而成聖德所以載之經史而垂光萬世也洪惟我太祖髙皇帝以至憲宗純皇帝俱昧爽視朝早朝後日每二次裁決在京各衙門并天下一應章奏或有大政事復召大臣面議而行此我朝列聖之定規也恭惟皇上膺上天之眷命紹祖宗之鴻圖即位之初宵衣旰食勵精圖治視朝決事悉遵祖宗舊規日長時月每日又有午朝之舉誠足以嫓美古帝王而克紹祖宗也近年以來視朝稍宴間或早而復宴日止裁決章奏一次此固皇上頤養天和保固皇躬雖得君逸臣勞之道但所其無逸帝王所重仰惟皇上清心講學節膳寡欲聲色不邇貨利不殖篤志以求道遊藝以養心雖古帝王祈天永命之道亦不過此又豈待於他有所求哉今視朝固亦早矣但日止裁決庶事一次非所以率由舊章而垂法後昆也甚有以掩皇上勤政之心其於聖德所關甚大臣切惜焉伏望皇上自今法天道之健遵祖宗之訓每日二次裁決庶務而視朝常常如此則聖心之勤不異於初政祖宗之規不改於今日其於聖德實非小補而底堯舜之治亦不難矣伏乞聖明留意宗社幸甚天下幸甚為此具本親齎謹具奏聞伏候敕旨豫教皇儲以隆國本事臣惟太子國之儲二後世社稷之安危繫焉所當豫教者也故大易有養蒙之卦禮記載教世子之篇自古帝王之君天下憂深思逺者未嘗不以此為先務也仰惟皇上嗣登寶位敬天勤民法祖圖治至仁洽於四海大孝隆於兩宫聲色之不邇貨利之不殖是以皇天眷顧祖宗垂佑誕生皇子實出中宫爰自去春已正儲位神器有歸宗祧是託此誠國家萬萬年無疆之休也臣聞皇太子姿表異常質性聰睿兹已能言能行矣不可不早為之教養也蓋童蒙之時良知良能未有所誘天真渾然不早教之一有放失習與性成他日雖有良師良傅教之亦難入矣昔成王始為太子也太公為師周公為傅召公為保伯禽唐叔與遊目不閲淫豔耳不聞優笑居不近庸鄙所以養成德性及其為君也克紹文武之業而為有周令主此其豫教太子之明驗也為今之計必選醇謹老成頗知書史宫人如衛聖夫人楊氏者保抱扶持於凡言語必教之以真正之音而非禮褻狎之語不使之聞於耳於行步必教之端莊慎重而非禮邪僻之事不使之接於目教之不忍教之有儀以養其仁義之心教之恭肅教之分別以養其禮智之心內庭之宴鐘鼓司承應不使之觀元宵之節鼇山之戲不使之見至於佛老之教尤不宜口誦其言目觀其像而信之篤遊戲之事不宜任其所好遂其所欲而嗜之深逮夫稍長嚴敕東宫老成內臣如太監覃昌者先教之誦習孝經使知孝弟之道出於天性仁敬之心本於自然至於八嵗教之誦詩讀書凡尊尊親親之等仁民愛物之則無不啓知端其趨向及其漸長建立宫僚之時仍乞敕內閣大臣會同各部都察院等衙門堂上官慎選名實相符才德老臣學問醇博端良重望之臣以充其任回邪詭祕者不使之與自此日出春宫講論經書㴠養德性使知窮理正心修已治人之道凡世事委曲在所當知人物賢否在所當辨與夫上天之所當敬祖宗之所當法百姓之所當恤財物之所當惜如此則內外輔導得人而又教之於豫皇太子德不至於堯舜文武之域者臣未之信也蓋堯舜文武之聖亦由此而至之耳臣以菲材荷蒙列聖厚恩叨任六卿之重去年又蒙皇上加臣太子少保正係東宫輔導之官臣受任以來夙夜惶懼思無以報惟在豫教皇儲以成至德他日足克負荷庶少盡臣職分萬一而免冒濫之譏夫教太子之道禮記文王世子篇賈誼保傅篇載之詳矣宋儒真德秀亦采編入大學衍義進呈於君矣近日儒臣亦嘗進講於上矣臣猶以此為言者良以今日之學與不學係他日之治亂是蓋一得之愚惓惓忠愛之至也伏望聖明留意天下幸甚宗社幸甚臣不勝戰栗殞越之至為此具本親齎謹題請旨𢎞治六年十一月初七日具題恭請皇太子御經帷以隆睿學事恭惟皇太子殿下年漸長成天資英偉內外宫臣朝夕輔導講讀學有進益此誠宗社無疆之休後世臣民之福也但臣等叨任大臣臣文升臣圭俱任東宫保傅自𢎞治十一年三月初六日皇太子初出讀書於文華殿獲覩睿顔之後至今五載止是正旦冬節及每月朔望日於文華殿門外朝參相去頗逺仰惟皇上嗣登大寶日決萬幾猶每月三御經筵令翰林儒臣講讀經書以隆聖學而追古帝王今皇太子當進學之時雖日出讀書止在左春坊與二三內閣大臣及東宫并翰林院講讀等官相接且去處頗狹未甚從容考之古者帝王之教太子行步居處太傅在前太保在後入則有師出則有保蓋欲左右前後罔非正人出入起居罔有不欽此所以教諭而成德也臣等愚見以為欲請皇太子照皇上御經筵故事每月三次初六十六二十六出御文華殿令臣等六部都察院大理寺通政司鴻臚寺掌印正官并二品以上官同內閣大臣東宫講讀等官侍班講書其侍衛將軍等項比皇上御經筵之日減半庶臣等得覩皇太子之睿顔而皇太子亦識臣等之愚貌收斂身心嚴威淵穆相接日久自然度量益宏識見益廣日就月將以至於緝熙光明之地睿德益盛而帝王之域有不難造矣臣等惓惓犬馬愚誠如此伏乞聖明留意裁處宗社幸甚臣等幸甚謹題請旨𢎞治十五年四月日端肅奏議卷一
