body:
  text: 端肅奏議巻二明馬文升撰巡撫事查得先該户部奏准各處巡撫官員毎年八月以裏一次赴京議事續准兵部咨為公務事照得各處巡撫官員每年在邊者於四月内腹裏者於八月内到京議事縁即目各處地方中間賊情未甚寧息者若令一槩赴京誠恐闕人誤事合無行移各處巡撫官員其斟酌各該地方如果平安別無𦂳要事情妨占照例議事若是地方賊情尚未寧息軍民未得安緝有事難以摘離宜從将應議事件明白條陳徑自奏請定奪等因具題奉聖㫖是各處正要用人且都不必來欽此備咨前來臣猥以菲材謬應重寄夙夜憂惕思圖報稱惟欲軍民安妥地方寧静其一應合行有益軍民事務除遵依欽奉勅諭内便宜處置事理陸續施行及㑹同欽差鎮守陜西太監等官計議停當即次具奏外今將合議事件開坐具本専差舍人某人齎捧謹題請㫖計開一重守令以廣徳澤切惟致治莫先於安民安民在擇乎守令葢守令者親民之官守令得其人則庶民皆安養而天下無不治守令不得其人則百姓受其殃而庶政無不隳矣故自古英君誼辟欲躋民於雍熙太和之域者未嘗不以慎擇守令為先務焉洪惟皇上愛民之心無異於堯舜宰相賛理之勤有同於伊周然而治不古若而小民不蒙致治之澤者葢以守令不得其人而已矣守令之不得其人者由作之無其法而已矣切見今之守令由進士舉人出身者徃徃多得其人由監生除授者鮮有能稱其職揆其所自其監生坐監并在吏部聴選通前二十餘年方得出身比至除授之時年已五十之上鬚髪皓然神志昏倦其意以為在任不乆又將黜退陞用之例諒不我及所以惟務貪贓之計罔有治民之心如此而欲其政事之理人民之安豈可得乎雖有吏部考察黜退之例及臣與巡按御史按察司拏問之嚴然今日之黜退者為因老耄貪婪後來之除授者又有老耄闒茸之甚於前所退者葢以國子監所養人材不過如此若止仍舊考察數數黜退而不知所以更張遴選之則小民送舊迎新徒為勞費夫用賢所以育民而賢才之盛未有過於進士也以進士而除授今人皆以為幸登黄甲輒除外任有辜父母之望而灰士子之心也殊不知設科所以求賢求賢所以為民以年幼進士而任守令民情世故無不練逹他日或居藩臬或補内任輔世長民綽有餘裕是亦作養人材之一端也陜西地方比之各處大有不同其同知判官縣丞主簿近年部運各處邊方夏秋稅粮相繼徃來並不在任止有知州知縣獨員處事若非得人事何克濟伏望皇上以生民為念以守令為重乞勅吏部今後各處知州知縣有闕照依已故太子太保吏部尚書兼謹身殿大學士李賢奏准事例毎選將在部聴選舉人不分到部年月日逺近及監生中年未老耄資質英俊者通行考選學問老成文移頗通堪任正官者並將各部觀政進士照依甲數挨次取用除京任外其餘相兼舉人監生除授知州知縣其進士到任之後果有亷名政績昭著者不分三年六年仍要挨次擢用知州量陞即中知縣量陞主事御史評事或令巡按御史並布按二司官於所屬官員内亷名素著才能出衆堪任知州知縣者各舉所知三五員各另徑自具奏吏部定奪授職在任若有貪淫事發連坐舉主之罪以後知州知縣有闕俱照此例除選如此庶使守令皆得其人而太平之治可期矣一添風憲以撫流民臣聞防於未然者易除患於已然者難濟葢禍患未萌以治術防之而有餘禍患已成雖兵戈除之而不足此古人所以圖難於其易而消患於未然也切照漢中府地方廣濶延袤千里人民數少出産甚多其河南山西山東四川並陜西所屬八府人民或因迯避糧差或因畏當軍匠及因本處地方荒旱俱各逃住漢中府地方金州等處居住彼處地土可耕柴草甚便既不納糧又不當差所以人樂居此不肯還鄊即目各處流民在彼不下十萬之上去嵗因滿四等反叛臣恐乘機哨聚為患地方已令按察司僉事孫逢吉前去彼處查勘見數造冊收照行仰各該官司撫恤禁治聴其自在生理候豐年着令回還此等之徒若逼趕𦂳急又恐激變為患若聴令在彼居住難保乆逺無虞况漢中山勢之險尤甚於竹房流民之多不減於襄鄧雖嘗委官巡視終是責任未専必須添官以専其任庶使地方可保無虞查得河南為因南陽之間流民甚多添除參議僉事各一員奉勅専一撫治近於荆襄南陽之間又蒙欽命都御史一員以總其事是皆思患預防防微杜漸之意也如蒙乞照河南事例或添除或就於按察司僉事内専委一員請給勑書前去漢中府就帶家小専一在彼徃來巡視撫治前項流民其一道分巡事務亦令本官管理及㑹同守備漢中府都指揮張順操練軍馬守䕶城池禁革奸弊防察不虞務要處置有方不許偏執誤事如此庶使責任専一而地方可保其無虞矣一増課鈔以贍軍用切惟理財之方有經常之道有權時之宜經常之道可行於無事之日權時之宜則施於財匱之秋也若拘經常之道而不知權時之宜則軍國之用有不足而贍軍之需有不充矣照得陜西所屬衛所官軍除沿邊外其腹裏軍人月糧該支一石者止闗本色六斗其餘四斗折支鈔貫其軍職不分沿邊腹裏四六闗支本色六分折鈔四分及查得官軍折俸折糧并各王府及将軍儀賓并司府州縣官員折俸通共一年該用鈔一千七十六萬五千四百六貫今所屬毎年止收額設户口食鹽課程鈔共九百五十八萬七千四百九十四貫所收不及所用一年共欠少一百一十七萬七千九百一十二貫而災傷減免者不在其數且陜西官軍披堅執鋭卧雪眠霜比之各處官軍勞逸不同其妻子在衛全資月糧俸米養贍為因糧餉不足減半折支鈔貫今所折鈔貫亦因不敷有一二年不得闗支者四五年不得闗支者縱得闗支一年鈔貫亦不得易買數月之糧又兼要買補馬匹置備軍装或典賣妻子或掲借財物艱難困苦相繼逃亡月糧折支鈔貫人情已有不堪鈔又不得闗支事體尤非所以今官軍折支俸糧鈔貫既有不敷若不行權時之宜另行設法整理誠恐年復一年困苦嗟怨益為罷弊將何以蓄養鋭氣而使折衝禦侮也臣看得西安府在城四門一日之間各處販賣柴薪等項牛騾車不下五百餘輛及看得陜西河南客商販賣馬騾一年之間亦不止數萬餘匹俱從潼闗經過前項車輛馬騾亦令投税若将馬騾車輛量加納税鈔是亦權時増廣鈔貫之一端也如蒙乞勅户部計議轉行陜西布政司将西安府在城四門所進柴薪等項車輛照依在京事例每大車一輛納鈔四貫小車一輛納鈔二貫其馬騾委西安府首領官員於潼闗收報每馬一匹納鈔十貫每騾一頭納鈔五貫毎季将二項所收鈔貫俱送布政司官庫收貯以備官軍折色俸糧支用候年終將通收過鈔貫數目布政司造冊奏繳户部查照其收鈔去處按察司分巡官不時巡視敢有作弊者就便拿問如律如此庶使課鈔頗増而官軍俸糧折色不至匱乏矣一恤軍士以蓄鋭氣切惟克敵制勝莫先於軍士之効勞養鋭蓄威必在乎衣食之充足葢軍士在邊必衣食充足而後可以蓄養其鋭也茍衣食不足而饑寒一身彼則自顧之不暇尚何望其用命而樂為之用哉此古之名將所以與士卒同其甘苦而頻加犒勞者葢以此也照得陜西腹裏衛所軍士俱在三邊操備有一年一次回衛休息者有十八個月回衛休息者又有一家正軍餘丁二三名在邊操備者其在衛餘丁又要種納屯糧子粒守城等項差使且以在邊軍士言之既有官給騎操馬匹赴邊之日彼處總兵副參等官每軍一名又要脚力或馬或騾一匹頭其軍士既無營生又無産業止靠月糧六斗養膳置備軍装整理盤纒亦皆仰給如此懼怕到邊責打只得原籍户下津貼財物置買前去比至則邊方該管官旗或指以置買旗號纓頭為名或假以修理城垣門樓為由節次科斂逼迫無柰又將原買脚力馬騾變賣出辦未及一年使用盡絶或又有倒死官馬隨要買陪逼追𦂳急只得掲借或本管指揮千百户彼處副參等官馬匹錢物馬一匹還銀二三百兩者有之銀一兩還本利三四兩者有之彼至回衛各官家人隨即前來索取在衛官員懼其勢要只得監追或典賣妻子或掲借月糧歸還前去陪馬一匹已至破家蕩産倘再倒死將何所買陪因此而逃亡者十常八九所以各邊軍士日見闕少且以官馬倒死責令陪補固為良法其馬之倒死若不論其急病瘦損倒死之分一槩令軍陪補誠恐年復一年艱難益甚又不止於逃亡之患而恐有意外之虞矣罷弊軍士莫甚於斯況在邊軍士多有衣不遮體食不充口瘦損尫羸形容枯槁總兵等官畧不介意臣在石城目所親覩者如此而欲望其用命効勞克敵制勝葢亦難矣所以一遇敵寇犯邊多有不能支持必須奏討京軍若不肯着實優恤蓄養鋭氣誠恐因循年乆益加困弊北人窺伺我軍虚實擁衆犯邊重有以貽國家之大患也臣毎念及此深為寒心犬馬之誠不敢不露如蒙乞勅兵部計議行移各邊太監總兵都御史等官今後將所屬官軍領騎操馬匹置立印信文簿每月三次㸃視臕息肥壯者列為一等臕息瘦者列為一等若三次㸃視俱瘦以後馬匹倒死者着令買補以戒軍士不肯用心喂養之弊其三次臕息肥壮遇有𦂳急病證倒死者免其追陪以蘇軍士艱難之苦如果例該買補本軍在邊艱難者行移原衛着落户下餘丁買補完備本都司差人解送前去若是各軍將及下班倒死馬匹者就仰回衛從容置買上班之日騎坐赴邊及遇有纓頭旗號損壊須該置備者令總兵巡撫等官設法措置買辦應用如果無處措置行移陜西都布二司𣲖屬買辦解去並不許分毫科擾於軍及非奉奏准事例亦不許擅自役使酷害其各軍士上班脚力隨其貧富或騾或驢或二人共買驢者各聴從其便總兵等官俱不許追究逼迫及不許仍前放債於所管軍士令家人前去各衛取討逼軍迯竄果有前項奸弊許巡按御史指實具奏區處仍用心優恤軍士作興鋭氣務令得所不致迯亡如此庶使軍士感激而可以成克敵制勝之功矣一清軍丁以杜勾擾切惟發冊清取軍人不許差官擅勾所以絶勾擾之弊而立長乆之法也然法立既乆不能無弊若不隨時斟酌嚴為禁治則前法愈壊奸弊愈生而民有不勝其害者矣近該陜西布政司清軍委官左參政于璠呈查得節據西安府耀州等州蒲城等鄉軍丁惠林等各告稱各有户丁應當瀘州利州清州等衛所軍役有告稱在營見有正軍身力精壯又有餘丁三四丁者七八丁者十四五丁者甚至二三十丁者俱各種田買賣家道富實因怪原籍丁户不來供給徃徃買囑衛所官旗揑稱老疾逃故等項逓年發冊勾擾及至解衛為因軍伍不闕将解去户丁為奴驅使者有之耕種田地者有之甚至將盤纒衣服等項盡數拘收入已放回者亦有之又有告稱正軍回還取討盤纒不一二年軍妻又回取討軍妻回衛不五七月餘丁又來取討者原籍人丁為因辦納糧差家道貧窘無從措辦只得將田地房屋典賣者有之將男女頭畜貨鬻者有之及至打發起程稍不如意輒便回衛發冊勾取又有告稱正軍餘丁人丁回還出賣自己房屋田地因與房族親戚及隣里人等争競讎恨在心回衛妄取別房人丁者有之妄取同名同姓者亦有之此等情節徃徃赴官訴告分豁所司因見兵部發冊清勾難於主張只得依文解去查理原籍抛下田地無人耕種遺下糧差無人辦納又累里甲僉㸃大户管解及到衛所投文官吏又要拜見錢物旗甲索取饋送土宜彼既有丁只得放回徃回數千餘里動經半年之上破家蕩産甚可哀憐查得欽降軍政條例内開正軍在營已有壯丁就收補伍不許原籍勾取有司體勘是實回報原衛將在營已有壯丁就收入軍衛不許違例勾擾除依奉外今各該官吏故違前例徃徃聴受在營軍丁財囑輒與發冊清勾非惟紊煩官府抑且擾害人民照得陜西布政司每嵗該清軍士不下數十萬餘各該衛所發冊之弊固有而利州瀘州二衛青川一所發冊之弊尤多呈乞通行四川前項衛所禁約等因到院切詳衛所闕軍發冊清取户丁理固當然軍伍不闕行文勾擾原籍民實受害且陜西人民逓年供給各邊糧草兼以累年旱荒薄收財力皆困凋弊已極今前項衛所軍人不思原籍人丁艱苦因怪不與供送盤纒輒便揑故清取連年擾害不得安生誠為可恨除前項清勾軍人行令叅政于璠暫解户丁前去查理及行四川按察司禁約外誠恐各處衛所亦有此弊如蒙乞勅兵部行移天下衛所各將見在并逃亡等項軍人備查的確鄉貫充軍來歴見在者要開應役正軍並在營餘丁姓名口數每一布政司並直隷各府各另𩔖造文冊一本差人齎送本部照清冊事例轉發各該布政司并南京直隷府分收照以後各處衛所發冊清勾軍人到彼先行比對原降文冊如在衛原造有空閒餘丁數人又清取户丁顯是挾讐作弊所清户丁免其查解仍行彼處清軍按察司官員再行本衛查理如果在衛有丁就將作弊之人並該管旗吏先行提問如律干礙本官奏請提問不許管軍管事着令帶俸差操若是在衛原先止有一丁今開逃故者亦要開寫某年月日逃故許解户丁前去補役仍通行各處巡撫巡按並清軍官員嚴加禁約所屬衛所不許接受財物聴從本衛當軍之人因怪原籍不與供送盤纒揑作逃故一槩發冊清勾擾害果有迯故例該清勾者衛所官員務要取勘明白方許造冊送部清勾如此庶使在衛軍人無讐清之弊而原籍户丁免勾擾之害矣一存逺軍以實兵備切惟陜西闗中重地北連沙漠西抵番夷南通漢中東接襄鄧安危所繫誠不為輕比之他方尤當軫念況敵寇犯邊必先於此方今急務惟在兵足兵若不足以戰則不能勝以守則不能固今陜西腹裏衛所軍士以十分為率逃亡等項已有三分之上除各邊操備及屯田外見在守城正軍每衛或二百名或一百名甚至止有五六十名又皆老弱尫羸不堪守戰若非宣徳正統年間將本處充發逺方不服水土逺年清勾軍人編發附近衛所收操及將鞏固臨洮延安慶陽人民選作土軍則陜西軍士誠為之闕少而各邊操備者益為之不敷矣近年闕少各邊操備逃故及死損軍士為因腹裏軍少無從撥補文移徃來終無杜絶查得陜西西安等府所屬縣分人民先年為事充軍多有發編四川貴州雲南廣東廣西福建等處衛所者為因水土不服多為烟瘴所侵隨到隨死不可勝計及至各衛所移文清取過二年或三年方得起解到彼又為前項之故復多死亡仍行原籍清勾其户丁與解人懼烟瘴死亡之患兩懐戀土之心彼此通因或逃走外郡潛入番夷一二十年不得到衛原籍人丁懼怕清解全家迯亡者有之其南方之人發充陜西當軍逃故等項發冊清勾者亦多畏懼此間地方苦寒不肯前來着役間有解到又多氣體瘦弱不堪操調到衛未乆隨即在逃雖有清勾之名全無解補之實軍伍空闕兩無所益如蒙乞勅兵部計議將陜西人民先發四川雲貴廣東廣西福建地方充軍者除四川貴州見今有例仍令解補應當外其雲南兩廣福建年乆逃故原衛無丁户丁累到累死累解累逃者行仰陜西布按二司清軍官員將前項衛所逺年清勾當解户丁如果累次解發到彼死亡者仍照比先不服水土事例收發陜西三邊闕軍衛所補伍操備若雲南兩廣福建有充陜西衛所軍役逺年逃故清勾不到者却彼收發本處鄰近衛所當軍仍行兩處清軍官員責令各該衛所將名伍彼此開除操備之後但有在逃者仍發原衛當軍如此庶使軍士各服水土而無死亡之患衛所不至闕軍而有操守之實矣一禁通番以絶邊患切惟欲絶邊方之患當禁啟患之原葢邊患不能以自生必因人以啟召之也茍欲邊患之息而不禁啟患之原是猶止沸而不抽薪又豈善於治邊者哉照得陜西洮岷河州西寧等處衛所沿邊番夷即古之吐番其性譎詐叛服不常歴代以來屢為邊患洪惟我太祖髙皇帝平定天下撫治四夷示之以威懐之以徳彼皆順服嵗時進貢其所食茶鐡鍋銅器羅段等物奏奉明文方纔給與及許令各該番人四時前來各邊交易買賣委官管領當時法度嚴明軍民遵守不敢私自通番以取其利其各族番人亦盡知我邊情虚實一向畏服不敢為惡其後有等各邊無知軍民及軍職子弟甚至守備官員徃徃亦令家人將鐡鍋食茶段匹銅器等貨買求守把闗隘之人公然私出外境進入番族易換彼處所産馬匹等物以致番人將所得鐡鍋段疋置造軍器及戰襖等項遂萌侵犯之心或因爭論價值將通番漢人殺死同去之人因是違法不敢告官番人畏懼漢人報讐亦不敢前來交易日肆搶刼漸成讐隙及各寨堡守把官軍因見鄰近有等本分不曽為惡吐番却又妄稱本族搶刼等情恐嚇陪償財物因而激變随同各族為惡引惹邊患皆由於此甚至有等近邊土人居民因與番人結親或通吐番冒名進貢貪圖賞賜徃來情熟専為緝探邊方一應事情動輒𫝊與所以各邊番人益加生拗不聴撫化節次為惡搶殺人畜物件若不嚴加禁約誠恐各邊官軍互相倣傚一概通番積習年乆重貽邊患未便如蒙乞勅都察院查照洪武永樂年間福建廣東下海通番事例出給榜文發仰洮岷河州西寧但係隣近番人去處張掛曉諭今後但有置買鐡鍋銅器羅段私茶等貨潛出外境進入番族貨賣及各寨軍人將良善不曽為惡族詐稱搶刼恐嚇財物並與番人結親𫝊報腹裏事情者事發勘問明白本身處死全家軍發極邊衛分民發腹裏衛分充軍若軍職及守備官員縦容弟姪兒男通番買賣者指揮千百户鎮撫亦發邊衛充軍守備官員奏請定奪如此庶使法度嚴明人知警懼而邊患為少息矣講明律意以重民事伏覩大明律内一欵凡國家律令叅酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意剖決事務每遇年終在内從都察院在外從巡按御史提刑按察司官按治去處考校若不能講解不曉律意者初犯罰俸錢一月再犯笞四十附過三犯於本衙門遞降叙用欽此欽遵外切惟國家大事莫先於刑獄刑獄所重莫先於人命葢以死者不可復生斷者不可復續一婦含寃三年不雨匹夫結怨六月飛霜以其寃抑之氣有以傷天地之和召水旱之災自古帝王莫不慎之故舜典有欽恤之言周書有敬慎之戒下至漢唐法家多取専門趙宋刑官設科取士皆所以慎刑獄而重民命也仰惟我太祖髙皇帝膺天眷命奄有萬方臨御之初屢詔大臣更定魏律至於五六為之弗倦以求至當復命刑官重㑹衆律親御宸翰為之裁定務協厥中而於人命尤致意焉是以當時司刑官員多所用心而於律意務為講明鞫讞之際少有失平隂陽以和風雨以時而天下無怨民矣近年以來兩京法司官員或由進士初除寺正寺副主事評事或由知州行人就陞員外郎郎中而御史亦多知縣所除到任之後未經問刑就便斷獄公差所以律條多不熟讀而律意亦未講明所問囚人不過移情就律將就發落且笞杖徒流縱有所枉為害未大至於人命一有所寃闗繋匪輕且如強盗窩主重在造意若窩藏強盗而不曽造意同謀雖分賍亦難問擬斬罪又如官吏懐挾私讎故勘平人因而致死重在懐挾私讐若因事到官但有笞罪雖勘致死亦可止問擬因公毆人至死徒罪又如故殺鬭毆殺人若兩人相爭互相毆打毆死一人則名鬬毆殺人一人未曽動手一人於彼致命去處有意致死則名故殺此等律意人多忽畧有將強盗窩主未曽造意同謀止是分賍及官吏因公事毆人致死本無私讐故勘情由而俱問擬斬罪者有本係鬭毆而問擬故殺斬罪者有本係故殺而却擬鬬毆殺人絞罪者甚至謀殺故殺無屍檢騐而問擬斬罪輒取情真罪當奏請處決者或本因與人妻妾通姦其夫別項身死而問擬本婦因姦同謀殺死親夫凌遲處死姦夫斬罪者其他以非為是以重作輕者非一查得數年之間天下布按二司等衙門呈詳死罪重囚本院并刑部詳擬明白大理寺復詳合律該科覆奏處決幸蒙憲宗皇帝慈愛仁厚不忍殺人止令監着恭遇皇上嗣登寳位重念刑獄屢下明詔强盗無贜仗人命無屍檢驗者具奏定奪其節年原監該決重囚近日辯理寛宥者亦多若使當時就令處決則含寃而死者不知幾人矣其所以傷和召災者果誰之咎歟法司尚然則其餘府州縣衛所囚犯枉抑而死者又不知其幾何矣此皆原問官員律學未講律意未明之故也况府州縣官員多有不曉刑名不知律意者遇有刑名事務多有不能剖決問理而惟聼於主文之人葢由巡撫御史按察司官按治去處不行考校之故也如蒙乞勅兩京法司堂上督令所屬官天下都布二司督令斷事理問及浙江等處按察司官並各府推官各要將大明律條熟讀講解深明其意不許似前忽畧置而不講其問囚之際叅錯訊鞫務在得其真情方纔取招議罪之時尤須原情定擬不許輕易致有寃抑獄成之後難以辯明及通行天下大小衙門併兩京部屬官吏各置大明律一本朝夕熟讀用心講解務曉其意仍通行各處巡撫御史按察司分巡官按治去處遵依大明律内事理從公考校若有不能講解不曉律意者依律施行當奏請并降用者徑自具奏發落仍乞敕吏部行移法司將撥去辦事進士就令與見任官員一同問刑以後該選之時兩京法司有闕先儘各衙門問刑進士除授如果法司無缺方令除授別部等衙門是亦前代刑官設科取士之意也庶使人精法律而刑鮮濫施之弊獄無枉抑而世底刑措之美縁係講明律意以重人命事理未敢擅便謹題請㫖𢎞治元年月日題端肅奏議巻二
