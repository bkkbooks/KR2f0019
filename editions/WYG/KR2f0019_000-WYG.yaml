body:
  text: 端肅奏議詔令奏議𩔖二奏議之屬提要臣等謹案端肅奏議十二巻明馬文升撰文升字負圖均州人景泰辛未進士官至兵部尚書諡端肅事蹟具明史本𫝊文升砥礪㢘隅練達政體朝端大議往往待之而决與王恕劉大夏俱負一時重望此集奏議五十五篇乃嘉靖丁未其孫天祐所編次凡史𫝊所載直言讜論全文皆具載集中其請正北岳祀典於渾源州一疏則本𫝊不載而見於禮志其為左都御史時所言振肅風紀十五章史𫝊不詳其目今亦獨見此書大抵有闗家國至計惟文升於成化中巡撫遼東總督漕運著有勞績當時必多所建白乃集中概不之及而自孝宗召用以後所陳奏者則甄録無遺盖當憲宗之時文升雖敭厯中外而屢為汪直李孜省軰所搆不能盡行其志及其被遇孝宗明良相契得以展布其謨猷故所言盡為剴切其生平靖獻之志畧具是編讀其文可以知其所遭際矣乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c61c04ba55103393b7a395880232fcc95ea456fc251ac13c2f617a7532220b0c
