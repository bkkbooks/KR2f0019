body:
  text: 端肅奏議巻五明馬文升撰豫祈雨澤以兾豊年事伏覩皇明祖訓一欵凡每嵗自春至秋此數月尤當深憂憂當在心則民安國固所憂者惟望風雨以時田禾豐稔使民得遂其生如風雨不時則民不聊生盗賊竊發豪傑或乘隙而起國勢危矣欽此大哉聖祖之心乎至哉聖祖之訓乎其仁民保國貽謀防患之意可謂深且遠矣誠為聖子神孫所當恪守而遵行之也仰惟皇上嗣登寳位六載于兹奉天勤民無所不至法祖圖治罔有怠荒前此數年三辰順序百榖用成民安其生奈何去歲蘇松杭嘉等府雨水爲災山東河南懷衛彰德地方荒旱秋榖少收百姓缺食逃亡相繼荷䝉皇上勅令廵撫官及遣廷臣前去賑濟民頗獲安今訪得山東河南北直𨽻山西大同宣府遼東去歲一秋無雨三冬少雪和煖如春愆陽太過今春雖有雪雨三二次止可浥塵未深入土二麥巳種者日見枯萎榖豆未播者尚猶待雨若春種之失期則秋收之無望國賦何從而徴民生何由而遂又恐濟寜一帶閘河無水糧運不通有誤國計况今天下民困財竭兵食不足意外之虞難保必無事之可憂莫重於此誠有如聖祖之所訓矣且雨暘不時旱澇爲災固氣數之使然亦人事之所感召也故殷湯遇旱而以六事自責周宣遭旱而靡神不舉側身修行惕勵憂勤卒感天意之回轉災爲祥邦本獲安而國祚綿遠是人事之盡而有以勝其氣數也伏望皇上節財用以隆儉德開言路以來直諫益崇堯舜之正道益却異端之邪術遠法殷湯近遵祖訓風雨不時而恒憂於心軍民未安而常切於念則誠通於天感召和氣雨暘自若年榖自登而民生豈有不遂者哉仍乞頒給内府香帛翰林院撰祭文禮部分投差人齎赴各該廵撫官員無廵撫處就令本布政司掌印官員支給官錢買辦精㓗祭物親詣五嶽五鎮四海四瀆之神䖍誠致祭用祈雨暘時若以昭皇上憂民之意臣叨任大臣同國休戚事所當憂豈容緘黙爲此具本親齎謹題請㫖𢎞治六年二月十八日具題㓗凈皇城門禁以壮國威事車駕清吏司案呈照得本司官員奉本部劄付輪流差委不時㸃閘皇城四門及各舖守衛官軍看得北安東安西安門外被人作踐十分不㓗三面糞土高於門基若遇大雨水必内流恐與門基相平又恐年復一年習以爲常作踐益甚外面益高門基益下以外欺内尤非所宜又看得西安門迤北皇城墻下更舖門牕多被人偷去墻壁亦多損壞又看得東西長安門外各有磚砌大街磚多被人偷盗或年乆破碎止存土街其下又被大小車輛經行風吹水衝旁低數尺一遇大雨積水如河有碍人行其皇城下亦被沙壅甚高或低下數尺東長安街與㑹同館相通凡百夷人入朝俱從此過亦多損壞不整及東西長安二門外通水溝渠年乆淤塞水不能行亦非細故本司職專㸃視門禁理合具呈乞爲具奏修理㓗凈等因案呈到部洪惟我太宗文皇帝遷都北平營造宫殿規模宏大誠有以壮中國之氣象而聳天下之觀瞻也初成之後内外禁例甚嚴無敢輕易作踐者經今八十餘年舊例廢弛守門官軍罔肯巡視任人作踐以致如斯其東西長安街往年工部亦曽建議要行用石修砌但被浮言所阻況自古稱帝都之盛者必曰長安今長安街坍塌如此誠非盛世所宜千金之家門有糞穢亦必掃除墻垣損壞亦湏修整况皇城四門豈宜如此如䝉乞命内官監老成太監一員㑹同工部堂上官帶領諳曉風水隂陽人員逐一看視果如該司所呈如無禁忌趂今天氣晴明先将北安東安西安三門外堆積糞土當平去者平去當整理者整理水溝當疏濬者疏濬更舖當修補者修補務要外與内平不致相欺立爲乆遠之規毋再令人作踐其東西長安街道湏用石砌方可經乆仍乞勅各官逐一計議合用石料若干工部先行措置停當候今年秋後借倩操軍及在京火夫併工修砌速爲完畢庶使禁門㓗凈國勢尊嚴縁係修理㓗凈皇城門禁事理未敢擅便謹題請㫖𢎞治六年四月初九日具題釐正祀典事載考帝舜紹堯之後肇十有二州封十有二山葢每州必封表山之高大者以爲一州之鎮如五嶽五鎮之神東封泰山爲東嶽在今山東泰安州沂山爲東鎮在今青州府臨朐縣南封衡山爲南嶽在今湖廣衡山縣㑹稽山為南鎮在今浙江㑹稽縣西封華山爲西嶽在今陜西華隂縣封吳山為西鎮在今隴州北封恒山爲北嶽在今大同府渾源州封醫巫閭山為北鎮在今遼東廣寜衛中封嵩山為中嶽在今河南府登封縣封霍山為中鎮在今山西霍州又封四海四瀆之神東海之神在今萊州府南海之神在今廣東南海縣西海之神在今蒲州北海之神在今懷慶府濟源縣誌載以其濟水源通北海故祭於此淮瀆之神在今南陽府泌陽縣江瀆之神在今四川成都府河瀆之神亦在蒲州濟瀆之神亦在濟源縣三代而下歴秦漢隋唐俱於原封之山致祭至五代失其河北之地宋有天下未能混一北為契丹所有後以白溝河為界所以祭北嶽恒山於真定府曲陽縣俗傳有飛來石之説不知祭醫巫閭山於何處葢宋建都於汴而真定在汴京之北是亦不得已權宜之道也迨我太祖高皇膺天眷命奄有萬方建都金陵覩真定遠在京師之北所以因循未曾釐正迨我太宗文皇帝遷都北平而真定府却在京都之南當時禮官亦未建明猶祭北嶽於曲陽縣惟北鎮仍祭於廣寜若以爲北嶽原在真定則周禮載恒山為并州之鎮在正北我朝一綂誌亦載恒山在渾源州南二十里即北嶽以此觀之則北嶽當在渾源州為無疑矣今本州北嶽廟址猶存故老猶能相傳我朝洪武初定嶽鎮海瀆之神削去歴代褒加之帝號真可為萬世之法獨北嶽猶祭於帝都之南非其故封之山誠爲闕典臣非禮官考據未真但係國家重事不可不為釐正如䝉乞勅禮部再加詳攷如臣所言為是明白具奏行移山西竝大同廵撫官員候時年豊稔措置錢糧於渾源州恒山舊址去處修葢北嶽神祠務在不侈不隘若舊殿猶存不必從新葢造止可修葺工完之後有司具奏更乞勅翰林院撰文勒石䜿廟以垂永乆今後凡祭北嶽之神於此行禮庶數百年之闕典得以正於今日而我朝之盛事亦可昭於後世矣縁係考究神封以正祀典事理未敢擅便謹題請㫖𢎞治六年七月十七日具題慎守備以防不虞事切惟南京祖宗根本重地陵寝宫闕之所在百官衙門之攸存永樂洪熙年間俱命皇太子監國至宣德年方命武職重臣與老成太監守備後又添協同守備武臣併叅賛機務文武各一員無非欲修飭武備總理機務綂攝人心而防不虞其任至重而不輕也明矣自來四處操練軍馬操江船者在於上新河大教塲與神機營俱在城南小教塲在於城内不知比先何等武官坐營管操近年以來有係指揮坐營管操者間有都指揮都督者其守備内外官員止是毎年春秋二次親詣各教塲閲視軍馬所以軍馬未甚精强其各門守門官員亦不十分嚴謹臣昔年亦嘗在彼叅賛機務所以備知其詳心甚驚惕况南京城内城外四方逋逃併趂食等項百種之人俱集於此門禁之寛嚴軍馬之强弱無不知悉矧居大江下流而上有荆襄武昌豫章俱係重鎮自古必命重臣鎮守其地正以屏蔽金陵且如近者荆王因居上流乃敢潛蓄異謀使其異謀果成順流而下南京城中無備倉卒之間何以支持事之可憂莫大於此幸而天佑國家殱彼㓙殘早爲敗露今四方水旱災傷民財困竭奸㓙之徒難保必無而所在兵食又多不足任南京守備之責誠宜日夜關心而嚴爲預防也預防之道修武備謹門禁察奸宄為先此非臣之過慮實亦職任當爲近南京神機營小教塲闕坐營官管操至今半年之上不見具奏補官不知軍馬付之何人管理誠恐闕官日乆武備廢弛如䝉伏望皇上以祖宗根本重地爲念以思患預防為慮乞降勅南京守備内外官太監陳祖生蒋琮鄭强太子太傅郕國公朱儀協同守備懷柔伯施鑑叅賛機務南京兵部尚書侯瓉自今各要同心戮力彼此協和操練軍馬振揚威武嚴謹門禁防察奸宄照依在京提督太監總兵事例不時輪流親詣各教塲提督操練務使軍馬强盛威武奮揚門禁謹嚴關防詳密足以懾服人心而潛消奸宄紓九重南顧之憂保國家萬年之業其於委任斯無所負其神機營併小教塲坐營官亦湏查照本部原行事例作急推選官員具奏前来以慿上請定奪庶先事有防而後患自弭矣縁係請勅南京守備重臣慎機務以防不虞事理未敢擅便謹題請㫖𢎞治六年九月初六日具題袪除邪術以崇正道事臣訪得東嶽東鎮西嶽西鎮中嶽中鎮北嶽北鎮等祠廟俱有御用監太監陳喜太常寺卿鄧常恩安造石函一座周圍俱有符書内放泥金書寫道經一巻金銀錢數個各色寳石十數顆五榖各一升似乎魘鎮之法及有外官所撰皇帝遣御用監太監陳喜致祭于東獄泰山等神祭文石碑一座臣切觀歴代竝我朝故事凡改元之初竝因水旱災傷朝廷命翰林院撰寫祭文分遣廷臣前去致祭五嶽五鎮四瀆四海之神祭畢所在官司就將祭文刻于石碑以昭盛典並不曾有遣内臣令在外官撰寫朝廷祭文致祭五嶽等神事例雖秦皇漢武之封禪亦未有於五嶽等祠廟安置石函之理前項二事俱屬不經此皆鄧常恩恣逞邪術熒惑先帝所致今鄧常恩等巳置憲典前項石函石碑若不除去不無取譏將來貽笑後世有虧先帝聖德如䝉乞勅河南陜西山西山東遼東各處廵撫等官将前項嶽鎮等廟但係陳喜鄧常恩安造石函竝所立石碑俱各拆毁仆倒磨去文字其原安金銀錢寳石并道經差人齎進赴京庻免後世之譏以塞将來之釁臣叨任風憲大臣茍有所見事干國體不敢緘黙謹題請㫖𢎞治元年月日題申明律意以弭盗賊事切惟為治莫先於德教輔治莫先於刑罰非德教無以化導乎人心非刑罰無以懲戒乎奸宄故在帝舜之世契敷五教而臯陶典刑以弼其教是知自古帝王之御天下未有舍此而能致治者也洪惟我太祖高皇帝膺天眷命奄有萬方當殘元入主之後法度廢弛之餘以為刑乃輔治之具不可不明首命大臣更定新律以一人心又命刑官重㑹衆律以協厥中而垂法萬世其勸善癉惡之意無以加矣且五刑之屬三千而罪莫大於十惡十惡之外而情莫重於强盗何則强盜之行執兵持刃生殺在乎掌握劫財姦淫操縱隨其意欲比之叛逆之徒相去不遠所以强盗條云凡强盗得財不分首從皆斬例該决不待時所以禁暴去惡懲奸止亂而輔治者也祖宗朝凡錦衣衛捉獲强盗綁赴御前引奏者俱奉綸音三法司錦衣衛午門前當時㑹問明白隨即具奏奉有欽依刑科三覆奏就行處决或有不待三覆奏而處决者所以良善者知所勸奸惡者知所懲典刑既正盗賊屏息至天順三年九月二十五日該司禮監官傳奉英宗皇帝聖㫖人命至重死者不可復生自天順三年為始每至霜降後但有該决重囚着三法司奏請㑹多官人毎從實審録庻不寃枉永為定例欽此葢專指律該秋後處决重囚臨决之際恐有寃枉故令三法司㑹多官審録即古帝舜欽恤大禹泣辠之心也恐强盗重囚不在其内且强盗既該决不待時縁何監至秋後處决因有前該傳奉欽依所以一向因循但係强盜不分贓之多寡情之輕重俱監至秋後與秋後處决之囚一同㑹審比及㑹審之時十死七八存者監禁日乆翻異原情能言者俱作矜疑情雖重而不决柔弱者俱作無詞情雖輕而行刑況處决之際因是囚衆多至日晚或至更深人多不見甚非刑人於市與衆棄之之義且情犯有輕重故行刑有遲速今常若如此則自此終無決不待時之强盗矣是强盗與闘毆殺人者爲無異矣又非歴代制律懲惡之意欲强盗之息得乎如䝉伏望皇上今後凡錦衣衛官捕獲强盗綁赴御前引奏者乞照先朝故事勅令三法司錦衣衛堂上官於午門前㑹問明白追有贓仗擬罪如律偹由具奏奉有欽依刑科覆奏不必監候隨即處决中間果有情可矜疑者亦要明白上請定奪或有寃枉亦與辯明其法司徑問强盗及殺一家非死罪三人兇犯務在鞫問情犯明白贓仗真正毋撓於勢要毋拘於成案發大理寺審擬合律𩔖奏奉有欽依者刑科覆奏亦就處决庻有以正邦刑而懲奸惡息厲階而安良善其律該秋後處决重囚照舊㑹審㳟惟皇上寛仁慈厚實同舜禹而臣猶以此言進者葢此時强盗恣肆劫財殺人全無忌憚比之往年大有不同殺一家非死罪三人者往往有之若不将强盗兇徒依律不時處决則恐厲階自此而生將來有不可制之患矣况辟以止辟刑期無刑帝王之盛事也强盗有犯不時處决餘賊知警是辟以止辟之意也葢兵刑二事每每相湏惡之小者以刑治之而有餘惡至於大雖兵加之而無益矣臣叨掌邦政弭盜安民乃其職任茍有所見事干國體不敢緘黙縁係申明律意以弭盗賊事理未敢擅便具本親齎謹題請旨𢎞治七年五月二十七日具題添廵撫以保安地方事職方清吏司案呈切惟制治貴於未亂保邦在於未危葢治亂安危相爲倚伏自古帝王謹於未然而不救於已然謹於未然者易爲功救於已然者難為力昔伯益之告帝舜亦曰儆戒無虞而終之曰無怠無荒四夷來王是皆制治於未然之意也我朝自宣德年間各地方添廵撫官員或都御史侍郎以節制三司即古三監之意也比時惟河南山西陜西南直𨽻蘇松等府設有廵撫官其餘布政司止是不時差遣大臣廵視或一年二年而囘所以三司官員互相因循府司官員惟知貪利以致福建賊首鄧茂七浙江賊首葉宗劉廣東賊首黄肅飬倡爲亂階多者數萬少者數千僣號稱王攻劫城池殺擄人民地方騷擾爲之不寜者數年其廣西貴州苖蠻因而為亂朝廷命將出師方克剿平彼時兵食尚足人民富庻未甚費力近年以來宗室位多冗官太濫加以水旱相仍科派無極所在倉廩空虚軍士乏糧城池坍塌武備廢弛守門者皆老㓜之卒操練者半尫羸之輩如湖廣桂陽縣被賊百十人進城如入無人之境江西贑州府地方流賊數百劫掠十數餘日至今未曾捕獲福建武平廣東程鄉縣賊盗尤甚倘或哨聚日乆為患非輕其浙江大户之家或爭私忿各聚人衆相殺數日有司莫敢禁治誠非治世所宜若非添設廵撫官員早為整治将來之患有不可測今江西已添廵撫官一員但止管南贑二府及福建汀州府廣東韶州南雄湖廣郴州一帯不預民事三司官員未聽節制難以行事查得本部先嘗建議要於福建浙江添設廵撫官員未䝉命允今日之勢又非前數年之比矣應合早為處置案呈到部臣等切詳民貧盗起理勢自然各處災異迭見巳非一日恐象不虛示必有其應臣等職掌兵政天下安危所係若不彌之於早萬一有事臣等萬死何足以贖伏望皇上以地爲重乞勅吏部㑹同本部推舉練逹老成剛柔兼濟官二員爲都御史廵撫浙江福建地方專一撫安軍民緝捕盗賊禁貪殘除奸弊修理城池整飭武備措置倉糧操練民兵凡事與鎮守内臣計議而行大意以弭盗安民為本其江西都御史金澤就令廵撫江西多在南贑二府居住仍兼管廣東韶州南雄二府及湖廣郴州桂陽一帯候命下之日各另請勅行事縁係添設廵撫官員以安地方事理未敢擅便謹題請㫖端肅奏議巻五
