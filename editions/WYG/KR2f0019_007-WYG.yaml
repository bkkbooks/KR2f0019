body:
  text: 端肅奏議巻七明馬文升撰修飭武備以防不虞事切惟天下之安危係武備之修否武備修則四夷知懼盗賊歛跡而天下安否則四夷恣横奸雄窺伺而天下危矣昔殷高奮武於荆楚周宣講武於洛邑故詩書稱之以為盛事語曰天下雖安忘戰則危易曰君子以思患而豫防之葢言有天下者武備不可一日而不修也李唐之末武備廢弛終致藩鎮之亂趙宋之季兵馬衰弱卒有金元之厄載在史冊昭然可攷洪惟我太祖高皇帝膺天眷命以武功定天下以文德綏太平雖當投戈息馬之期未忘練武防邉之念故私役一軍者有重罰私借一馬者有禁例凡有興造竟不勞軍三十餘年四夷賔服海内晏然迨我太宗文皇帝嗣承大業遷都北平密邇蠻夷其於武備尤為注意彼時精兵數十萬健馬數萬匹親閲教練無少怠忽故出塞千里敵人遠遁威武之振前代罕及自宣德年間以後老将宿兵消亡過半武備漸不如初至正綂年間天下無事民不知兵而武備尤廢所以十四年有土木之厄至今讐恥未雪邇來軍士消耗十去四五雖嘗差官前去清理亦多上下因循虚應故事終不能充足原數矧京衛軍士内府各衙門匠役占去數萬之上見在者不滿七八萬江南之兵大半運糧其餘多在沿海備倭江北之兵亦有運糧之數其餘俱各來京操備而陜西山西之兵亦多戍守各邊所以腹裏衛所城池空虚無軍防守一遇小寇多不能支往年京師之兵俱在五軍三千神機三大營操練後因征調一時不能齊足所以設立圑營常有精兵十二萬分為十二營不許别項差役專一蓄飬鋭氣遇有征進就便啓行此外天下再無兵馬可調重加優恤尚以為遲近年以來多撥做工每占一二萬之上其工有一年不完者甚至二三年不完者每名僱工等項月用銀一兩一二錢行糧糶賣不得食用負累疲弊率多逃亡見在者强弱相半在京軍士疲困未有甚於此時也且武備之修固在乎軍尤藉乎馬洪武永樂年間京衛於空野官地置立牧馬草塲而在京各營草塲不下數千餘頃夏秋之間足堪牧放春冬又全支料草以備餵飼所以馬皆肥壮堪以調用即今京營牧馬草塲俱被勢要之家或親王占為已有亦有被軍民開耕占種者凡遇馬匹下塲牧放無處存住未及一二月即那往西山一帶四散趂牧中間多有潜囘原衛之數一時調用卒不能齊秋冬雖支料豆一石軍士艱難多有預賣與人况六個月止關草二個月每月止折與銀二錢通不彀一月支用且人無食必死馬無草必斃天下糧儲以供京軍天下草束以供戰馬二者缺一不可今軍俱支糧馬不支草夏秋既無草塲牧放冬春又無草束餵飼軍士艱難無力辦草欲馬之不死實亦為難所以團營馬匹常死二萬之上雖有朋合椿頭銀兩亦不能買補十分之二見操馬雖有三萬餘匹中間老病不堪騎操者亦多戰馬消耗莫有甚於此時也且克敵制勝固在乎士馬精强尤在甲兵之堅利近年在京盔甲厰所造軍器每見守衛軍人披帶盔甲其甲中不掩心下不遮臍葉多不堅袖長壓肩全不合式盔尤太重即今京衛軍士常操弓矢多係自置弓力不過一二斗矢長不過七八把平昔尚不能射遠加以披甲在身手不能舉新關之弓豈能開射縱射不過數十歩而止其刀尤短小亦無鋒刃别無長兵可以禦敵雖有神鎗習亦未精凡遇大敵率多敗北天下衛所成造軍器除沿邊宣府大同遼東寜夏甘凉陜西山西四川雲南兩廣外其餘浙江福建江西河南山東南北直𨽻衛所軍器料價多被管局官員侵欺入已間有成造者徒費物料多不堪用一遇查盤大半損壞那移搪塞有名無實况去歲内府戊字庫軍器被火燒燬數多見在者不知幾何兵器不精亦莫有甚於此時也雖軍馬充足甲兵堅利若将不得人尤難制勝方今將官除京營總兵俱䝉朝廷簡命外其餘各邊將官雖有曾經戰陣謀勇兼資操持可取善撫士卒者但中間多有貪利害軍年老有疾而士論不歸者本部已嘗奏行天下各該大小衙門官員各舉将材以備任用近有舉到之數亦不過常流求其堪任大将者甚少大抵多係膏􅆝子弟罔肯習學韜畧操演弓馬一聞推舉多尚奔競及至臨事莫展寸籌但恐出衆竒才或混在行伍潛伏草野亦未可知将不得人亦莫有甚於此時也夫使軍馬甲兵充足将官得人若操練無方兵無節制又何以成克敵之功哉今京營教塲操練軍士射箭舞牌之日多走陣下營之日少所以坐作進退之不知攻殺擊刺之不熟雖習舞刀而刀法未諳雖習放鎗而鎗法不知至於馬匹猶未操演葢四月下塲十月赴營未乆天寒即為住操所以馬多生拗臨敵之時欲北而南欲東而西求如邉馬之嫺熟葢亦霄壤之不侔矧鞍轡銜勒無一可取操練未精亦莫有甚於此時也且國家所恃以安者惟在軍馬精强甲兵堅利将官得人數者而已今既如此謂之内治之修誠未之信况今天鳴地震連年不巳草木妖孽歲時迭見象不虚示必有其應禍福安危相為倚伏近日北敵大衆近邊遞送番書要來進貢中間詞語驕倨必以三千人俱入不要減去一人似有啓釁之意既而俱各遁去不露形跡且北敵之性小盛則掠大盛則侵今既不來進貢又不侵掠安知其不示我以弱而緩我邊備以潛蓄大舉入寇之謀乗隙而動乎夫京師以大同宣府為藩籬大同宣府至京師不過數日之程邊墻之外即係夷地至若密雲薊州尤為密邇本邊軍馬雖强然亦分守各路兵分勢寡理之自然倘賊大舉入寇全藉京兵以為應援今天下武備廢弛已甚而京師武備又復如此若不早為修飭誠恐年復一年愈加廢弛不無有誤國家大事伏望皇上處常思變居安慮危念京師軍馬乃朝廷自将之兵居重馭輕防奸禦侮所係甚重今後凡有興造各該衙門官員不許奏討團營軍士做工敢有故違許科道官指實劾奏置之于法更乞天語丁寜著為定例其坐營把總等官務要曲加撫恤不許擅役科害敢有不遵事發照依内外提督大臣欽奉勅諭内事理發落其三大營做工官軍各該管工内外官員亦要督令作急修完不許似前遷延因而私役賣放以致軍士受害往往逃亡其團營仍查照𢎞治二年該司禮監太監韋泰同臣等選軍之後奏准事例毎營再行揀選十分精鋭馬軍歩軍各二千員名以為上等之兵遇警動調撥營前去免致又行挑選遷延數日不得起行有誤應援其逃故之數本部仍通行各該清軍官員用心清理如不及數考滿之日不許陞用庶兵有所飬勇於赴敵而逃亡亦少矣仍望皇上念戰馬為國家所重草塲乃戰馬所資乞降勅齎付見差清查京衛牧馬草場給事中御史等官并伍軍三千神機營各選差年老知識草塲所在官一員隨同給事中等官前去将永樂年間原撥各營牧馬草塲拘集地隣人等從公取勘四至明白就為丈量毎營原該地若干頃内巳耕種地若干長草堪以牧馬地若干巳耕者要見何人管業係親王管業者另撥無礙地土補還退出草塲牧馬其餘不分内外勢要官員俱要退出若係軍民私自耕種者取問如律丈量之後四至埋立封堆仍於各該教塲官㕔内䜿立石碣将四至鐫刻在上永為查照自後再不許一人奏討如有故違許科道劾奏治罪今後馬軍敢有将該支料豆預賣與人及将官馬僱與人騎坐者事發俱於教塲門外枷號半月滿日仍送法司問罪與僱馬之人照例罰馬一匹親管官員若有侵欺料豆一二石者照常例發落五石以上及擅撥馬五匹與人騎坐者事發降一級料豆至十石馬至十匹以上者降二級仍調外衛帶俸差操其軍民職官人等若有私賣軍士料豆下倉關支至二十石以上者事發俱發邊衛充軍更乞勅户部将京營馬匹春冬六月支與草束三個月一月本色草束二月折色銀兩毎名月支與三錢尤望皇上以兵器為士卒衛身克敵所資乞勅工部通查内府各庫見收軍器共有若干遇警有無彀用是否堅固如有不足乞勅内府兵仗局成造精緻盔甲腰刀斬馬刀長牌弓袋各二十頂副把面工部差官送去浙江福建江西河南山東南北直𨽻廵撫官處無廵撫者送鎮守廵按官處交收各将所屬衛所并有司該辦軍器物料徴收一二年之數或見收在官并拖欠未完查追完備於本布政司收貯直𨽻俱於各府収貯布政司去處委三司堂上官江北直𨽻俱於淮安府江南直𨽻俱於蘇州并太平府北直𨽻於真定永平二府就委各府知府并各衛管局官員提調却将各衛所局匠通取到於布政司并前定府分軍器局内免造長鎗四根折造斬馬刀二把團牌改造長牌照依發去式様併工成造其弓箭俱照宣德正綂年間弓要絲綿寸扎外用堅漆甲面俱用厚密青白綿布釘甲俱用火漆小釘若有造作不如法者三司并各府衛委官照依織造叚疋事例恭問降級發落若已造完陸續差官運送來京工部㑹同本部官看驗總送内府各庫收貯專備從調官軍領用以後前項司府每二年俱照此例攅局成造一體運送赴京照前看驗交收庶軍器可用不致有誤本部仍通行内外各衙門大小文武并科道官及天下鎮守廵撫廵按三司并府州縣等官各查照本部先今事理但有習熟韜畧弓馬絶倫或有出衆竒才堪為将官者不分行伍士卒或草野之人俱聼擢用有司以禮起送赴部本部通将節次所舉未用将材并原係将官後因縁事不係失機革去責任者㑹同五府各部都察院通政司大理寺六科十三道官逐一評議某人可任主将某人可任副将某人可任恭将某人可任守備某人可任方面具名奏聞挨次斟酌推用舉到竒材另行㑹官考試照武舉事例具奏擢用其舉到将材若有奔競請託者終身不録各官亦要用心訪察務得實材不許一槩濫舉有孤朝廷廣求将材盛意庶将官得人任用竒材不致遺棄更乞勅團營提督内外大臣今後凡遇春秋三九月常操之期早為具奏行令欽天監選擇吉日務在十五以裏不許過期其操習規矩遵依洪武永樂年間操法五日之内走陣下營二日演習武藝三日軍中號令全在旗幟金鼓其執旗掌金鼓之人務選年力精壮耳目聰明者造冊在官不許頻換教演之日務令軍士目識旗幟耳聼金鼓令其旗東則東旗西則西隨其所指千隊如一鼓動則行金鳴則止行止合節萬軍無錯至若斬馬長刀摧鋒破敵全藉此器京營原無教師合無行移陜西鎮廵官於在城操軍内揀選十分諳曉馬歩刀法者二十四名應付口糧脚力差官管送來京於十二營每營撥與二名於各千原習大刀軍人内選出三五名令其習學待其通曉其法却令專教本千軍士以一教十以十教百以百教千自然習熟原取陜西軍人俱各放囘仍查本營操軍除神鎗刀牌外其弓箭手共若干員名於内府該庫收貯各處布政司運到歲造官弓内毎名給與一張各隨力之强弱以揀弓之硬軟務要日逐用力開弓時加演習日乆自然射能及逺而堅甲可透冦賊知懼不敢輕衝其馬匹尤要加意操習使馳逐合度不致生拗鞍轡之𩔖俱要堅固整齊庶便於馳驟可以克敵夫數者之中将得其人為要若兵馬精勇軍器堅利而又将得其人再加以倉廩充實雖有外侮不足慮矣臣等職掌兵政因兹北敵窺伺中國武備未修日夜憂惶寝食弗寜故敢掇拾武備之𦂳要冒昧上陳伏望聖明留意俯賜施行宗社生靈不勝幸甚縁係修飭武備以防外患事理未敢擅便謹題請㫖禁伐邊山林以資保障事職方清吏司案呈切惟帝王之有天下禦外侮固頼乎兵威之盛亦藉乎山川之險故周漢都關中得四塞之固而國祚綿延趙宋都汴京無險阻之利而敵寇慿陵仰惟太祖高皇帝龍飛淮甸奄有萬方定鼎金陵綂馭夷夏其於四方之險無所不飭而於北敵尤注意焉故於甘肅大同宣府大寜遼東俱設都指揮使司并於寜夏設立數衛以屯重兵又建封肅慶代谷寜遼等王以為第一藩籬其寜夏有賀蘭山黄河之險復自偏頭鴈門紫荆厯居庸湖河川喜峰口直至山海關一帶延袤數千餘里山勢高險林木茂宻人馬不通實為第二藩籬而居庸關迤東又命太傅魏國公徐逹修理數年尤為完固封疆之險非前代之所能及迨我太宗文皇帝肅清内難纉紹鴻圖以為金陵雖古帝王之州終是偏居一隅河北之地切近外夷精兵健馬甲於天下若非建都難保無虞乃遷都北平三面而制天下且易於控制外方神謀睿筭亦深且逺矣永樂宣德正綂年間邊山樹木無敢輕易砍伐而外夷亦不敢輕犯自成化年來在京風俗奢侈官民之家爭起第宅木植價貴所以大同宣府窺利之徒官員之家專販筏木往往僱覔彼處軍民糾衆入山将應禁樹木任意砍伐中間鎮守分守等官或徼福而起葢淫祠或貽後而修造私宅或修葢不急衙門或饋送親戚勢要動輙私役官軍入山砍木牛拖人拽艱苦萬状怨聲盈途莫敢控訴其本處取用者不知其幾何販運來京者一年之間豈止百十餘萬且大木一株必數十年方可長成今以數十年生成之木供官私砍伐之用即今伐之十去其六七再待數十年山林必為之一空矣萬一外寇深入将何以禦是自失其險阻而撤其藩籬也靜言思之實可寒心本部雖嘗節次奏准請給聖㫖榜文發去沿邊張掛曉諭禁約軍民人等犯者俱發烟瘴地面充軍但立法在乎上而行法在乎人今鎮守等官已既縱人採取何以禁約軍民年復一年誤事非細案呈到部仰惟我國家遷都北平密邇邉境綏靖之道固賴乎邊兵亦藉乎山險山險之要林木為先居庸關左右山後林木實乃天險為我藩籬近年以來砍伐過半各該守臣既不行禁約又縱人採取倘年乆山空萬一有警将何以禦伏望皇上以邉患為慮以險阻為念乞降勅大同山西宣府延綏寜夏遼東薊州紫荆密雲等處鎮守等項太監覃平孫振劉正陸誾張睿屈進韋朗田亮奉御羅能總兵官神英馬儀劉福陳輝李俊李杲恭将熊岡王志都指揮張原廵撫都御史侯恂楊謐張敷華劉忠韓文張岫魏富張琳并天夀山守備太監主定都指揮解端各思上報朝廷之恩下副委任之重照查本部節次奏准事例各行所屬分守守備備禦等官并各府州縣掌印官員各要嚴加禁約該管官旗軍民人等俱不許擅自入山将應禁林木砍伐販賣違者取問如律俱照榜例押發南方烟瘴衛所充軍其分守守備備禦并府州縣官員敢有私役軍民人等砍伐山木或起葢官私房屋或饋送勢要之人或令子弟赴京販賣者事發恭問畢日軍職俱降二級發囘原衛所都司終身帶俸差操不許管軍管事文職俱降邊逺叙用鎮守并副叅等官違例擅令軍人或縱居民砍伐山木者聼彼處廵撫廵按并在京科道官指實劾奏治以重罪若廵撫廵按知而不舉一體究治仍於應禁林木山口伐木經過河道𦂳要去處差委能幹官軍守把除内外官司奉有明文修理營造筏運官木并小木柴炭查驗明白照舊通放外其餘私自販賣等項大木經過即便拿送合干上司依律究問筏木盡數入官敢有容情縱放者事發俱問受財枉法贓罪庶法令嚴明而山林不致其砍伐險阻不失而京師實資其保障縁係請勅沿邊守臣嚴飭險阻以保障京師事理未敢擅便謹題請旨刋印武書以作飬将材事切惟人君之治天下文德武備相資并用武備莫先於将将得其人則武備自修兵威丕振可以懾伏四夷潛消奸宄矣且古之為将者必學之於師十數年而後成非一朝一夕所可得也葢兵法始於黄帝本之井田其來已乆禹征三苖誓師之詞兵法已具其後周之太公吳之孫子齊之穰苴魏之吳起漢之張良唐之李靖皆學兵之乆而號知兵今武經七書皆諸子所作其詞古其義奥世之講明者少雖兩京設有武學以教幼官并應襲舍人但教官亦多常流不能講明七書之㫖况我朝機宻兵書有禁人不敢習所以将材甚為難得近該本部莭次奏行内外大小衙門訪舉但有諳曉韜畧堪為将官者起送來京經今許乆未見舉薦一人目今除在京各營提督武職大臣出自将門韜畧素諳固有其各邊将官亦止是或號令嚴明或弓馬熟閑或持巳頗亷或愛軍頗仁者求其洞曉韜畧謀勇兼資如古之名将者亦不多見昔宋因有契丹西夏之患最重武備累命儒臣編集兵書其目實繁獨武經總要一書乃宋仁宗命天章閣待制曾公亮等編定仁宗自為之序頒賜内外武職重臣其中所載戰陣攻守行兵布營邊防地里一切器具與夫軍中合用事宜酌古凖今靡不該載武職官員若肯熟讀講解存之於心施之於事雖不如古之名将亦可克任邊方重寄况不係機密兵書在律條亦所不禁各處不敢擅自鏤板所以武職官員多未得見間有抄謄舊本字様亦多差訛國家承平日乆武備漸弛将材乏人邊事雖非趙宋之比固不足慮但西北外夷與我宻邇自古所不能滅屢為中國之患萬一有警勢甚猖獗倉卒之間邊乏良将将何以禦臣等職典兵政國家安危所係若不作飬将材於今日何以得之於将來日夜思惟無以為計欲學武事莫先此書如䝉乞勅内閣儒臣撿尋如有古本武經總要校正明白上進仍乞勅司禮監将此書從新刋板務在字様真正用好紙刷印數百部頒賜兩京公侯伯都督武職大臣并各邊鎮守總兵太監廵撫都御史及副恭遊擊守備内外官員并本部及兩京武學各一部令其如法收貯在各邊者永遠相𫝊凡遇交代不許帯去及損壞遺失各官務要時時觀看十分精熟毋得視為虚文若罔聞知廵按御史時常查考若有帯去損失者亦要追究下落庶武經廣布将材可得而兵寄不至乏人矣縁係刋武書以作飬将材事理未敢擅便謹題請㫖𢎞治九年月日題端肅奏議巻七
