body:
  text: 端肅奏議巻十一明馬文升撰恤民困以固邦本事切惟自古聖帝明王英君誼辟莫不以仁民為首務葢以生民之休戚國家之安危繫焉成周以農事開國以仁愛飬民故傳世三十雖有五伯之强而猶知尊周炎漢去古未逺以仁厚育民故厯年四百雖有中衰之禍而旋復舊物此皆以仁政得民心之深而民仰戴不忘之效也繼而隋唐趙宋其君有始雖勵精圖治躬行節儉而鮮克有終者仁政不能久施於民而又有突厥吐蕃契丹西夏之患兵戈不息民不聊生卒致傾危而不可救此仁政不能久結於民心之驗也載在史册昭然可攷下迨前元政教凌替風俗既壞綱紀漸淆固不足言矣仰惟我太祖髙皇帝埽除前元奄有天下拳拳以愛民為本懇懇以憂世為念驗田取賦十一而税凡有買辦免其徴納未甞輕斂於民永為定制故民之感恩淪於肌膚浹於骨髓得民之心實有同於三代萬萬年之國祚葢已基於此矣列聖相承咸遵是道但自正統十四年承平日久兵政廢弛浙江葉宗流福建鄧茂七廣東黄簫養哨聚於南方夷酋也先等侵犯乎京師自此天下多事而民漸凋􅉵矣肆惟皇上即位之初崇尚節儉尤切愛民内府各衙門供用之物俱定有中數雖光禄寺奉上之物亦䝉御批而取是以節儉之徳𫝊播天下仁厚之政繼述祖宗近年以來為因敵人犯邉内府成造軍火器械等項及百工技藝之人添支酒飯所以内府各衙門𣲖出物料牲口數多况又該用一倍而𣲖三四倍者不分㑹有㑹無年年𣲖出無有止息該部依數分𣲖有司照數催徵懼獲稽遅之罪定立均徭之名有一大縣一年𣲖銀五六千兩者三四千両者至小州縣亦𣲖銀數百餘兩而粮草驛站京班皂𨽻砍柴擡柴夫役収買備用馬匹該銀不下數百萬両不在均徭數内俱係小民膏脂前𣲖者未完後𣲖者復至加以宗藩位多冗官太濫禄俸等項及起運京儲邉粮之外存収粮米所餘無㡬凡百買辦俱係民供其視祖宗之時大有不同以此小民窮困已極怨聲盈途皇上深居九重何由得知臣詢之天下至京方靣官員并各該鄉官仕於京者皆以買辦頻繁均徭出銀累民為言大戕邦本實由于兹况今両廣江西盗賊生發良善受害浙江湖廣等布政司及應天并南直𨽻各府州縣俱有水旱灾傷民多闕食荷䝉皇上欽命憲臣前去廵視及勅廵撫等官用心賑濟愛民之仁無以加矣若節年所𣲖物料不行斟酌蠲免有司懼罪嚴刑追徵是所賑者少而所徵者多欲民之不逃亡胡可得乎葢自古民安則思治民困則思亂和氣則致祥沴氣則召異此理勢之自然也今徭税既重灾傷荐臻武偹衰弱倉廪空虚盗賊充斥而灾異迭見于此之時若不溥施恩典少蘇困􅉵誠恐闕食之民奸宄之徒乗隙哨聚處處蠭起卒難撲滅雖有智者不能善其後矣事之可憂莫重於是葢恩貴預施患在早弭故書曰制治於未亂保邦於未危易曰君子以思患而預防之實有天下者所當深致慮也伏望皇上以社稷為重以斯民為念乞勅戸禮兵工四部各查自𢎞治元年起至十六年止節次𣲖出浙江等十三布政司并應天順天二府及南北直𨽻府州縣一切買辦物料牲口果品及兵部見追節年虧欠倒失馬匹草塲等項銀両并成造解京軍器與夫一應物料已未完數目備查明白徑自具奏一總㑹同五府各部都察院通政司大理寺堂上官六科十三道掌科掌道官從長計議某物料合當蠲免某物料合暫停止某物料果係急用作何買辦凡可以節財裕民久逺良規議處停當上請聖裁如此庶恩惠溥施而得仁政之本民困少蘇而免意外之虞臣叨列六卿之首忝任三孤之職責在上輔君徳下安黎庶永固皇圖安如磐石此心之存死而後已今聞兹民患若不以古今治亂係民休戚懇切為皇上言之早為消弭萬一貽患地方則臣負國之罪将何所辭伏乞聖明俯賜施行宗社生靈不勝幸甚縁係蘇民困以固邦本事理未敢擅便謹題請旨𢎞治十六年十一月初一日具題傳奉事准本部咨准禮部咨𢎞治十八年二月十二日早欽奉聖旨朕方圖新政理樂聞讜言除祖宗成憲定規不可紛更其餘事闗軍民利病切於治體但有可行的着各衙門大小官員悉心開具明白來説禮部知道欽此欽遵偹咨轉行到臣伏覩聖諭此即堯之舎己從人舜之好問好察禹聞善言則拜成湯從諌弗咈之意也葢欲追古帝王克紹祖宗而陋漢唐宋諸君有弗為矣天下臣民何其幸歟臣惟自古創業之君必立一代制度以為子孫典則率由持守不使墮墜者國祚必保于悠久罔克遵承致有廢弛者宗社或至於顛危載在史冊昭然可攷洪惟我太祖髙皇帝膺天眷命埽除前元身經百戰奄有天下稽古定制斟酌損益首開學校定賦税恤百姓開屯田修軍政重鹽法禁贓吏設驛𫝊慎刑獄弭盗賊凡此皆我朝一代盡善盡美之大制度也是以百三十餘年列聖相承率由罔墜世底隆平而治臻熙皥也但自正統十四年以後天下多事民漸凋敝迨今嵗久風俗奢靡人心怠玩上下因循惟務茍且所以祖宗舊章成憲奉行未至多致廢弛加以冗官太濫宗室位多賦重役繁官貪吏暴而民愈不勝其困矣是葢世道之使然也若非修舉以復其舊何以重裕而保無虞仰惟皇上聰明英武大度寛仁總攬乾綱勵精圖治數召大臣咨詢化理此誠大有為之君也其于修復祖宗之舊制奮振一時之紀綱以臻堯舜之治夫何難哉惟在聖心一轉移之間耳臣荷國厚恩五十餘年濫居六卿之長叨任三孤之首銓衡人物固臣職掌寅亮天地亦臣責任軍民利病屢甞敷陳仰荷聖明多見采納兹奉勅旨廣求讜言臣有所聞若不悉心條陳實有以負皇上知遇之恩而孤勉留之意也故不揣鄙陋謹以祖宗舊制所當修舉及軍民利害所當興革而有禆治道條成十事上塵聖覧伏乞俯賜施行宗社生靈不勝幸甚為此開坐具本謹題請旨計開一汰冗員以節國用切惟唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寜夏商官倍亦克用又至周風氣漸開人文日著然考其建官亦不過周官所載古人立政不在官職之多惟在得人任用是以政不繁而民不擾嗣是而後厯秦漢隋唐以及宋元中間沿革雖有不同而官職之增未至甚繁迨至我朝奄有區夏地廣事殷設官雖盛在京大小衙門官員各有額數内外相維體統不紊故當時事不廢而民不困奈何承平日久政務日繁在京在外添設官員十之三四然此或因錢粮賦税軍器河道事當專任或因地方學校馬政水利人貴責成無非上體朝廷下安百姓而其俸禄之給民已不堪今各處宗室已至三十餘府而郡王將軍儀賔不下千餘况各王府大小官員亦該一千五百有竒軍職一至十萬之上其禄米俸隸折色等項豈止數十百萬無非朝廷貢賦之常數天下小民之膏血今在上者蠶食如此之衆則天下之民安得而不困且乏哉查得近年以來憸人白丁專事奔競或假技藝為梯階或以貨賄為蹊徑陸續𫝊奉乞陞大小官幾至千員通計所食俸粮動至萬餘石折色隸銀且及數萬兩夫以朝廷有限之財供此庸軰無益之用聖政為之少虧士𩔖因之解體况今敵寇窺邉災異迭見加以各處盗賊生發地方未寜若不預為節省儲蓄萬一倉卒有事軍國之需豈能遽辦本部已甞二次將冗官當革者上請定奪至今未䝉聖㫁伏望皇上以節財為國家之首務以冗官為時政之大弊乞將前後𫝊奉乞陞人員容臣本部再行偹細開具上請㫁自宸𠂻或革去冠帯仍應原役或姑與職銜住支俸隸其餘無益於事而濫支俸隸者行令間住天下衙門添設布按二司并府州縣㕘政㕘議副使僉事府同知通判州同知縣縣丞主簿等官本部㑹同各部都察院大理寺通政司六科十三道掌科掌道官從長計議酌量裁革庶官不冗濫而財不妄費矣一育人材以備任使切惟人君莫先於圖治圖治莫先于育材育材必資于學校學校者人材之所自出也且一代之材自足一世之用惟在作養之何如耳若養有素問學必博心術自端以之修政而政無不舉以之立事而事無不立自無乏材之歎一代之急務又豈有重于此哉粤昔三代之時人無不學而所學者窮理正心之要所講者仁義道徳之源所習者修齊治平之道一旦以偹公卿大夫百執事之選則其所行皆此素定其所施張不待閲習而後能以之赴難則不愛其死隨遇而施皆稱其任所以人材濟濟而治隆俗美也及周之衰下逮漢唐雖有大賢名儒才負經濟惜乎其道不得大行而治不古若也天啓皇明我太祖髙皇帝平定天下之初修武之餘即興文教於天下府州縣皆設學校慎選師儒以教育人材三年開科取士務得明體適用之才博古通今之士使内外任事有司之官悉由科目出身所以人才軰出任用不乏至宣徳年間學校漸為廢弛正統初大臣建議於南北直𨽻并十三布政司各設憲臣一員以専提調頗為有益奈何近年以來提調官用心作興者固多虚應故事者亦有况教官多貨殖以營利期考滿以陞官生員成材者自肯讀書其餘者則茍延度日不知性理為何物經濟為何事比得嵗貢年已五十又因邉方多警許其納銀地方荒歉許其納粟俱得入監既為監生再不務學此大壊人才之一端况各年上銀納粟監生本部聼選者尚有數千餘名雖年少舉人嵗貢監生亦與彼挨次厯事上選之後又待十數年方得選用闕少人多取選未到精神漸衰鋭氣已無此淹滯人才之大弊也惟成材生員倖得入科偶合程度即為中式既仕之後安於小成而無仕優則學之功識見未廣經濟少充所以本部每於推舉京堂并方靣官之際常以得人為艱且今之人才惟藉進士舉人三年之間除為守令者不過二百餘人固可資其安養黎庶其餘俱係年老并納粟之軰欲望赤心報國而福澤蒼生豈可得乎葢人才盛衰國家之治亂安危繫焉必須申明振作方可得其真才如䝉乞勅該部轉行浙江等十三布政司并南北直隸提調學校御史副使等官各嚴督所属府州縣學教官各將本管廩增生員教以性理之學飬其心術之正仍通行嚴加考選果係成材累經科舉年未五十者增廣生能作經書義資質俊秀堪為後日之用者俱存留在學教養廩膳五十以上不能科舉增廣四十以上不通文義者宜遵勅諭内事理量為處置使人才不至于久淹教養不視為故事仍宻訪各學生員平昔孝友著聞又不作非為者為一等雖不善於作文而謹禮法者為二等造冊在官則善者知所勸不善者知所懲而自過日遷于善矣是亦三代教養人才之一端也提督官仍每季于四書本經内每府州縣各出題目務闗性理四書三篇經四篇論䇿各一道按季預先發去令其作文週而復始不一二年經書題目出之始遍性理既明心術自正如此作養十數年後人才必盛於往昔而庶官不至於乏人矣一恤百姓以固邦本切惟自古人君之有天下未甞不以愛養斯民為首務也葢民惟邦本本固則邦寜所以供軍國之用者資于彼所以祀饗天地宗廟者資于彼朝廷之上宫閫之内凡百之需無一而不資于彼焉故成周以仁愛養民𫝊世三十而厯年八百是知民者誠有天下者之所當重也仰惟我太祖髙皇帝膺天眷命奄有萬方惓惓以仁愛養民凡遇灾傷即免税糧雖豐収之年度其倉廩有餘之處亦量蠲免地畝税糧什一而税凡一應供用果品牲口顔料等項俱於糧石内免糧買辦未甞分毫重科于民視彼成周尤為過之列聖相承咸遵是道所以人民殷富而天下宴然自成化年來科𣲖不一均徭作弊水馬驛站之剋害戸口鹽鈔之追徴加以柴薪皂隸銀兩砍柴擡柴夫役與夫買辦牲口厨料夏秋税粮馬草每省一年有用銀一百萬兩者少則七八十萬兩每年如是所以百姓財匱力竭而日不聊生也一遇荒歉餓殍盈途盗賊蠭起若不痛加減省大為蘇息誠恐將來之患有不可救者矣如䝉乞􅃯戸部將天下買辦并均徭各照地方從長計議書為一定之規行令永為遵守及將洪武年間原報食鹽戸口通行各該布按二司委自分廵分守並直𨽻府州各委佐貳官員親詣所属州縣通吊戸口文冊備查洪武年間原報食鹽戸口數多今消耗數少者着實減去此先戸口數少今殷富戸口數多者量為増添十分貧難下戸免其報口務足原數每三十年一次造報及一應革弊良法宜從舉行以蘇民困而固邦本仍乞勅禮部行查光禄寺見今收貯歳用牲口價銀如果數多時值收買比之往年價值果賤將𣲖去各處原定價銀酌量再去減去若干行令作急徴收銀兩依限解部轉送光禄寺交收隨時收買應用不致賖欠于人凡百藥材等項不係上納本色者一體減價納銀庶供用不誤而民䝉其惠仍乞勅兵部將民間水馬二站及遞運所馬價舖陳工食銀兩數目及合用廩給口粮各學齋夫膳夫俱定為則例通行天下遵守并將養馬地方或論地免粮或輳丁朋合者備查節年奏准事例再行斟酌畫為定例務在均平南北両便使民不受害而馬無所虧仍乞勅工部今後凡内府𣲖出買辦木植顔料皮張等項查照往年奏准事例估計太多者具奏量減其數其成造軍器弓箭弦條通查在京該庫收貯有餘者量免成造袢襖袴鞋出征軍士多不闗領亦暫且免𣲖折銀及不係急用之物俱要斟酌停止庶財不妄費而民困少蘇矣一清屯田以復舊制洪惟我太祖髙皇帝平定天下之初法古為治首定民田驗畝起科以偹軍國之用次定屯田上納子粒以給軍士之食此我朝一代𦂳要制度行之萬世而不可廢者也故工部設屯田一司專掌屯軍牛具犁鏵耜齒等項彼時天下衛所軍士邉方去處七分下屯三分守城腹裏去處八分下屯二分守城雖王府護衞軍人亦照例下屯每屯軍一名有撥屯地一百畝者五十畝者或三二十畝者所收子粒内除一十二石准作本軍月糧仍納餘粮子粒六石上倉所以各衞所倉廩充實紅腐相因而軍士無乏粮之虞迨我太宗文皇帝其于屯田尤為注意創置紅牌事例示以激勸良法冊籍明白無敢欺隠者不知始自何年屯田政廢冊籍無存上下因循無官查考以致衞所官旗勢豪軍民侵占盗賣十去其五六屯田有名無實所以各該衞所軍士月糧有一二年不得闗支者近因灾異該廷臣㑹議奏准差給事中御史并戸部官一員請勅前去南北直𨽻浙江等布政司并両京㑹同清查各衞所屯田隨該戸部郎中等官王勒等將清查過在京并在外保定等衞所屯田頃畝及該子粒數目奏行戸部㑹官計議定奪臣因看得本官所奏清出在京在外衞所屯田彼人侵占等頃共四萬一千餘頃該徴子粒四十萬八千餘石中間尚有未能清出者以其未知某衞所係洪武年間舊設某衞所係南京并口外調來一例清查又多委有司官員踏勘下人作弊以此未得其詳不能清足原額其南京并南直𨽻江西等處衞所屯田清出者尤少况今軍士月粮累嵗不得闗支而歸怨於朝廷勢官豪軍侵占屯田而久享厚利軍士嗟怨人心未平若不再行查冊設法清理則占地之家終為己業而屯田之制終未得復將来無所憑據軍士月粮何從仰給事之所重莫先於此如䝉乞􅃯該部一靣咨行南京戸部於後湖冊庫内檢查洪武永樂洪熙年間屯田黄冊一靣行查両京衞所某係舊衞某係新設某係各處調來某衞所幾分下屯該地若干頃但係屯田一應事例通查明白仍查先差官員已行回報未足原額數多者并未經清查去處各再差官請勅前去設法清查若清出七八分去處不必差官止請􅃯廵撫都御史督令都布按三司管屯官員清查務足原額方許造冊回京戸部候各處清查完日通行計筭停當仍仰各該衞所偹造文冊戸部及都布按三司并該衞所各収一本仍造黄冊一本齎送南京戸部轉發後湖官庫如法収貯毎十年一次照民冊事例造繳庶使冊籍明白將来有所持循而祖宗舊制不致廢墜矣一重鹽法以偹急用切惟鹽課者國家之重事民生一日而不可缺者以之偹𦂳急之軍餉以之救㓙荒之民命誠有國者之大利濟時之急務也各處鹽課両淮為急若使法不嚴而利歸于下人必致用不足而患貽于不測所以厯代相因必重其法仰惟我朝建制之初其於鹽法尤為嚴重行鹽各有地方販賣不許越境勢要中納者有禁例軍民私販者有重刑所以鹽法通行無敢沮壊至宣徳正統年間鹽法漸弛朝廷屢命内臣同在京堂上官員前去清理袪除奸弊懲治豪強使存積鹽課常有數十年之用或遇𦂳急用兵缺乏粮餉卒不能至或地方水旱灾荒軍民缺食乏粮賑濟方纔召商中納粮米賴其飛輓以偹急用上納完足通闗激剖就給勘合隨到隨支得利數倍所以客商樂于中納而緩急得其所濟此我朝鹽法之定規也自成化年間以來有乞恩求討者有織造支用加以両京往来勢要船隻夾帯私鹽數多又况行鹽地方之不拘私自販賣之無禁雖有中者及至到邉多不上納粮料止是折收銀両一遇𦂳急缺粮復命大臣前去督理重復勞民買運所以祖宗鹽法壊之極矣若不通行整理誠恐有誤大事如䝉乞勅戸部通查鹽法始末舊規并今日廢壊之由徑自處置停當上請定奪務俾鹽課有餘而緩急得濟法令嚴明而奸弊革除𦂳急之軍餉不致有誤飢荒之民命賴有所活法定之後永逺遵守凡一應勢要之家權豪之人敢有乞恩沮壊者計六科十三道官指實劾奏皇上㫁自宸𠂻必置于法庶祖宗舊制不至於廢弛軍國重務弗被其沮撓矣一廣儲蓄以偹㐫荒切惟氣數流行不能無水旱之灾思患豫防不可無豫儲之備葢有偹則無患也故雖堯湯不免水旱而堯湯之民不至甚病者以其有偹也仰惟我太祖髙皇帝篤意養民其于偹荒皆有定制天下州縣悉出官錢糴糓各於四鄉置倉收貯以時歛散雖遇㓙荒而民藉以安此萬世之利也厯年既久奸弊日滋豪猾侵漁穀盡倉毁稍遇㓙荒民無所賴正統初大臣建議該戸部覆奏選差亷能幹濟京官請􅃯分往各布政司督同司府等官通行整理修復四倉或出庫藏官錢収買或勸殷富大戸出納以復祖宗舊制而民實有賴焉奈自正統十四年以後敵寇犯邉天下自此多事而四倉之粮又為之廢弛矣至成化七年憲宗皇帝時􅃯各該廵撫都御史督令都布按三司官將原設四倉設法積粮三年之内務責成功成化二十年復降􅃯巡撫官舉行天語叮嚀至為詳悉彼時各官亦仰體聖意用心整理倉粮頗積至成化二十一年河南陕西四川大遭荒旱之灾前積倉粮不能賑濟人民死亡流移者十之四五而四倉之粮又為之一空矣以後雖有措置之粮多被看倉人等侵盗抵換所存者糠粃穀稲一遇大荒動經差遣大臣往彼賑濟不賣官鬻爵則上納監生吏典所得無幾而軍民存活者少皆由所蓄不多而賑濟不敷也近日淮揚蘇湖浙江乃其明騐况今承平日久生齒日繁頗大州縣人口百餘萬極小州縣亦不下數十餘萬口若非大為儲偹遇荒豈能賑濟坐視死亡實所不忍仁政所重莫此為先如䝉乞勅該部查照洪武年間創置四倉舊制及列聖降勅整理修復之意從長計議作何處置創為久逺洪規使四倉之粮隨其州縣大小人口多寡遇荒足彀賑濟不致失所其餘歛散闗防良法美意宜從徑自具奏上請定奪庶儲積有偹而遇災無虞矣一撫流移以正版籍切惟戸口以版籍為定人民以撫字為先民雖有流移法貴乎招撫若流移者不能招囘則見在者日見消耗而軍匠埋沒者多矣我朝洪武初招撫流民俱有定法彼時人民安業無多逃亡遇有灾荒流移他所者所司即委佐貳官員帯領各里里甲分投前往有收去處尋訪招撫帯領回還重加存恤或給與雞豚或量免税糧蘇息數年方當差役窩藏流民者有重罰隠占不報者有嚴禁所以流民易於復業而版籍不至於有虧軍匠不致於埋沒此誠安民之良規也迨至宣徳正統天順成化年間民困財竭一遇大荒流移過半上司不知行文有司不行招撫任彼居住詭冒附籍南方州縣多増其里圖北方州縣大減其人戸軍匠消耗率由於此年逺者卒難得回近逃者尚可招撫若不申明舊制着實舉行誠恐數十年後逃移税糧併於見在人戸陪納日加困苦無以聊生誠非治道之所宜也乞􅃯戸部通行陕西山西河南山東北直𨽻廵撫都御史各行所屬大小州縣各查自正統元年以至𢎞治十六年某州縣逃移人戸共若干曽經招撫復業若干戸一向未曾復業若干戸及行湖廣四川南直𨽻廵撫官亦通行所属州縣各查某州縣安挿某布政司某州縣人戸共若干軍匠民籍若干添設若干里圖各州縣偹造文冊俱繳送廵撫官處咨送北方前項布政司廵撫官即行所属州縣查對相同委有前項逃移人戸仍各差佐貳官帯領里老甲首前去各該州縣闗取如已生成家業者分房前去承種田地辦納糧差其餘原在彼居住者聴從其便此外别有招撫良法宜從具奏施行如此庶流民復其原業而版籍不至于大虧矣一革大弊以蘇軍民照得洪武年間建都金陵一應京儲四方貢獻蜀楚江西兩廣俱順流而下不二三月可至京師福建浙江直𨽻蘇松等府雖是逆流地方甚邇不一二月可抵皇都北方賦税止供各邉不勞逺運所以民不受害而得遂厥生迨我太宗文皇帝遷都北平其南京并各處進貢方物數少尚未有馬快船隻之差至宣徳正統年間以後或裝載薦新品物及南京所造篩簸等項用船數多所過州縣動撥人夫千百名其夫俱係附近州縣衞所出辦銀両僱覔少則用銀十數餘両多則三五十両一年之間自儀真抵通州所用僱夫等項銀不下十數萬両俱係小民膏脂而不係賦税洪武年間裡河軍民未甞遭此困苦來京馬快船隻其弊固多而進鮮者其害為甚且進鮮乃朝廷敬奉祖宗之意固不可闕今所進鮮物若青梅小竹笋蓮藕苔菜宣州梨葢因太祖髙皇帝南京踐祚之時所用故猶進奉供薦今京師果品菜蔬雪梨青杏比之南京所産者其味尤佳隨時供薦亦可將敬又奚待于南京者臣任南京兵部尚書之時偹知内府針工局遞年將在南京内官内使所用鋪陳衣服該用絹布俱于在京該庫闗出用馬快船装載差内官或内使管運前去南京織染局染造差去官到彼俱支廩給下程一年該用銀數百餘両俱係上元等二縣出辦待其染完南京兵部復撥馬快船装運來京南京内官内使者此中做成衣服鋪陳仍闗支絹布復用馬快船隻一同装載差官管運前去南京染造交割嵗以為常此裡河軍民受害第一大弊也臣思天下之弊有大小有逺近若弊之小而近者革之而逺且大者不革豈能回天意而蘇民困哉况裡河實南北喉襟之地我朝鴻圖億萬年若革􅂻河前項馬快船之弊則軍民䝉億萬年之利若前弊未革則軍民受億萬年之害利害之間向背所係又况我列聖相承咸以愛養黎元為心雖皇上篤於大孝以奉祖宗但祖宗在天之靈憫念軍民困苦亦必為之不懌伏望皇上將臣所言乞勤乙夜之覽斷自宸𠂻將前項薦新如青梅蓮藕宣州梨苔菜之𩔖于中量免進奉省少船隻其餘楊梅枇杷鰣魚北方不産者照舊進奉供薦其両京内官内使合用該染布絹每年該局行移該部計筭一年該用若干數俱于南京該庫交収該局每年預先奏行南京該部并南京守偹太監再行查筭明白照数就于南京該庫支送南京織染局染造完偹該南京内官内使者就彼支與應用免其運來以省勞擾該在京内官内使所用者守偹太監選差南京老成的當内官管運前來該局交収定為常例不許奏擾紛更其餘若馬槽篩簸之𩔖止運竹木來京着落此間該衙門匠役編造應用仍乞勅南京兵部今後差撥馬快船隻務照奏准事例滿船裝載不許多撥沿途擾人庶馬快船隻減其多差而沿河軍民免其復害之弊矣一慎刑獄以重民命切惟刑者所以禁暴亂防奸宄聖人不得已而用之故帝舜有欽恤之命周王有敬明之戒我朝列聖相承每下恤刑之詔而又特遣刑官出外審録皆所以體天心而重民命也但律文創自往古其來已逺文義深奥非用心講讀者未能深曉初任刑官者視以為常蒞官之後再不講明問囚之際亦少推情止憑原勘情詞間有失入人死罪在外惟按察司官出自法司頗知律意亦有忽略而不經心者至於推官理問㫁事等官其于律文猶不能知而問囚豈能皆得其當或有明知寃枉而不與辨明者亦有避嫌而故入重罪者比先年間布政司㕘政㕘議等官職專承流宣化俱不問理刑名近年以來有該巡撫廵按官接狀批行問理者有自受詞狀問理者出脱輕罪者固有中間枉人至死者亦多臣每于秋後㑹同多官審録在京重囚情可矜疑者仰䝉聖㫁發落情有未明奏行再問者仍照原擬非故欲人之死葢取自安之道其他府州縣正官有等酷暴之徒逞一已之忿怒輕人命如草芥有犯該竊盜而即時捶死者有犯該鬪毆致死而問擬故殺者民之死于非辜者處處有之撫巡者不之禁両司官若不知小民含寃無所控訴傷天地之和召水旱之災未必不由於此也如䝉乞勅三法司偹載朝廷恤刑之仁憫惜人命之意戒飭司属務要講明律意必至貫通曉暢凡問重囚㕘錯訊鞫期得真情彼此具服方纔擬罪送審審刑官尤宜用心詳讞毋拘于成案勿避其嫌疑使生者無寃而死者無憾以仰副聖天子恤刑之意仍乞勅都察院轉行各該巡撫廵按官行令按察司并分廵等官凡遇問理重囚一體用心不許輕易致有枉抑今後布政司官不許受詞自問刑名各撫按官亦不許批行問理其分守㕘政㕘議若有所属人民有告戸㛰田土吏典民害事情許其接狀咨行本司劄仰理問所問理其餘行府問報大小衙門官員各要心存仁恕愛恤小民不許輒肆酷刑致死人命已告發者提問如律未發者指實罷黜毋事姑息縱令殃民庶刑罰不濫而民罔寃抑矣𢎞治十八年四月初三日具題端肅奏議巻十一
