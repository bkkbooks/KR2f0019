body:
  text: 端肅奏議巻六明馬文升撰災異事准本部咨該准禮部咨前事該廵撫湖廣都察院右副都御史徐恪題據湖廣布政司呈據長沙府申據善化二縣申切照本縣地方自𢎞治八年二月以來天雨不降高阜去處未曾翻耕即今苦竹開花實如麥米楓樹生李實黄連樹生黄瓜苦蕒菜開蓮花七日方纔凋謝備由轉呈到臣㑹同廵按監察御史鄭惟恒議得凡物之生各有常性今當地方旱沴之餘土木併興之際而山林園圃草木多開異花生異實戾性之常厥妖甚異斯固㣲臣失職之咎亦由民力難堪怨聲沸騰有以致之也除洗心滌慮思過補愆及行都布按三司一體痛加修省等因具奏抄出該本部備查近年以來天鳴地震星殞如輪冰雹屢降天火時發夏霜隕禾等項災異歴考傳記以詳厥罰上請皇上修德以弭天意及要行兩京文武羣臣各竭乃心殫乃力勤臣職以奉朝章修人事以回天意期交盡乎修弭之道用少裨於宵旰之憂凡事關乎治理聽條奏以舉行等因具題節該奉聖㫖是弭災之道在修人事事關朕身的當自舉行爾兩京文武羣臣并各處鎮廵三司等官尤當痛加修省勉盡職務共回天意毋事虚文欽此欽遵備咨到臣除痛加修省勉盡職務及本部合行事宜另行條奏外臣聞上天以生物為心人君以子民爲責故自古帝王之治天下未嘗不以飬民為本以順承乎天心葢天下之安危係生民之休戚而生民之休戚又係乎安飬之何如耳民得其飬自然飽食煖衣向仁慕義雖有變故卒保無虞而國祚靈長民失其飬則賦重役繁愁苦嗟怨遇有小釁遽至離心而國勢寖弱成周嬴秦足可為鍳後之有天下國家而為斯民之主者烏可不加之意哉洪惟我太祖高皇帝膺天眷命奄有萬方知保天下在得民心故惓惓以安飬斯民為念立綱陳紀無一政而不在於飬民發政施仁無一事而不寓乎仁愛貪官汚吏之害吾民者必重置於法豪宗巨族之殘吾民者必大治以罪列聖相承率遵是道所以百餘年來海内晏然災異少見民之感德浹於骨髓淪於肌膚無異成周之世也仰惟皇上嗣登寳位愛民之心實同乎舜禹仁民之念遠繼乎祖宗無一令之不善無一政之或乖宜乎兩儀奠位而萬姓咸若三辰順序而百榖告成夫何近年以來乃有前項禮部所陳各處奏報災異數者之中惟地震一事攷之前代固有震者未若今日連年震之不已而海内俱震草木之妖固不能無未見今日併生一府又在同時此皆災異之甚者且變不虛示必有其應由人事乖於下斯天變應於上然而致此者固皆臣等不職所致實由賦重役繁小民不得其所之所感召耳何以知之什一而税古之常制今之田畝十税八九且宣德正綂年間宗藩位少武職未多江北布政司税糧撥付邊方京倉上納者每石價銀不過五六錢多係布絹之𩔖來京糴買未嘗專要銀兩而有司倉存收者俱收本色其運之數十之四五近來宗藩位多武職太濫邊務方殷禄米去其大半小民之糧盡數改撥京邊二倉上納每糧一石少則用銀八九錢多則用銀一兩一二錢俱要煎掣淨銀豊年用糧八九石方得易銀一兩歉年則借取富室收後加倍償還間有空間地土又被各王府及勢要之家占為荘田催租之人百般科害控訴無門往年京師倉庫錢糧易於上納邇年使用之錢過於所納之數若至絲綿花絨闊布大絹一切物料交納尤難非經攬頭小民不敢上納所以在京米糧雖賤價值日増每一布政司該徴銀百萬餘兩而備用馬價抬柴夫役京班及司府州縣官柴薪皂𨽻驛遞馬驢船隻又該銀數十萬兩而買辦顔料織造縀疋供用之物不在其數江南兌運京倉并各衙門糧米運至京師者每正糧一石亦該二石之上甚至三四石者今年如是明年亦如是歲歲如是無有了期桑棗鬻之已空而絲絹猶徴田畝賣之已盡而税糧猶存逃亡人戸税糧併於見在人户代納收成已畢而枵腹啼饑者比比皆是隆冬墮指而赤體號寒者處處皆然衣食不足罔知禮樂風俗日見其澆漓人心日滋其奸偽子詈其父習以成風弟毆其兄恬不為異究其所由社學乆廢人不讀書以致如斯賦重困民未有甚於此時者也好逸惡勞人之常情古之帝王遂民所欲今天下之民河南者因黄河遷徙不常歲起人夫五六萬每夫費用盤纒銀一二兩逐年挑塞歲以為常近因河決張湫有妨運道欽命内外大臣往彼修築又起河南山東人夫不下二十萬所費錢糧不可勝計皆出自小民膏脂江南蘇松等府挑濬河道亦曾起人夫二十萬即今南北直𨽻河南山東沿河沿江燒造官磚及湖廣前後修葢吉興岐雍四王府該用人夫匠役不下五十餘萬江西前後修盖益夀二王府今山東青州修葢衡王府二布政司亦該用人夫數十萬先修者三年之上尚猶未完後修者方纔興工先後用銀豈止數百萬兩今兩廣用兵民之供運軍餉者又不知用夫幾何山陜二西人民供給各邊糧料終歲勞苦尤甚他方及僉派天下各王府校尉厨役齋郎禮生每當一名不數年必致傾家蕩産且洪武年間封建諸王惟秦晉等十府規模宏大壯麗將以懾服人心以固藩籬其餘諸王府俱各差減葢恐費民財而勞民力也永樂宣德年間亦皆如是以後年間修葢各王府方纔寛大宏麗一府有修葢二三次者北方府州城濶民稀拆毁軍民房屋不致太多今江南府分多有依山順嶺傍河臨江城小人稠自唐宋以來未曾封王軍民居住相傳數代生齒日繁今聞差去内外官員止照北方王府周圍墻垣丈尺及起葢軍校營房有將軍民房屋拆毁十之二三者甚有拆去四五分者斬山平地多傷風水軍民蕩析其居無所歸着訴告之言盈於道路嗟怨之聲徹於上穹加以做工人夫暴露日乆萬一積怨恐生他虞即今在京各項工程亦衆操軍連歲少休多有累及逃亡及在外司府州縣并各邊總兵等官非奉奏准明文擅動軍民修葢不急衙門非禮祠廟及耕種自已田土做造私已器皿者亦多裏河一帯直抵南京平昔俱有聽撥拽送馬快船隻等項人夫近因三次親王之國預備接應人夫又不下數十餘萬聼候日乆飲食不足尤爲困苦役繁民困未有甚於近歲者也賦重役繁二者併行則民力豈有不困民財豈有不竭欲望遂其生飬豈可得乎民既流離困苦不得其飬則上天生物之心有未遂矣人君子民之責有未盡矣灾異之來未必不由於此賦税之重勢至於斯固不可已但價值亦當少減工役固不可已緩急亦不可不節王府之修固不可不加宏麗亦不可不計地之廣狹而斟酌損益此等事情關繫甚大若不早為處置誠恐年復一年上恬下嬉灾異之示或不可弭而意外之虞難保必無合無通行各處鎮守廵撫總兵并都布按三司官員今後各要上思朝廷委任之重仰體皇上恤民之仁邊倉糧價斟酌定奪比前量減銀數而各邊管糧官亦不可多收及行仰所屬凡遇分派夏秋税糧之時将京邊二倉糧料先儘上户次及中户起運下等人戸俱作存收或折納濶布嚴禁里書人等不許那移作弊致有不均其徴收之時亦要酌量緩急預定期限陸續設法催納不許要譽逞能嚴刑峻法逼民逃竄其桑棗有遭荒歲砍伐巳盡者亦要申明祖宗舊制着令照丁栽種務臻實效以復民之恒産其提調學校官員亦要修舉社學之規慎選教讀之人各里凡民子弟俱要入學誦讀孝經小學并御製大誥俾知孝弟之道法度之嚴以復民之常性廵撫官尤宜振肅紀綱倡率所屬凡利所當興弊所當革可以養民之生者一一舉行貪官在所當去汚吏在所當黜可以蘇民之困者悉要振作視民如巳之子節財如巳之肉使民無啼饑號寒之苦得遂仰事俯育之天如有盗賊生發小則設法撫捕大則調軍剿滅毋致滋蔓貽患地方其於委任斯無所負其大小衙門若有應合修造工程事干動支錢糧起倩人夫數多者務要奏奉明文次第合應修葢小小工程亦要申禀廵撫等官示下方許修造其餘一切不急之務一毫不許擅科一夫不許擅役及行各邊鎮守分守等官除修邊外不許擅撥操軍修理一應淫祠私宅公館等項并耕種田土做造器皿重勞士卒廢弛武備如有故違通許廵按御史指實具奏提問如律上請定奪情重者文職照坐視民患事例降調叙用武職照私役軍人事例降級發落通行京通二倉内府各庫局内外提督廵視等官并各邊監督官員各要嚴加禁約官攅庫斗人等不許刁難納戸掯勒財物仍乞勅工部轉行湖廣江西先次差去修葢各王府内外官員如果工程未完作急修葢完備若是已完即便囬京不許在彼遷延虚費供給有傷民財仍請勅三道分投齎付今次差去湖廣江西山東修葢各王府内外官員及請勅彼處鎮守太監廵撫都御史廵按御史公同相度今次所修王府各府城内地方有無空闊如果城闊人稀其周圍墻垣丈尺并宫殿衙門一應房屋照式起造分毫不可有減若是城狹人宻别無空地周圍墻垣不必拘於北方王府周圍丈尺徒使府内空地太多以後致令起葢離宫别殿臺榭遊玩去處致惹事端有違祖訓且使軍民嗟怨其合用木植等料着令匠作斟酌相度而用不許因爭小忿將長材故意截短勞民重買有稽工程其督工官亦要撫恤人夫時其飲食不可太急及索要財物若墻垣宫殿基址大工修築已就將原起人夫或分班做工或疎放一半不許盡數拘留致生疾病因而死亡有傷和氣内外官員仍毎半年一次具奏要見造完工程若干用過物料若干見在做工人夫若干不許似前遷延歲月乆勞民力工部仍查内外節年修葢派出料物若干工程巳完未曾送納者即係多餘之數准作後來應用不必再派有司寛其一分則民受一分之惠若然民雖不能盡遂休飬亦可少蘇困敝一二前項事情國家安危所係臣叨任大臣荷國厚恩上在輔君德下在固邦本而國之安危尤其當慮臣乆知生民困苦邦本不固毎欲上陳恐渉越職輒復中止今當灾異迭見之際復奉綸音事干治理許其條奏臣若不以實奏聞而徒事虚文甚非人臣以道事君之義伏望皇上覽臣所言如果有益生民有裨治道斷自宸𠂻俯賜施行更乞益遵祖宗之訓益篤愛民之仁節財用省造作以培植邦本崇正學抑邪術以端澄聖心庻幾天意可回災異可弭而國家萬萬年無疆之基業實在於是矣臣干冒天威不勝戰慄恐懼惓惓為國爲民之至爲此具本親齎謹題請㫖𢎞治八年八月二十一日題陳言申明職掌清理刑獄事陜西道呈刑科抄出大理寺右寺右評事魯永清奏竊聞刑者民命所關刑清則化行化行則民用和睦而百順至否則天降災譴而百異興自古君天下者未有不以刑獄為重也仰惟皇上初登寳位維新治化首頒明詔大赦天下是以乆禁囹圄者悉䝉大造之恩犯至死刑者多獲再生之德中外歡騰華夷稱慶和氣乍周於兩間嘉祥已彌於六合故郊祀一舉而瑞日増輝籍田一耕而靈雨即降是皆聖德和氣感召之所致也太平休徴何以加此将見五榖豐登刑期無刑誠有在於今日臣幸際明時備員法曹顧所司者刑名所專者叅駁不敢越職妄言謹以目擊耳聞弊所當革有關職掌竝不便事件條成五事上凟天聼伏乞優容採擇施行等因具本該通政使司官於奉天門奏奉聖㫖該衙門知道欽此欽遵抄呈到院除均地方以便審録一件行移吏部施行及遵律令以平刑罰等三件先已詳議具奏外内一件詳律意以重大辟節該伏覩宣德三年三月初四日欽奉宣宗皇帝勅諭内載聖人制刑罰用昭天討以弼治化刑罰當則天道和平人心悦服國家天下並受其福否則感傷和氣災沴百出是以古者帝王必慎簡刑官我國家稽古為治建三法司自祖宗以來慎重人命務在恤刑欽此及讀大明律保辜限期内一條以手足及他物毆傷人者限二十日以刃及湯火傷人者限三十日折跌肢體及破骨墮胎者無問手足他物皆限五十日莊誦再三不能無疑夫鬬毆成傷既立辜限則辜外身死當依本條今律云辜内因傷死者以鬬毆殺人論該載巳明其在辜限外及雖在辜限内傷已平復官司文案明白别因他故死者又若各從本毆傷法該載亦明今問刑衙門未審據何所見遇有毆傷辜外死者不分原傷有無平復輙依毆殺之條坐以絞罪恐非律文之意曰辜外因傷死者不合償命則死者何辜誠如所云則辜限一條可以刪去矣何用保辜哉况本條又云若折傷以上辜内醫治平復者各減二等辜内雖平復而成殘癈篤疾及辜限滿日不平復者各依律全科切詳立限之意原以限滿為期若傷未平復辜限一日不滿雖笞杖之輕未敢便决葢恐被傷者死必令償命則杖刑難贖若辜限已滿傷未平復雖徒流之重就便㫁决隨即發遣且限滿不平復毆傷必重有死之理若該償命豈肯遽以毆傷全科其罪乎假有毆人至篤疾該杖一百流三千里仍将犯人財産一半㫁付篤疾之人飬膳設使被毆之人限滿不平復既将犯人坐以全流又㫁以財産若㫁後被毆之人因傷身死復坐以死則非惟立法無有紀極而前之已流㫁付財産又何所處乎今笞杖徒流悉依此㫁獨辜外死者不依此條何其不考律意而矛盾若是也及覩墮人胎條内註云墮胎者謂辜内子死者乃坐其雖因毆若辜外子死者各從本毆傷法不坐墮胎之罪以此推之則辜外因傷死者不坐以死明矣謹按太祖高皇帝制律之時屢詔大臣更定新律至五六而弗倦者凡欲生斯民也後又勅刑部尚書劉惟謙重㑹衆律以協厥中毎一篇輒繕成書上奏掲於西廡之壁親御翰墨為之裁定雖笞杖徒之輕尚歴歴明著其罪若辜外因傷死者律該處死必明定其罪如何又云各從本毆傷法乎昔待制馬宗元之父馬麟毆人致死雖在辜限四刻之外尚不抵死葢以刑主欽恤法無乆近我祖宗立法初意正在於此故名例律云凡稱日者以百刻又曰八十以上十歲以下犯反逆殺人應死者議擬奏聞取自上裁九十以上七歲以下雖有死罪不加刑夫五刑之條莫重於反逆殺人矜其老㓜猶不加刑况鬬毆不過一時忿怒彼此交爭初無殺意比之謀殺故殺不同所以特立辜限若辜外因傷死者一槩坐以絞罪是與辜内因傷死者之罪無異矣豈祖宗欽恤之意乎傳曰死者不可復生㫁者不可復續一或失當則刑斯濫矣昔高宗以刑不濫而致中興寇凖以刑不平而為旱魃刑之所繫如此可不慎歟書曰罪疑惟輕與其殺不辜寜失不經又曰欽哉欽哉惟刑之恤哉此之謂也伏乞㫁自宸𠂻或勅都察院㑹議奏請通行内外問刑衙門今後問擬鬬毆辜外因傷死者罪名合無照依辜限條内該載擬罪難復仍依鬬毆殺人律條科㫁務求至當永為定規毋曰行之已乆難以更改如此庻欽恤稱情人心悦服而辜限一條不致虚設矣查得先該本院奏為講明律意以重民命事近年以來兩京法司官員或由進士初除寺正寺副主事評事或由知州行人就陞員外郎郎中而御史亦多知縣所除到任之後未經問刑就便㫁獄公差所以於律條多不熟讀律意亦不講明所問囚人不過移人就律将就發落笞杖徒流縱有所枉為害未大至於人命一有所寃關繫非輕有将强盗窩主未曾造意同謀官吏因公毆人致死本無挾私故勘而俱擬斬罪者本係故殺却擬鬬毆殺人絞罪者其他以是為非以重作輕且以法司尚然則其餘府州縣衛所囚犯枉抑而死者又不知其幾何此皆原問官員律學未講律意未明之故也乞勅兩京法司堂上官督令所屬天下都布二司督令㫁事理問及浙江等按察司官竝各府推官各要将大明律條熟讀講解深明其意不許似前忽畧置而不講其問囚之際叅錯訊鞠務在得其真情方纔取招議罪之時尤湏原情定擬不許輕易致死有寃抑獄成之後難以分辯明白等因具題奉聖旨是欽此巳經通行欽遵去後今評事魯永清奏稱前因臣㑹同刑部尚書何大理寺卿馮等計議切惟條律之設肇自往古我朝斟酌最為適中互相鬬毆若於虚怯致命去處被傷即時身死者律有明條固不暇論其餘致傷有輕重所以辜限有遠近保辜者毆人成傷保其犯人之罪責令醫治被傷之人恐其致死使彼此各全其生也律曰辜限内皆湏因傷死者以鬬毆殺人論律條甚明固無别議又曰其在辜限外及雖在辜限内傷巳平復官司文巻明白别因他故死者各從本毆傷法且其者變於先意及者事情連後是言若在辜限内傷巳平復不因毆傷别因他病死者止擬毆傷本罪不坐毆殺之條曰别因他故死者從本傷法則限外因傷死者雖不明開以鬬毆殺人論而其意亦甚明矣不然何以折傷以上又曰辜限滿日不平復者依律全科且折跌人肢體致成殘癈篤疾尚流三千里又将犯人財產一半㫁付被傷篤疾之人飬膳若因毆人頭傷風從頭瘡而入限外死者既不坐死又不㫁付財産而止擬毆傷流罪則是於死者反輕於生者反重不惟死者含寃於地下而彼孝子慈孫亦抱恨於生前矣再考祥刑要覧載待制馬宗元之父麟毆人被繫守辜而傷者死将抵法宗元推所毆時在限外四刻因訴于郡得原父死者葢唐律文云保辜限内死者依殺人論限外死者依本毆傷法無别因他故字様於我朝大明律保辜條内文意自不同也但人多不肯講明往往引宗元為説而致疑耳且人命至重律文之意況限外因傷而死者擬以鬬毆殺人絞罪自國初至今已踰百年若有所疑前人豈不具奏合無今後凡鬬毆傷人如前折跌人肢體毁敗人隂陽破人骨墮人胎㫁人舌等傷官司責其保辜限内不能平復纒綿至於限外而死情真事實者仍擬鬬毆殺人絞罪原問衙門臨時備由奏請定奪其辜限内傷巳平復官司文案明白别因他故死者務與推究真情力為辯明不許拘於限内畏懼原告刁潑将被告之人一槩問擬死罪致有寃抑有傷和氣庻於律意不違而刑罰罔濫事體歸一而法司有據縁係申明律意及奉欽依該衙門知道事理未敢擅便謹題請旨選輔導豫防閑以保全宗室事切惟親莫親於宗室法莫嚴於祖訓宗室奉藩循理恪遵祖訓者朝廷親親之恩為益篤縱欲敗度有違祖訓者朝廷黜罰之典所必加昔周武王克商之後以其弟管叔蔡叔監殷後二叔挾殷之武庚以叛流言以傾王室故周公奉命東征誅管叔而囚蔡叔孔子恕之鄭荘公弟叔叚因母寵愛荘公不早防閑封之於鄢縱彼所為候其惡深舉兵伐之如克常人春秋譏之一則事干宗社而示天討之公一則不豫防閑而虧親親之義或恕或譏此天下至公之法而萬世之不可易者也洪惟我太祖高皇帝天生至聖龍飛淮甸袪除前元奄有中夏掃一時之陋俗囘百代之醇風功德之盛逺符堯舜有非後世之所能及故本支蕃衍亦非前代之所能比封建諸王藩屏王室藩王之子封為郡王郡王長子襲封郡王諸子俱為鎮國将軍以漸而降世為奉國中尉藩王府内官設承奉正副各一員典寳典膳典服各所正副各一員内使六名各門門正門副各一員内使司藥二名司弓矢二名外官設長史司左右長史二員典簿一員其餘審理典膳奉祠典寳紀善良醫典儀七所各有正副官二員伴讀四員教授一員内外各設官以理一國之政彼時俱遴選才識老成之人以充其任而輔導之方甚嚴王若有過先責輔導官員所以各王讀書樂善保守其國而稱賢王者甚多縱欲敗度而被黜罰者間有自正統年間至今除秦晉蜀襄淮德吉徽崇等府并新封興岐等府内官不闕外其餘王府内官有闕不行具奏有一府止有承奉一員至全闕不補者宫門傳事多係女人其他郡王府亦無火者往來傳事俱係外人凡百出入尤無禁忌雖有藩王其郡王并将軍有係尊属或族屬頗疎者雖知所為非禮不敢戒諭輔導官員不敢諫正其鎮廵三司官員懼其揑奏欺侮離間動輙差官勘問亦不敢具奏所以肆其所為有潛蓄異謀而烝淫不道者有强擡軍民子女而打死人命者有骨肉相殘而致成讎敵者有密取外人之為嗣者有呼喚樂妓入府姦用者甚至宫閫不肅致生外議者其他将軍有潛入富樂院宿娼者或與市人飲酒賭博者以致禄米揭借於人而衣食不足鞍馬全無而徒歩於市及至事發差官行勘事多不虚因違祖訓事干宗社有不終其天年者有幽之高墻者有削去爵秩者有革去禄米者况醜惡之事傳之天下聞之四夷又恐史冊書之貽譏後世誠有玷於朝廷若使原設内官不闕其員早為扶持輔導外官各得其人早為諫正藩府親王肯為戒諭而鎮廵等官豫為具奏豈有前項之事哉欲其懲治於巳敗而示黜罰之典莫若保全於未然以全親親之仁如䝉乞勅各藩王除本府内官不闕不必具奏外其餘闕少内官内使者明白具奏闕内官若干員内使若干名仍乞勅司禮監於相應内官内使内擇其老成讀書者具奏照闕給賜前去以後有闕具奏除補互相維持府事其合用衣服飲食等項本府照例闗給使之得所不許凌辱䧟害其郡王府毎府給賜内使二名專管宫闈事務及關防門禁其長史紀善伴讀教授乞勅吏部今後有闕務要訪察國子監并在外有學行儒官除授如藩王所為未善長史等官從容諫正如其不聼再三匡諫事情重者如再不聼宻切具奏其郡王所為不合禮度者教授藩王密切戒勉如再不聼藩王具奏事情輕者降勅切責若事干宫闈重者差内官皇親前去體勘至日密切處置不宜露泄於外若係外事仍差内官并法司官前去勘問藩王有過專罪輔導官員郡王有過專罪内使教授如此關防事無過舉其藩王府輔導官員亦要逐日請王於書堂内講讀經史王子王孫亦要講讀習禮若各府将軍有前項所為者各府郡王自行禁治若藩王郡王府互相容隱不行禁治許鎮廵等官将所為不法之事㑹本着實具奏上請區處其藩王府選用多人務要具奏奉有明文定其名數方許於本府軍校之家選用不許過數亦不許强買民間子女郡王将軍使女俱照㑹官奏准事例存留若擅自買用女子及名數過多或令外人入府者許鎮廵官叅奏長史教授降調逺方任用若樂工縱容女子擅入郡王府及容留各府将軍在家潛行及軍民旗校人等敢有與将軍賭博誆騙財物及擅入王府教誘為非者事發邊逺充軍色長依律問罪革去管事保全宗室莫過於此臣叨任大臣毎見宗室所為不善事露容之則違祖訓所以不能保全者多臣切憫之故敢冒昧上言伏望聖明留意俯賜施行宗室幸甚為此具本親齎謹題請㫖𢎞治九年四月初六日具題陳情乞恩休致事切念臣猥以寒㣲遭逢盛世歴履中外四十餘年官濫叨於極品報無補於涓埃毎懷尸素之慙恒切覆餗之懼去嵗臣年七十例該致仕巳嘗懇乞歸田以避賢路奏奉欽依卿累朝舊臣方切委任正宜盡心職務豈可引年求退不允欽此實皇上圖任老臣人惟求舊之盛意也臣伏覩綸音感激益切雖隕首糜身無以為報臣遭遇聖明千載竒逢况荷寵榮復踰涯分正當罄竭疲駑勉圖報稱但臣自今春以來兩目昏花腰痛耳鳴加以疝氣舉發脾胃虚弱精神頓減於前時思惟不及於往日勞心之乆輙生暈昡貌雖未甚龍鍾年實踰於古稀近冒風寒亦覺衰老况臣職掌係干兵機萬一事有所誤罪将何辭若不再乞退休恐來冒濫之譏不能全臣終始之節伏望皇上憫臣衰老曾效犬馬㣲勞容臣致仕俾得生還閭里少延殘喘數年臣不勝感戴天恩之至為此具本親齎謹具奏聞伏候勅旨𢎞治九年十月十二日奏端肅奏議巻六
