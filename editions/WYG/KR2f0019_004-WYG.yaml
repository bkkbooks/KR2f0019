body:
  text: 端肅奏議巻四明馬文升撰迴避讎害大臣事𢎞治二年七月二十七日臣因八月初二日祭祀先師孔子及初三日祭大社大稷在於本部宿歇齋戒二十八日早有臣宅内守門皂隷王順到部説稱今夜四更時分有不知姓名人在於門外口呌開門數聲不曽答應良乆聴得門響至天明開看得門上射有大箭二枝入木甚深及問大街口坐舖火夫亦說前項時分有一騎馬男子再三問馬尚書回家不曽止見徃巷内去訖等情臣先訪得本月失記的日在於東長安門外丢有匿名帖子亦寫臣姓名及揑別項重情皆欲害臣性命切念臣本以庸材叨任南京兵部尚書荷蒙皇上嗣登寳位之初首轉臣左都御史總司風紀又命臣提督圑營操練軍馬續又陞臣前職臣累蒙皇上莫大之恩誓欲致身少圖補報況賦性愚直凡事惟務公道讎怨有所不避且如近日㸃選圑營官軍黜退把總二十餘員令回老家管事該營至今未曽定奪併禁約放債之家不許多取利息逼迫操官在逃或銓選武職減革職事或奪勇士優免戸下差徭臣止知為國為民豈料致有衆怨且衆怨所聚中傷必多考之前代俱有明騐觀其前項二次所為必欲害臣性命可知況臣叨任大臣日逐朝叅住居頗逺起身須早豈能一一防避萬一被害臣之一身固不足惜其實有傷國體而臣下誰敢為國任事此事闗係非輕兼臣衰老多病管理部事尚不能任其圑營事務尤為繁劇官軍驕惰最易生怨臣實不能兼理伏望皇上憫臣衰疾容臣止管部事免其提督圑營臣不勝感荷天恩之至仍乞勅厰衛行事官校併五城兵馬宻切體訪前項行兇併投匿名帖子之人務在得獲鞫問明白置之重典庶奸惡之所畏懼而任事大臣不致受害國體不致有傷而治道為之益隆矣縁係辭免提督圑營併禁約奸惡事理為此具本親齎謹具奏聞伏候勅㫖𢎞治二年八月初五日奏蘇民困以弭災異事照得先准禮部咨該司禮監太監韋泰傳奉聖㫖近日京城雨水為災南京又奏大風雷雨之異朕當檢身飭行祗謹天戒爾文武百官尤當各加修省勉其圖報毋事因循各衙門政事有闕失當舉行改正的斟酌停當來說禮部知道欽此欽遵轉行到臣除仰遵聖諭痛加修省及將本部當舉行改正事宜先行條奏外臣惟天命人君以出治人君命臣以分治皆所以為民也葢君非民則無以守其國得乎民則國祚延長失乎民則社稷衰微故書曰民惟邦本本固邦寧孟子曰三代之得天下也以仁其失天下也以不仁傳曰民猶水也水能載舟亦能覆舟是以自古聖帝明王英君誼辟未嘗不以愛民為本而施仁為先也成周𫝊世三十歴年八百得乎民心之深耳洪惟我朝列聖相承咸能愛養斯民使得其所深仁厚澤洽於民心故今百十餘年民之愛戴無異成周但生齒日繁地土有限豐收之年尚可度日一遇㓙荒輒多餓殍況邇年以來差役繁重科派無度且如京畿之民既有擡柴砍柴人夫毎名一年用銀二十一二兩雖曽減去四五兩尚有一十六兩之多又有寄養孳生馬匹京班皂隷各閘閘夫及内府各衙門黄穰苗撞竿等項差辨非止一端毎一州縣一年多者用銀三四千兩少者一二千兩至如通州僱倩接應人夫一年各縣協濟亦用銀數萬餘兩而稅糧馬草不在其數往年全靠多餘地土幫助近被皇親功臣勢要之家占奪已盡民之困苦所不忍言嗟怨之聲盈於道路致災之由恐在於此非獨畿甸之民如是而天下之民皆然又如南京内官監成化年間具奏徑行南京工部坐派南方各布政司銀硃土硃生漆鐡線肥皂各五萬觔共該用價銀二十餘萬兩其他買辦又不可勝計民困財竭誠未有甚於此時者也幸遇皇上嗣登寳位以來布徳施惠節儉愛民恤刑獄重農事聴賢納諫任賢去邪凡百無益之事悉皆革罷雖古帝王亦不能過宜乎雨暘時若諸福之物可致之祥莫不畢至然而各處猶有天鳴地震星殞河決兩京大水雷雨之災異者此盖天心仁愛示此儆戒正欲皇上仰體祖宗之心以安養斯民以撙節財用以培植國家而鞏固皇圖於億萬斯年也且天下之民固所當愛而畿甸之民尤所當深愛也今順天等八府之民既有前項徭役又遭此水患加以秋收無望即今已有缺食流移者冬末春初必須賑濟若徭役不減照舊徴收是所濟者不及十之二三而取於民者十之八九内而饑寒切身日無所給外而嚴刑峻法日加捶楚隨濟隨追欲民之不逃亡不餓死豈可得乎其追陪馬匹抬柴夫役已該兵工二部覆奏暫且停追外其餘科派徭役尚多若不通行查勘痛加減免不惟逃亡饑死又恐致有意外之虞自古人君欲回天意而弭災變必先愛民而節財用如蒙伏望皇上法成湯之子惠困窮思周文之惠鮮鰥寡乞勅户部速行巡撫直隷都御史轉行順天等八府除糧草外各將本府所屬見今一應買辦嵗辦併各項徭役共若干項毎項用銀若干兩通共用銀若干兩作急具奏候奏報之日該部㑹同各部都察院大理寺通政司六科十三道從長計議某件合當暫且停免某件合當量為裁減中間果係内府𦂳闗合用之物者該部支給官錢買辦送用仍通行浙江等十三布政司並南直隷應天等府今後毎年終將奉到兩京各部勘合坐派所屬一應買辦物料及嵗辦之物備開件數併該用價銀數目備細具奏仍照前㑹官計議當裁減者奏請裁減當停罷者停罷永為定例内外諸司衙門敢有故違擅自朦朧具奏増添者許科道官指實劾奏究治仍乞勅户部預先區畫賑濟被災州縣饑民錢糧以備臨時之用併將各免糧草作急定奪蠲免庶使民困少蘇天意可回矣災異可弭而祖宗之鴻業可以保之億萬年而不替矣臣叨居大臣同國休戚覩兹災異義所當言不敢緘黙縁係恤民弭災事理未敢擅便謹題請㫖𢎞治二年八月二十七日申明舊章以正罰俸事伏覩大明律内一欵凡祭祀及謁見園陵若朝㑹行禮差錯及失儀者罰俸錢半月欽此又伏覩大明令内一欵凡民官月俸錢米相兼罰俸止罰俸錢軍官月俸全米如遇罰俸合與民官一體扣筭追罰俸錢欽此此我聖祖立法葢因文武官員凡有小過輕犯不即加罪止是罰俸而又止罰俸錢猶存俸米使之得以養其妻子不至失所情法兩盡其仁愛優恤臣下之心雖古帝王無以加矣但令内所載年久未曽申明近年以來文武官或有大小罪責荷蒙朝廷寛容罰俸有一月二月者有四月五月者戸部行令將月俸不分錢米盡行住支況邇因水旱灾傷倉糧數少即今各官月俸止支本色米三分折色錢鈔七分若不分錢米全不闗支妻子無所養贍未免啼饑大官猶可小官何以度日誠非聖朝頒禄養亷古者既富方穀之意也恭惟皇上嗣位以來凡事法祖一應舊章悉皆舉行天下臣民不勝慶幸如蒙乞勅户部遵依大明令内所載事理通行在京大小衙門今後凡奉欽依罰俸者止將月俸折色銀鈔照數住支仍存本色養贍妻子庶祖宗舊章得以昭明罰俸官員感蒙惠澤臣叨任大臣事干國體職所當言者不敢緘黙縁係申明舊章以正罰俸事理未敢擅便謹題請㫖𢎞治二年十月日題勤恤小民以固邦本事臣聞天命人君居大寳之位享天下之奉所以為民也人君簡賢任能分布庶位亦所以為民也葢民為邦本本固邦寧民心之向背天命之去留宗社之安危繫焉故古之聖君良臣未嘗不以安民為務若民有未安則愁嘆嗟怨自足以召水旱之災致非常之異欲致雍熙太和之治而保天下之無虞葢亦難矣故臯陶告舜曰在安民孟子之美文王曰視民如傷易曰節以制度孔子曰節用而愛人葢侈用則傷財傷財必至於害民故愛民者必先於節用也然則有天下國家而為人民之主者豈可以不恤乎民哉仰惟皇上聰明睿知文武聖神曩在青宫已勤聖學既登寳位尤篤力行所以於帝王𫝊心之法得之已深而帝王致治之要行之已效宜乎雨暘時若天地位育諸福之物可致之祥莫不畢至然而近年以來各處水旱蟲蝗晝晦地震是皆灾變之大者非皇上仁民之心有未至葢天心仁愛示此灾異欲皇上側身修行戒謹恐懼節儉愛民以隆祖宗莫大之洪業於億萬斯年而不替焉耳皇上亦當仰答天意思繼祖宗克勤克儉而愛乎民焉臣謹以民之困苦言之且如河南山東南北直隷府州縣毎年該備用馬二萬匹毎馬一匹用銀一十五兩共該銀三十萬兩惜薪司砍柴抬柴等項人夫一年共用銀三十萬兩京班皂隷六千七百餘名該柴薪價銀八萬餘兩通共該銀六十八萬兩及各王府郡王將軍郡主郡君等位生者葢造府第薨者修理墳園及祭祀等項又該銀數萬兩而買辦採辦秋夏稅粮水馬驛站又該數百萬兩且天下之生財有限不在官則在民以有限之財應無窮之徵年年如是欲民之不困財之不竭豈可得乎民財既竭一遇水旱災傷流移死亡餓殍盈途所不忍言加以官吏之貪酷惟知催科之𦂳廹小民困苦無所控訴嗟怨之聲上徹於天災異之召實由於此況近來内府各衙門坐派諸色物料供應牲口等項較之永樂宣徳正統年間十増其三四該部依數派去有司徵收急於星火北方之民別無恒産止是種田既要完納糧草又要備辦科徵收成甫畢十室九空啼饑號寒比比皆是即今河南山東陜西山西及南直隷揚州等府俱被旱灾又多蝗蝻生發加以官府追徵遞年拖欠錢糧及買辦等項小民變賣田産已盡計無所出逃亡數多倘來春青黄不接所在倉廩空虚無所賑濟其勢必至人自相食而意外之虞難保必無賑救之儲不可不預為之備伏望皇上上思天命之眷顧祖宗之付託下念小民之艱難法成湯之子惠困窮體文王之懐保小民凢百用度務從儉約無益之費量為減省及乞勅内府各衙門今後凡派出合用營造物料務要㑹同該部計算各庫㑹有㑹無合用若干方纔奏行該部斟酌合該司府地方有無災傷分派前去依數送納不許似前多派一槩具奏若有故違雖奉有欽依該部亦要明白覆奏減去亦不許依奏分派累及小民仍乞勅該部將前項果被災地方一應拖欠錢糧併買辦採辦等項物料暫且停止果係内府𦂳闗合用之物許借支官銀買辦應用其在京各衛門大小官員皂隷係補助俸糧不及難以停止亦暫派江南王府頗少併無南京各衙門皂隷去處十分之三不必令人前來止照例總解柴薪價值自𢎞治四年為始候豐收之年照舊分派原僉去處應當十分災傷去處戸部仍豫先差官前去整理賑濟錢糧若臨時前去人民逃亡餓死巳多不無緩不及事其該追虧欠倒失馬匹亦暫免追補備用之數災重去處暫減三分明年收成之後仍前補解再乞請勅各該巡撫都御史將所屬州縣一應科差當停止者徑自斟酌停止當具奏定奪者明白具奏凡可以蘇小民之困苦聴其便宜處置所屬官吏果有恣肆貪酷的為民害者就便黜罷勤於撫字深得民心者量加旌異及督令布按二司分巡分管官員務照都察院奏准事例常川在於各管地方禁革奸弊訪察民隠區畫倉糧撫恤流移凡有一切不急之務不許擅自興造一應公移債負不許擅自逼追一夫不許擅役一毫不許擅科大小詞訟不許濫受以致監禁人難分巡分管官敢有故違事例不時回司延住坐視民患者許巡按御史指實叅奏䆒治仍行在京大小衙門官員各要敦尚節儉不許過為奢侈庶民困少蘇天意可回而災異可弭矣臣本庸材叨居重任幸遇皇上堯舜之君過蒙委任之隆聞兹災荒若不以小民艱難困苦之狀繫國家安危之機懇懇為皇上言之萬一民窮盗起釀成大患誠有以負皇上知遇之隆而貽國家無窮之憂義同休戚罪實難逭伏望皇上俯賜施行天下幸甚生民幸甚為此具本親齎謹題請㫖𢎞治三年八月二十五日大祀犧牲事臣惟國家大事莫重於祀天地享祖宗而祀享之物莫先於犧牲必犧牲之純潔肥腯方可以感天地之降格而祖宗之歆享也故詩曰秋而載嘗夏而楅衡葢言夙養犧牲以防抵觸傷損皮毛以致犧牲不潔而不能感格乎神靈也臣曽與看牲之列徃年看得犧牲所所養大祀牛羊猪隻毎牲各混一處糞尿深厚或互相抵觸傷其皮毛葢由本所官員不知養牲之法太常寺官又少嚴於提督以致如此彼時祀期將近人不敢言雖言亦不及事所以一向因循及訪得大祀之牲除牛羊係派有司買辦外其猪隻俱係抽分小猪送去犧牲所喂養備用糠糟又不真正所以多有瘦小不甚肥腯且奉先殿祭祀並光禄寺供用之猪俱係坐派有司買辦今大祀之猪却用抽分之數恐有以負聖天子敬天地祀祖宗之誠意也如蒙乞勅禮部㑹同太常寺堂上官計議將犧牲所所養大祀等項犧牲用何法拴繫喂養不使似前抵觸傷損皮毛及糞尿汚其牲體務令肥腯㓗净仍將大祀並太廟社稷所用猪隻行移户部支給官銀預為買辦毛色純全猪隻送赴犧牲所用心喂養以備應用其餘常祭仍用抽分之猪大約毎嵗不過用銀二千餘兩臣叨任大臣覩兹重事義所當言為此具本親齎謹題請㫖𢎞治三年十月日具題乞恩終制事准本部咨該臣咨稱繼母趙氏於𢎞治四年月日病故臣係親男例應守制所有本部印信合應咨送收掌等因備咨具題節該奉聖㫖馬文升着奔䘮去𦵏畢即回任該部知道欽此欽遵備咨前來切念臣受繼母訓誨之恩愛實深無以為報兹聞去世哀苦不勝得終三年之䘮庶能報其萬一今奉恩命哀感交増在古雖有奪情之例多在金革之時今四夷納欵邊境寧謐伏望皇上容臣終制服滿即當赴京罄竭犬馬之勞少效涓埃之報為此具本令孫男馬顗親齎謹具奏聞伏候勅㫖𢎞治四年正月二十日奏乞恩終制事臣繼母趙氏於𢎞治四年月日病故本月二十二日聞訃移咨本部具題節該奉聖㫖馬文升着奔䘮去𦵏畢即回任欽此續該臣奏乞終制節該奉聖㫖欽受軍務重託今夷狄進貢邊境有事豈宜終制所乞不允還馳驛去限三個月回任欽此又該臣奏乞終制節該奉聖㫖卿奔䘮事已處置定了不必固辭欽此臣於本年二月初七日離京本月二十五日到家為因地方艱難修墳人夫未到四月初九日方纔穿壙十九日殯𦵏臣母已畢赴京間臣素有脾胃之疾哀毁勞心前疾舉發飲食減少日漸衰羸恐稽嚴限切念臣荷蒙皇上厚恩擢掌兵政委任極隆誓欲捐軀以圖報稱今遭繼母之䘮禮宜守制仰蒙皇上令臣奔䘮嚴限赴任臣累乞終制未蒙俞允此葢皇上勵精圖治人惟求舊之意但天經地義莫尊乎親降衷秉彛莫大於孝仰惟聖朝以孝治天下今時無金革之事臣冒奪情之命恐虧孝理而來物議况終制不過三年報國尚有餘日伏望皇止俯從愚衷容臣終制候服滿即當赴京罄竭犬馬之勞少效涓埃之報臣不勝感戴天恩之至為此具本令孫男馬奉親齎謹具奏聞伏候勅㫖𢎞治四年五月日端肅奏議巻四
