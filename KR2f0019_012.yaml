body:
  text: 端肅奏議巻十二明馬文升撰追䆒庸醫用藥非宜明正其罪事照得𢎞治十八年四月二十九日該司禮監太監陳寛𫝊奉大行皇帝聖旨朕偶感風寒欲調理數日暫免視朝該衙門知道欽此臣等連日問安至五月初七日忽聞聖躬升遐臣等五内分崩叫地號天不勝哀痛既而風聞原命醫人用藥非當之所誤也雖九重深邃莫知其的伏思大行皇帝平昔節膳寡慾善飬天和縱感風寒豈宜遽爾至此臣等哀恨尤深且朝廷設置太醫院衙門訪取天下名醫授以大官養以厚禄又設御藥房於内府嚴宻之地尤選上等之醫日支酒飯正為調理聖躬之用今臣等風聞之言内外相同臣子之恨何忍遽已伏望殿下早示睿㫁薦醫并用藥非宜有誤聖躬官醫人等合行拿送法司追究節次所用藥餌有無當否擬罪如律上請發落庶上有以紓殿下痛悼之心下可少釋軍民無窮之恨臣等不勝哀悼之至為此㑹本親齎謹具唘聞伏候令旨𢎞治十八年五月十二日㑹本具啓釐正封贈事切照我朝諸司職掌内一欵一両子當封從一髙者婦人因其子封贈而夫子両有官亦從一髙者葢言一人生二子俱任官當封其親若長子官五品次子官七品當從其長子五品者封贈其親是謂両子當封從一髙者其婦人一子任官當封其母而父亦任官若夫之官五品子之官七品當從其夫之官而封贈其母若子之官二品父之官四品五品當從其子之官而封贈其母是謂夫子兩有官亦從一髙者此指嫡母而言一代定制開載甚明不知始自何年有父任尚書或侍郎都御史其次室所生子或中進士或由監生等項出身任郎中主事評事太常等寺典簿等官三年考滿稱職該封贈其生母當依母以子貴隨其已之官品封贈今擬其從一髙者往往将生母從其父之官不分存亡俱封贈夫人或淑人是以夫貴而封贈其妾非母以子貴受封之義也不可不為改正切惟致治莫先于倫理倫理莫先于名分必名分正而後倫理可明前項封贈殊為未當若不釐正誠恐因襲年久有紊舊制而貽譏後世合無今後若父任尚書侍郎都御史等官次室所生子或任郎中主事評事典簿等官三年考滿稱職請給誥勅該封贈生母者依母以子貴照己之官品封贈不許再行比例從其父之官封贈其母庶舊制不違人心允惬縁係釐正封贈事理未敢擅便謹題請旨𢎞治十八年九月十四日具題重明詔信老臣以慎初政事文選清吏司案呈奉本部送於吏科抄出吏科給事中安奎題近該御用監太監王瑞等題為急闕書篆人員事奉聖旨這急闕書篆人員吏部便訪尋精通的七八人來看欽此該吏部題稱自來内府各衙門所用雜流辦事之人俱不經由本部選送宜從本監徑自訪求能書之人應用等因奉聖旨還選取來用欽此續該吏部考試得吳一中等八名頗通楷書等字乞要轉送御用監収用奉聖旨吳一中等八名并前革退李鼎等六名都送御用監通考優劣來説欽此又該吏部執奏要將吴一中等八名送去御用監収用李鼎等六名不必同送等因奉欽依還照前旨通送考試來說欽此欽遵仰惟陛下以英妙之年撫盈成之運渙頒明詔汰黜冗員一時仕路頓清宿弊盡革中外咸曰此聖天子維新之美政垂久之良法也夫何旬月之内率多變更且雜流之徒亷恥素無奔競慣熟謂𫝊乞固可得官遇裁革即該盡黜不若營謀吏部訪取之名可為長久保身之計致令太監王瑞等題稱書篆闕人誤䝉准令吏部訪尋并選取來用又将革退李鼎等六名通令送考雖該部執奏再三而陛下終未俞允使大臣垂首䘮氣謂掣肘而難行冗食依社憑城卒夤縁而得計臣愚以為吏部者朝廷黜陟幽明之司使既退復進則吏部為徒設矣大臣者陛下股肱心膂之寄使論列不行則大臣為偹員矣詔旨者朝廷鼔舞羣下之術朝更夕改則詔旨為虚文矣矧詔旨一出布滿寰宇所以洽上下之情者在是所以新天下之耳目者在是故凡繼世之君必頒詔令以繫人心然又必堅如金石信如四時使臣下有所持循而後可以言治否則視為汎常莫之信從不信不從政事墮廢世道日趨于壊而不可救藥矣陛下初嗣寳位天下延頸想望太平顧可徇左右交通之情進既黜冗濫之徒與詔旨自相背戾哉昔人謂南山可揺而此判不可移陛下忍令詔旨反一判之不若矣臣甞檢閲冗員未甞不為之愧赧中間如雙線匠之𩔖亦得𫝊官其與竈下養中郎将爛羊頭闗内侯何殊不意聖明之朝亦容有此如李鼎等亦係招収人匠之數濫叨俸禄已有年矣考其所能不過書篆彈琴一藝之微有之不足為重無之不足為輕不審何以克稱聖心而有回天之力如此且吏部遵奉明詔裁革冗濫不下七百餘員使李鼎等六名姦計得行臣恐倖門一開後即為例如御藥房欲援引裁革之醫士則曰修和闕人乞要考選内官監欲援引裁革之人匠則曰造作闕人乞要查取不知陛下何以處之方今朝政多闕邉事孔殷灾異頻仍府庫空竭陛下自即位以来未見召一大臣訪一大政顧乃于此不急之務冗濫之徒既責吏部以訪尋又責吏部以送考使此􅒰不獨一時茍禄以容身直欲後日名正而言順雖老臣讜言累進不恤也雖詔旨廢閣不行不恤也雖大體有損公論未愜不恤也然天下之事致謹于始猶恐鮮克有終以陛下新政之初謹始之際施為如此其欲終之盡美治之有成也難矣痛惟先帝崩逝今中外人心所頼扶持世道整頓紀綱遵守成憲三四元老大臣而已老成之士朝野蓍龜即此冗員一事陛下於老臣馬文升之論列尚且置之不信拒之不從如此不知此外可信從者果何人哉臣聞執狐疑之心來讒賊之口持不斷之意開羣枉之門近日文升執奏前事至於旬日留中不出臣仰測淵𠂻欲從文升之論則拂左右懇乞之私欲遂左右之私又非大公至正之道以故展轉卒從前旨遲遲而出耳使事事如此将來羣小肆志賄賂公行馴致主威不振于上政柄潛移于下矣新政之累孰大于此况裁革冗員雖係吏部之職掌舉正欺蔽實臣本科之攸司用是不忍緘黙為陛下激切言之伏惟聖明俯納臣言収回成命勅令吏部将李鼎等六名仍遵詔旨革退為民惟復拿送法司追究交通情弊以為将來之戒其吴一中等八名務照吏部所擬必候辦事十年滿日給與冠帯再辦事五年滿日量除鴻臚寺序班仍前辦事不必考滿陞用著為定例以後若有夤縁𫝊乞陞職者許該部及臣等指實㕘奏庶弊源永塞政體不虧上有以彰聖明納言之美下有以遂老臣報國之心等因具題奉聖旨該衙門知道欽此欽遵抄出送司查得近該御用監太監王瑞等題稱儒士李鼎等六名革退為民各不應役即今成造上用生活并寳纛龍旗龍床等項無人書篆乞勅吏部查照先年事例考取精通楷書篆書西畨西天等字人員量送六七人赴監辦事等因具題奉聖旨這急闕書篆人員吏部便訪尋精通的七八人來看欽此本部查得李鼎等五名先因御用監招作諸曉楷篆西番西天等字并撫琴隨該工部㕘稱李鼎等既謂之舍人固非在監人匠之屬所習字業又非該監應有匠色混同招収不過他日𫝊奉之媒奏奉孝宗皇帝聖旨改作儒士御用監辦事甫及三年奏要此照儒士彭勉循事例授職又該本部㕘稱不應妄引事例合送法司問罪具題節該奉孝宗皇帝聖㫖准與冠帯欽此及查得趙壵亦係𫝊奉之數俱各近奉明詔本部查奏革退為民今御用監成造上用生活合用楷篆等字人員宜從本監徑自訪取應用等因具題奉聖旨還選取來用欽此本部訪得在京官舎等項邢溥等五十七員名各諳曉楷篆等字考得數内吴一中等八名頗通前項字様及議擬各人俱係白衣出身必候辦事十年給與冠帯又辦事五年量除鴻臚寺序班不必考滿别項陛用等因開坐具題奉欽依還照前旨通送考試来説欽此欽遵覆奏間今該前因案呈到部看得吏科給事中安奎所言大意欲遵明詔以革倖進之徒恤人言以謹𫝊奉之漸不使李鼎等復得進用而壊維新之政是亦本官職分之所當為臣等亦竊思之李鼎等不過書篆小藝其先以匠役招収後又改作諳曉楷篆西天等字已該工部㕘其為𫝊奉之媒續要乞授職事又該本部㕘其妄引事例之罪及今夤縁進用據其前後奔競情節比之其他一時𫝊奉陞官者又大有不同臣節執奏非與李鼎等别有讎怨固欲沮之但以皇上新政之始中外企望之時今乃因李鼎等五六小人撓亂使明詔不信于下物議騰沸于朝𫝊奉又開末流難禁蠧國致灾實由于此闗繫治體誠非細故伏乞聖明留神省覧合無俯從諫官之議仍依臣等所言将李鼎等不必送考照舊為民其吴一中等八名本部送赴該監収考中者留用不中者亦從黜退其考中之數月支俸糧及辦事除官等項月日俱仍依臣等所擬以後若有夤縁陞職者許本部及科道官指實㕘奏拏問如此則皇上從諌之美可以追配祖宗用人之善可以益隆治道冗食自減而倖門少塞矣縁係重明詔信老臣以慎初政及節奉欽依還照前旨通送考試來説并該衙門知道事理未敢擅便謹題請旨正徳元年二月二十六日具題端肅奏議巻十二
