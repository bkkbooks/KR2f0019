body:
  text: 端肅奏議卷八明馬文升撰陳情乞恩罷歸田里以弭天變事照得𢎞治十一年十月十一日夜清寧宫災烟熖障天其勢甚大此非常之變異也仰惟皇上嗣登寶位以來敬天法祖勵政勤民聲色之不邇貨利之不殖無一事而不合乎正道無一政而不恤乎軍民雖古堯舜之君天下亦不過此冝乎和氣召祥災異罔見然而近年各處奏報天鳴地震等災異歲無空月今皇城之內猶有此災變驚及九廟悸逮重幃此固上天仁愛皇上示此警戒欲皇上側身修行以保億萬年無疆之洪圗實亦由臣叨任保傅濫居尚書職掌兵政係國安危學術踈寡德望淺薄不能陳善閉邪以匡輔聖明奉宣德意以康濟天下所致且古者國有大災人君固當修省必策免不職大臣以應天變臣實居大臣之列况年踰七十精神衰憊不能任事竊祿瘝曠冝在所免伏望皇上痛思致災之由重加修省之誠先將臣罷歸田里另選賢能以充厥任庶天意可回而災變可彌矣臣不勝戰栗恐懼俟命之至為此具本親齎謹具奏聞伏候敕㫖𢎞治十一年十月日奏懇乞天恩容令休致以保晚節事照得臣先因年滿七十纍乞休致俱未䝉俞允頃因星變復欲上請歸田以應災咎但念清寧宫工役未及告成又值邊方多警奏報填委未敢遽陳緣臣今年七十有四聰明日減精力日耗强持衰憊之體久忝密勿之班尚寬汰斥有妨賢路乞放歸田里以終餘年等因具本奏奉聖㫖卿宿望老臣方隆委任豈可遽求休致冝盡心職務不允所辭欽此欽遵臣伏覩綸音仰荷聖明圗任舊臣弗忍棄去臣不勝感激雖隕首糜軀無以為報但七十致仕國典具載臣之叨冒已踰四年思罄報國之忠遂失進退之冝處事乖方致來物議况兵部職掌戎務係國安危臣衰老才識昏庸加以近來疝疾舉發痰喘壅盛委的不堪任重伏望皇上俯徇愚悃容令致仕全臣晚節不勝感戴天恩之至為此具本親齎謹具奏聞伏候敕㫖𢎞治十二年十月初六日奏復乞天恩憐憫衰疾容令休致以全晚節事臣近以居官四十九年年已七十有四不能任事有招清議乞放歸田里以終餘年等因節該奉聖㫖卿宿望老臣方隆委任豈可遽求休致冝盡心職務不允所辭欽此欽遵又該臣奏委的衰老有疾久妨賢路乞容致仕以全晚節等因該奉聖㫖朕以卿耆德舊臣已有㫖勉留冝安心供職毋再固辭欽此欽遵臣以兵部係軍政衙門邊報并常行公事繁冗日逐題奏事件用印臣有疾不能朝參已將原掌印信咨送本部定奪該本部題奉聖㫖印還著馬文升掌欽此欽遵又該臣奏宿疾舉發一時調理未痊恐致有悮部事所據印信乞命本部佐二官暫且掌管候臣病痊之日另行具奏定奪等因節該聖㫖卿有疾暫免朝參在部用心辦事印信照舊掌管欽此欽遵臣伏覩節奉綸音不勝感激雖粉骨糜軀無以為報切思盡忠報國人臣事君之大本進禮退義仕者始終之全節况七十致仕令典攸存臣年滿七十以來纍上封章懇乞休致俱未䝉俞允兹復陳情乞歸田里再荷勉留兩辭印信又䝉暫勉朝參在部辦事此皆皇上天地委曲覆冒之恩不遺枯朽之意也伏念臣本庸材荷䝉列聖洪恩官叨保傅職掌兵戎幸逢皇上備堯舜之德撫盈成之運臣過䝉委任所以寢食弗遑職掌之外纍上封章期德澤流布威武奮揚內安黎庶外攝四夷少輔雍熙之治仰酬知遇之隆此臣之愚忠素志天地鬼神之所共鍳者也豈敢輕棄祿秩甘就閒散而辜皇上之恩但臣委的衰老加以疝疾舉發艱於步履非醫藥所能治療一時不能赴部本部邦政所司係國安危臣如仰遵成命勉强支持倘誤國事關係非輕微臣始終之節罪責之加亦何惜哉是以昧死懇陳伏望皇上憐臣衰老有疾曾效犬馬微勞照例容臣致仕得以生還田里少延殘喘數年臣舉家不勝感戴天恩之至為此具本令家人馬浩親齎謹具奏聞伏候敕㫖𢎞治十二年十月二十八日奏賞勞官軍激勵鋭氣事照得大同宣府延綏三鎮軍士數年以來逰奇兵大同者常往延綏䇿應隔涉黃河數百餘里宣府者亦往大同應援延綏却來大同截殺少則一二月多則三四月馬匹倒死隨要追陪及各鎮城堡見在操守馬步官軍俱係聽調按伏防禦殺賊之數馬軍常出朋合買馬銀兩委的十分艱難加以邊地苦寒誠為可憫自𢎞治元年荷䝉朝廷溥賞銀兩𢎞治十年又䝉欽賞逰奇官軍之後至今數年未沾恩澤今大冦近邊勢甚猖獗軍威挫損士氣消沮正係激勵人心奮勇效力之秋伏望皇上重念邊軍艱苦斷自宸衷將三鎮操備防守馬步官軍并偏頭關遊兵每員名量賞官銀若干兩其三鎮逺調出征遊奇二兵勞苦尤甚亦合量為加賞以濟困敝則彼心感恩思報而奮勇克敵矣但此等恩典出自朝廷非臣等所敢擅擬伏乞聖明裁處緣係乞賞邊軍以激勵鋭氣事理未敢擅便謹題請㫖𢎞治十三年四月二十五日題成造堅利甲兵以防邉患事照得克敵制勝固在乎官軍之奮勇尤在乎甲兵之堅利甲不堅則不能以遮矢石兵不利則不能以挫賊鋒故古人云甲不堅是以其卒與敵也蓋言不以人命為重而喪於敵矣然則有天下國家而欲盛武備以捍禦强敵者其甲兵豈可以不堅利也哉本部向因天下衛所年例成造軍器有名無實徒費錢糧俱不堪用已經奏准行移內府兵仗局成造盔甲腰刀斬馬大刀長牌弓箭等項發去浙江等都司團局照樣成造已有解到之數俱為可用今看得凡京營官軍每遇出征止關與軍器局所造盔甲其甲中不掩心下不遮臍袖口太寬又多壓肩不掩心則不能遮矢䄂寬壓肩則不能開弓且重二十四五斤而甲葉不堅軍士豈能披之而盔尤平常甲靣布多藍色不以盛軍容而振軍威臨敵誠為誤事况今邊方多事正係繕甲利兵之日臣文升任南京兵部尚書參贊機務之時南京軍器局所造軍器每年內外守備參贊官員親詣本局試驗其甲頗堅甲靣布色亦青但甲亦重二十斤以上袖亦壓肩不知前項軍器置之何用即今京庫闕少盔甲如䝉乞敕兵仗局成造上樣盔甲各二頂副腰刀二把其甲重十八斤盔二斤半發與兩京軍器局令管局內外官員照樣成造務將甲葉冷端數百錘使之十分堅固擲地有聲方為得法甲靣務要青布用火漆釘釘之若用線穿者其線亦要精緻而盔要低矮不冝太髙亦須端到自不生鏽在京軍器局所造軍器合亦照南京事例團營提督內外官并工部堂上官每年公同給事中御史試驗一次如有不如式者令其依式成造其給事中御史仍照舊例按季試驗若有成造不如法者許其具奏罪坐管工官員仍行南京工部查勘南京軍器局所造軍器各有若干具數作急回奏應否行取前來備用工部徑自具奏定奪臣等職掌兵戎亦司軍器况官軍戰陳勝負係乎甲兵堅利何如故敢僭陳伏乞聖明留意俯賜施行臣等不勝幸甚緣係照樣成造堅利甲兵以防邉患事理未敢擅便謹題請㫖𢎞治十三年五月十一日題乞恩憐憫衰老容令休致事近該本部咨該准禮部咨為星變事近聞欽天監奏有彗星之異中外臣民皆相𫝊駭况雲南地震之變尤異尋常即今邊方告警敵情叵測天時人事實切憂思是皆文武大小官員不能仰承德意勉修職業致此變異乞敕內外臣工勉圗修省等因備由轉行到臣除痛加修省及時禦敵安邊合行事冝節次具奏外又准吏部咨兩京六部等衙門堂上官俱係大臣中間衰疾未副人望者行令各官自陳等因前來照得臣成化二十二年任兵部尚書未幾改南京兵部參贊機務成化二十三年十一月欽䝉聖恩改臣都察院左都御史𢎞治元年七月內欽命臣同太監傅恭李良保國公朱永襄城伯李瑾提督團營操練軍馬𢎞治二年二月內復䝉改臣兵部尚書尋加太子少保復升太子太保又升少保兼太子太傅切念臣夲庸材荷䝉列聖天地覆載之恩歷官五十年恭事皇上一十三載自愧德薄才踈夙夜在公罔敢怠忽勞心焦思寢食弗遑期效涓涘之報少酬知遇之恩仰惟皇上堯舜之聖禹湯之仁冝乎兩儀奠位五辰順序夫何𤣥象示警坤道未寧敵冦跳梁於邊陲盜賊充斥於荆楚此固上天仁愛皇上之恩實由臣官居保傅職掌兵戎不能論道以燮理隂陽盡心而修舉邦政致召前項災變罪莫能逭當兹邊方多事之秋固非臣敢求退之日但古者凡遇災變必䇿免大臣以回天意臣實居大臣之列冝先罷去况臣犬馬之年七十有五前此八上封章懇乞歸田俱未䝉俞允今臣步履雖若强健而精神實為內衰兼素有脾胃疝氣之疾飲食不多近日勞心稍過輒生暈眩須少寢片時方淂蘇息臣每思之歷官年久賦性愚直見惡於人者衆今衰老之年才力有限恐處分乖冝有誤國家大事萬死何贖伏望皇上憫臣衰老曾效犬馬微勞容臣致仕保全始終别選賢能以代其任臣不勝感戴天恩之至為此具本親齎謹具奏聞伏候敕㫖𢎞治十三年五月十五日奏釐正選法事檢照我朝所定諸司職掌吏部文選清吏司所掌首開選官一作闕凡內外官員考滿侍親致仕丁憂殘疾考功司勳來付案呈本部立案作闕類寫闕本赴內詮注一類選凡考功付到考滿官司勳付到起復官及內外衙門送到降用裁減截替别用官員就憑來文附簿立案案呈本部審實相同比例無差就便謄録選本引選又聞進士監生通經秀才人材孝亷賢良方正等項俱憑來文附簿責供年籍住址出身名色引奏選用大意謂凡內外衙門將事故官員開闕到部明白立案作闕然後照闕行取各衙門該選進士監生人等并九年考滿及三考冠帶聽選官員考驗停當分成等第一具開闕本一具選本引奏選用䝉朝廷照闕逐項用選官印子某人至某人某官以合原闕之數用選官印子即朝廷欽選也候用印子已定本部遵奉欽定職銜照闕除授在內者就令到任在外者給憑到任選法始終大意如此職掌開載甚明萬世所當遵守今在京大小官員及在外方靣知府等官有闕俱據闕推舉相應官員隨即具奏銓補准大選在內或闕主事評事司務行人等官在外或闕知州通判推官知縣等官或三四百闕或五六百闕不知始自何年行取該選人等查考停當止具選本不具闕本引奏選用若無闕本朝廷憑何銓選某人為某官該若干員且選法首開作闕蓋有闕則補官若選官不具闕本殊與職掌所載選法不合臣等再三思維實為闕典若不具奏釐正誠恐因襲年久選法愈致廢弛猝難興舉所係非細合無今後凡遇大選先令該司官於闕內密切查算內外各衙門開到大小員闕共若干然後照例挨次取辦事進士聽選監生并九年考滿該升該降及三考冠帶聽選官應考試者照例考試分成等第臨選之時照依職掌一具闕本一具選本其闕本止開總數通行連人引奏選用候用印子已定臣等於午門外選官房內共同吏科都給事中遵奉欽定職銜照依闕帖填注相應衙門其餘掛榜抄選等項照舊施行庶選法舊規不致廢墜歷年習弊得以清除而將來有所持循矣緣係釐正選法事理未敢擅便謹題請㫖再乞天恩容令休致以避賢路事臣昨以年今七十有五夏初北敵入攻大同勢甚猖獗臣以籌畫邊務調度軍馬時值盛暑勞心太過以致眼目昏花精神衰憊委的年老不能任事乞容休致等因具奏節該奉聖㫖卿宿望老臣熟諳兵政委任方隆豈可引年屢求休致所辭不允欽此欽遵臣伏覩綸音益切感激仰惟皇上聰明英武睿知仁慈踐祚以來任賢不二如臣庸愚亦䝉委任俾典兵戎且加重職此誠千百載之一遇也故臣之圗報寢食不遑妻孥莫顧誓竭報國之忠期輔堯舜之治以身徇國死而後已因年踰致仕之期前此纍乞休致俱未䝉俞允今復懇乞歸田重荷勉留此皆天地委曲覆冒之恩也臣益當勉罄疲駑以圗報稱但臣委的年耄志衰弗克濟事雖聖主之恩不忍棄去而在臣之勢自不敢留若再列班行必重招物議縱容立朝心實忸怩亦不能展布四體以辦政務或又加臣以貪祿固寵不知止足則臣之晚節終不能保伏望皇上憫臣衰老察臣愚衷早放致仕以避賢路或削去官秩罷歸田里少延殘喘以終餘年臣不勝感戴天恩之至為此具本親齎謹具奏聞伏候敕㫖𢎞治十三年十月二十二日奏端肅奏議卷八
